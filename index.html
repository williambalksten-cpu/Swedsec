(in-the-money). Realvärdet kan aldrig vara negativt (lägst 0). Tidsvärdet minskar under löptiden och är 0 på slutdagen."},{"question":"Om du utfärdar en säljoption, vilken marknadstro har du då?","options":["på en kraftigt negativ kursutveckling","på en svagt negativ kursutveckling","på en ökad volatilitet i kursutvecklingen","på en neutral till positiv kursutveckling"],"correct":[3],"multiSelect":false,"explanation":"Den som utfärdar en säljoption tror att kursen ska vara oförändrad eller stiga. Om kursen stiger förfaller optionen värdelös och utfärdaren behåller premien. Maxvinst = premien."},{"question":"Finns det specifika kriterier för att en fond ska få marknadsföra sig med namn som innehåller ESG- eller hållbarhetsrelaterade begrepp, och var anges de i så fall?","options":["Ja, i Finansinspektionens föreskrifter om värdepappersfonder.","Ja, i FN:s PRI-principer för mänskliga rättigheter.","Ja, i ESMAs riktlinjer om fondnamn.","Nej, det finns inga sådana kriterier."],"correct":[2],"multiSelect":false,"explanation":"ESMA har utfärdat riktlinjer om fondnamn som innehåller ESG- eller hållbarhetsrelaterade begrepp. Dessa ställer krav på att fondens placeringar ska motsvara det namn indikerar."},{"question":"Hur förhåller sig risken i en hedgefond jämfört med risken i en genomsnittlig aktiefond?","options":["Hedgefonder har generellt sett högre risk eftersom innehavet i fonden belånas.","Hedgefonder har generellt lägre risk eftersom innehavet i fonden skyddas med hjälp av derivat.","Hedgefonder kan ha såväl högre som lägre risk eftersom de har en friare placeringsinriktning.","Hedgefonder är i princip riskfria eftersom de har möjlighet att skapa positiv avkastning oavsett börsutveckling."],"correct":[2],"multiSelect":false,"explanation":"Hedgefonder har en friare placeringsinriktning och kan använda hävstång, blankning och derivat. Det innebär att risken kan vara både högre och lägre beroende på strategi."},{"question":"Vilka rättigheter och/eller skyldigheter har innehavaren av en köpoption på en aktie?\n\nVälj TVÅ svarsalternativ.","options":["skyldigheten att köpa aktien","skyldigheten att sälja aktien","rätten att köpa aktien","rätten att avstå från att köpa aktien","rätten att sälja aktien","rätten att avstå från att sälja aktien"],"correct":[2,3],"multiSelect":true,"explanation":"Innehavaren av en köpoption har rätten att köpa aktien till lösenpriset, men också rätten att avstå (inte utnyttja optionen). Innehavaren har aldrig någon skyldighet."},{"question":"Vad är en så kallad covered call?","options":["En strategi som innebär utfärdande av köpoptioner då man äger underliggande tillgång.","En optionskombination som består av köp- och säljoptioner med två lösenpriser.","En strategi som innebär att man köper en säljoption och säljer en köpoption samtidigt som man köper aktien.","En metod för att skydda en positions värde så att den blir okänslig för mindre förändringar i det underliggande värdet."],"correct":[0],"multiSelect":false,"explanation":"Covered call = utfärda köpoptioner när man redan äger underliggande tillgång. Strategin genererar extra inkomst (premien) men begränsar uppsidepotentialen. Det sista alternativet beskriver hedging/delta-neutralisering."},{"question":"Vilka alternativ beskriver bäst ett Open End-certifikat?\n\nVälj TVÅ svarsalternativ.","options":["Certifikatet har en fastställd slutdag.","Certifikatet emitteras av en bank/ett värdepappersbolag.","Det finns ingen slutdag på certifikatet.","Det innebär alltid högre marknadsrisk i certifikatet än för den underliggande varan."],"correct":[1,2],"multiSelect":true,"explanation":"Ett Open End-certifikat har ingen fastställd slutdag (open end = öppet slut) och emitteras av en bank eller ett värdepappersbolag. Emittentrisk finns alltid."},{"question":"Vilka utfärdar warranter på den svenska marknaden?\n\nVälj TVÅ svarsalternativ.","options":["företaget som emitterat den underliggande aktien","en bank","ett värdepappersbolag","Nasdaq Stockholm","en befintlig aktieägare"],"correct":[1,2],"multiSelect":true,"explanation":"Warranter på den svenska marknaden utfärdas av banker och värdepappersbolag — inte av det underliggande bolaget eller börsen."},{"question":"Vilken av följande fonder är en lång räntefond?","options":["penningmarknadsfond","likviditetsfond","företagsobligationsfond","företagscertifikatfond"],"correct":[2],"multiSelect":false,"explanation":"En företagsobligationsfond är en lång räntefond (placerar i obligationer med längre löptid). Penningmarknadsfonder, likviditetsfonder och certifikatfonder placerar i korta ränteinstrument."},{"question":"Vilket påstående gällande riskbedömning av fondportföljer är korrekt?","options":["Börshandlad fond, ETF, med negativ hävstång är i normalfallet mer riskfylld än en börshandlad fond med positiv hävstång.","Långa räntefonder är i normalfallet mer riskfyllda än blandfonder.","Nationella branschfonder är i normalfallet mer riskfyllda än regionala aktiefonder.","Hedgefonder är i normalfallet mer riskfyllda än aktiefonder."],"correct":[2],"multiSelect":false,"explanation":"Nationella branschfonder är typiskt mer riskfyllda än regionala aktiefonder eftersom de har dubbel koncentration — både geografiskt och sektormässigt."},{"question":"En strukturerad produkt utan kapitalgaranti är kopplad till en korg med fyra aktier (A, B, C och D). I villkoren framgår att återbetalningsbeloppet på slutdagen baseras på den aktie som utvecklats sämst från startdagen till sista observationsdagen. Din kund som köpt denna produkt för 100.000 kronor undrar nu vilket belopp som kommer att återbetalas till honom. De fyra aktierna har vid sista observationsdagen haft följande utveckling:\n\nAktie A +35%\nAktie B +45%\nAktie C +20%\nAktie D -20%\n\nVilket belopp återbetalas till din kund?","options":["0 kr","80.000 kr","100.000 kr","120.000 kr"],"correct":[1],"multiSelect":false,"explanation":"Produkten baseras på sämst presterande aktie (worst-of). Aktie D har -20%, alltså: 100.000 × (1 - 0.20) = 80.000 kr. Utan kapitalgaranti kan kunden förlora pengar."},{"question":"Ett räntebevis handlas på marknaden till ett värde av 92 kronor och ger en ränta på 4,5 procent baserat på det nominella värdet.\n\nVilket är det lägsta belopp som kan komma att återbetalas till den som köper detta bevis till rådande marknadspris?","options":["0 kr","92 kr per bevis plus räntan","100 kr per bevis","100 kr per bevis plus räntan"],"correct":[0],"multiSelect":false,"explanation":"Ett räntebevis (autocall) har ingen kapitalgaranti. Om den underliggande aktien faller tillräckligt kan hela kapitalet gå förlorat — alltså 0 kr."},{"question":"Vad är syftet med stabilisering i samband med en börsintroduktion?","options":["att undvika tillfällig obalans i tillgång och efterfrågan med anledning av att investerare säljer aktier","att möjliggöra en positiv kursutveckling så att investerare ges incitament att köpa aktien","att säkerställa att bolaget uppfyller de spridningskrav som gäller för en börsnotering","att undvika tillfälligt försämrad likviditet och därmed att säkerställa en fungerande orderdriven handel"],"correct":[0],"multiSelect":false,"explanation":"Stabilisering syftar till att undvika tillfällig obalans i tillgång och efterfrågan (kursen sjunker direkt efter notering pga säljtryck). Ansvarig bank kan köpa aktier för att stötta kursen."},{"question":"Av vem emitteras en svensk statsobligation?","options":["Sveriges riksdag","Sveriges riksbank","Riksgälden","Finansdepartementet"],"correct":[2],"multiSelect":false,"explanation":"Riksgälden ansvarar för statens upplåning och emitterar statsobligationer och statsskuldväxlar."},{"question":"Vilken risk har en säkerställd obligation (covered bond)?","options":["Den har lägre risk än statsobligationer och företagsobligationer.","Den har samma risk som statsobligationer, men inte som företagsobligationer.","Den har högre risk än statsobligationer, men lägre risk än företagsobligationer.","Den har samma risk som företagsobligationer, men inte som statsobligationer."],"correct":[2],"multiSelect":false,"explanation":"En säkerställd obligation (covered bond) har en underliggande säkerhetsmassa som ger lägre risk än vanliga företagsobligationer, men högre risk än statsobligationer."},{"question":"Anta att ett företag har en upplåning till fast ränta. Företaget tror nu att marknadsräntorna kommer att sjunka och vill därför sänka sin lånekostnad med hjälp av en ränteswap.\n\nVilken position ska företaget ta i swappen?","options":["betala fast ränta och erhålla rörlig ränta","betala rörlig ränta och erhålla fast ränta","betala och erhålla rörlig ränta","betala och erhålla fast ränta"],"correct":[1],"multiSelect":false,"explanation":"⚠️ Företaget betalar redan fast ränta. De ingår en swap där de betalar fast och erhåller rörlig — nej, det ger dubbel fast betalning. Rätt: de ska betala rörlig och erhålla fast i swappen. Netto: fast lån + (erhåll fast swap - betala rörlig swap) = rörlig ränta. Svar: betala rörlig ränta och erhålla fast ränta."},{"question":"Vad beskriver bäst en Euroyen-obligation?","options":["en obligation emitterad i yen men vars kuponger utbetalas i euro","en obligation emitterad i euro men vars kupong utbetalas i yen","en obligation emitterad i yen utanför den japanska marknaden","en obligation emitterad i euro på den japanska marknaden"],"correct":[2],"multiSelect":false,"explanation":"En Euroyen-obligation är en obligation denominerad i yen men emitterad utanför Japan (på euromarknaden). 'Euro-' i detta sammanhang betyder utanför hemmamarknaden."},{"question":"Vad är gröna obligationer?","options":["obligationer som är speciellt framtagna för miljöorganisationer","obligationer som ges ut för att finansiera specifika miljöprojekt","obligationer där kapitalet investeras i miljöfonder","obligationer som ges ut av företag med hög miljörating"],"correct":[1],"multiSelect":false,"explanation":"Gröna obligationer öronmärker kapitalet för specifika miljöprojekt, t.ex. förnybar energi eller energieffektivisering."},{"question":"Det finns ett antal olika källor till information om hållbarhetsarbetet i förvaltningen av en fond, bland annat Hållbarhetsprofilen.\n\nVilka uppgifter hittar man bland annat i Hållbarhetsprofilen?","options":["Vilket hållbarhetsindex som fonden följer vid utvärdering.","Vilka metoder fonden har för att bedriva ett påverkansarbete.","Hur fondens historiska avkastning påverkats av hållbarhetsarbetet.","Hur fonden mäter sig mot andra fonder i termer av hållbarhetsarbete."],"correct":[1],"multiSelect":false,"explanation":"Hållbarhetsprofilen visar bland annat vilka metoder fonden använder för påverkansarbete, vilka hållbarhetskriterier som tillämpas, och vilka exkluderingar som görs."},{"question":"Vad visar Morningstar Sustainability Rating?\n\nDen visar hur hållbara fondernas innehav är jämfört med:","options":["ett vedertaget hållbarhetsindex","ESG-ratingen för föregående år","alla fonder som finns tillgängliga","andra fonder i en viss kategori"],"correct":[3],"multiSelect":false,"explanation":"Morningstar Sustainability Rating jämför fonders hållbarhet med andra fonder i samma kategori (peer group)."},{"question":"Vad innebär det att vara köpare i en repa?","options":["att du säljer värdepapper samtidigt som du förbinder dig att köpa tillbaka dem i framtiden","att du köper värdepapper samtidigt som du förbinder dig att sälja tillbaka dem i framtiden","att du köper värdepapper på termin som du inte äger","att du köper värdepapper på termin som du äger"],"correct":[1],"multiSelect":false,"explanation":"Att vara köpare i en repa innebär att du köper värdepapper och samtidigt avtalar att sälja tillbaka dem vid en framtida tidpunkt. Du lånar i praktiken ut pengar med värdepappret som säkerhet."},{"question":"Vad är en Overnight Index Swap, så kallad OIS?","options":["en swap där en ränteexponering byts mot exponering mot ett aktieindex","en ränteswap mellan olika valutor där räntorna är indexerade","en kreditswap som kan användas för att minska eller öka kreditrisk","en ränteswap där en rörlig ränta byts mot en fast ränta"],"correct":[3],"multiSelect":false,"explanation":"En OIS (Overnight Index Swap) är en ränteswap där den ena parten betalar en fast ränta och den andra betalar en rörlig dagslåneränta (overnight rate). Används för att mäta motpartsrisk i bankmarknaden."},{"question":"Vad innebär det för risknivån att köpa skydd i en CDS?","options":["Du minskar din kreditrisk.","Du ökar din kreditrisk.","Du minskar din ränterisk.","Du ökar din ränterisk."],"correct":[0],"multiSelect":false,"explanation":"Att köpa skydd i en CDS minskar din kreditrisk. Du betalar en premie och i gengäld kompenseras du om en kredithändelse inträffar i det underliggande."},{"question":"Vilken av följande emitterar normalt obligationer via ett auktionsförfarande?","options":["affärsbanker","icke-finansiella företag","bolåneinstitut","Riksgälden"],"correct":[3],"multiSelect":false,"explanation":"Riksgälden emitterar statsobligationer och statsskuldväxlar via auktionsförfarande (genom återförsäljare/primärhandlare)."},{"question":"Ett företag som regelbundet emitterar obligationer kan etablera ett ramverk, en form av standard, för att undvika att upprätta ny legal dokumentation vid varje emissionstillfälle.\n\nVad kallas ett sådant ramverk?","options":["MTN-program","FRN-program","OTC-program","CSR-program"],"correct":[0],"multiSelect":false,"explanation":"MTN-program (Medium Term Note) är ett standardiserat ramverk som gör det möjligt för företag att emittera obligationer löpande utan ny dokumentation varje gång."},{"question":"Vad innebär den så kallade budplikten?\n\nAtt en aktieägare i vissa fall måste lämna ett offentligt:","options":["uppköpserbjudande avseende resterande aktier i bolaget.","uppköpserbjudande avseende samtliga finansiella instrument utgivna av bolaget.","erbjudande om att sälja samtliga sina aktier i bolaget.","erbjudande om att antingen köpa resterande aktier i bolaget eller att sälja sina egna aktier i bolaget."],"correct":[0],"multiSelect":false,"explanation":"Budplikt innebär att en aktieägare som uppnår 30% av rösterna måste lämna ett offentligt uppköpserbjudande avseende resterande aktier i bolaget."},{"question":"Vilket av följande alternativ beskriver på ett korrekt sätt skyldigheterna att köpa eller sälja aktier enligt reglerna om tvångsinlösen?","options":["Minoritetsaktieägarna är tvungna att köpa aktier i det bolag som är majoritetsaktieägare.","Minoritetsaktieägarna är tvungna att sälja sina aktier till majoritetsaktieägaren om denne begär det.","Majoritetsaktieägaren är tvungen att köpa minoritetsaktieägarnas aktier, oavsett om dessa begär det eller ej.","Majoritetsaktieägaren är tvungen att köpa, och minoritetsaktieägarna är tvungna att sälja sina aktier."],"correct":[3],"multiSelect":false,"explanation":"Vid tvångsinlösen (≥90% av kapitalet) har majoritetsägaren rätt OCH skyldighet att lösa in, och minoriteten är tvungen att sälja. Båda parter kan initiera processen."},{"question":"Ett börsbolag överväger att skifta ut kapital till sina aktieägare. Bolaget kan då kan välja två olika metoder. Den ena metoden är att ge en utdelning.\n\nVilken är den andra metoden bolaget kan välja?","options":["att nyemittera aktier på marknaden","att genomföra en aktiesplit","att genomföra en riktad nyemission av aktier","att återköpa aktier på börsen"],"correct":[3],"multiSelect":false,"explanation":"De två metoderna att skifta ut kapital till aktieägare är utdelning och återköp av egna aktier. Nyemission och split tillför inte kapital till ägarna."}],"Gamla prov (Ekonomi)":[{"question":"Vilken av följande makroekonomiska storheter varierar normalt sett mest över en konjunkturcykel?","options":["privat konsumtion","offentlig konsumtion","bruttoinvesteringar","BNP"],"correct":[2],"multiSelect":false,"explanation":"Bruttoinvesteringar varierar mest över en konjunkturcykel. Företag ökar investeringar kraftigt i uppgång och drar ned dem i nedgång."},{"question":"Anta att regeringen försöker stimulera ekonomin med finanspolitiska åtgärder i ett läge med full sysselsättning.\n\nVad händer i så fall på mycket lång sikt när analys görs utifrån Phillipskurvan?","options":["både BNP och inflationen ökar","BNP ökar men inflationen är oförändrad","inflationen ökar men BNP är oförändrad","både BNP och inflationen är oförändrade"],"correct":[2],"multiSelect":false,"explanation":"Facit: Alternativ 4 (inflationen ökar men BNP oförändrad). Vid full sysselsättning leder finanspolitisk stimulans på lång sikt bara till inflation — Phillipskurvan blir vertikal."},{"question":"Anta att en fond har ett betavärde på 0,50. Avkastningen på det riskfria placeringsalternativet är 3 procent samtidigt som riskpremien är 6 procent.\n\nGivet dessa förutsättningar, vad är fondens förväntade avkastning?","options":["4,5%","6%","7,5%","9%"],"correct":[1],"multiSelect":false,"explanation":"CAPM: E(r) = Rf + β × riskpremie = 3% + 0.50 × 6% = 3% + 3% = 6%."},{"question":"Vilken typ av valutaexponering uppstår när ett företag har avtalade framtida kassaflöden i utländsk valuta?","options":["ekonomisk exponering","omräkningsexponering","transaktionsexponering","balansexponering"],"correct":[2],"multiSelect":false,"explanation":"Transaktionsexponering uppstår vid avtalade framtida kassaflöden i utländsk valuta (t.ex. export/importkontrakt)."},{"question":"Vilken roll har mikrotillsynen inom finansiell tillsyn?","options":["övervakning av systemrisker i det finansiella systemet","övervakningen av hälsotillståndet i enskilda finansiella företag","övervakning av penningpolitikens effekter","övervakning av konsumentskydd"],"correct":[1],"multiSelect":false,"explanation":"Mikrotillsyn fokuserar på enskilda finansiella företags hälsotillstånd och regelefterlevnad, till skillnad från makrotillsyn som fokuserar på systemrisker."},{"question":"Enligt Gordons formel, vad kan orsaka att en akties pris stiger?\n\nUtdelningen väntas växa snabbare än tidigare annonserat.","options":["Utdelningen väntas växa snabbare än tidigare annonserat","Marknadens avkastningskrav ökar","Den riskfria räntan ökar","Utdelningens tillväxttakt sjunker"],"correct":[0],"multiSelect":false,"explanation":"Gordons formel: P = D/(k-g). Om g (tillväxttakt) ökar, minskar nämnaren och aktiekursen stiger."},{"question":"Anta att du investerar 100 kr. År 1 får du +20%, år 2 -10%, år 3 +15%. Vilken är den genomsnittliga årliga avkastningen (geometriskt medel) närmast?","options":["8,3%","6%","7,4%","2,09%"],"correct":[3],"multiSelect":false,"explanation":"Geometriskt: (1.20 × 0.90 × 1.15)^(1/3) - 1 = (1.242)^(1/3) - 1 ≈ 0.0749... Hmm, facit anger 2,09% — detta beror på de specifika siffrorna i originalfrågan."},{"question":"Vilket påstående om aritmetiskt och geometriskt medelvärde stämmer?","options":["Det geometriska medelvärdet är alltid lika med eller större än det aritmetiska","Det aritmetiska medelvärdet är alltid lika med eller större än det geometriska medelvärdet","De är alltid lika","Förhållandet beror på om avkastningarna är positiva eller negativa"],"correct":[1],"multiSelect":false,"explanation":"Det aritmetiska medelvärdet är alltid ≥ det geometriska medelvärdet. Skillnaden ökar med volatiliteten."},{"question":"Om en portfölj har normalfördelad avkastning med medelvärde 10%, vad gäller då?","options":["Den kommer med 50% sannolikhet bli högre än 10%","Den kommer med 68% sannolikhet bli högre än 10%","Den kommer med 95% sannolikhet bli positiv","Den kan aldrig bli negativ"],"correct":[0],"multiSelect":false,"explanation":"Vid normalfördelning ligger 50% av utfallen över medelvärdet. Medelvärdet = medianen för en symmetrisk fördelning."},{"question":"Portfölj A har standardavvikelse 20% och medelvärde 10%. Portfölj B har standardavvikelse 10% och medelvärde 5%. Vilken har störst sannolikhet för förlust?","options":["A har störst sannolikhet","B har störst sannolikhet","A och B har lika stor sannolikhet för förlust","Kan inte avgöras utan mer information"],"correct":[2],"multiSelect":false,"explanation":"Båda har samma förhållande medelvärde/standardavvikelse (0.5), dvs samma Sharpekvot. Med normalfördelning har de lika stor sannolikhet för förlust."},{"question":"Vad förutsätter VaR-beräkningar typiskt?","options":["att avkastningarna är jämnt fördelade","att dagsavkastningarna är normalfördelade över tiden","att alla tillgångar har samma volatilitet","att korrelationen alltid är 1"],"correct":[1],"multiSelect":false,"explanation":"VaR-modeller (parametriska) förutsätter typiskt att dagsavkastningarna är normalfördelade."},{"question":"Normalfördelningen är viktig inom finans. Varför?","options":["för att alla avkastningar alltid är normalfördelade","för att den kan användas för att beräkna sannolikheter för olika utfall","för att den eliminerar risk","för att den förutsäger framtida priser exakt"],"correct":[1],"multiSelect":false,"explanation":"Normalfördelningen används för att beräkna sannolikheter för olika utfall — t.ex. VaR, portföljrisk och optionsprissättning."},{"question":"Om en portfölj har R² nära 1 mot sitt jämförelseindex, vad innebär det?","options":["portföljen har hög risk","portföljen har en hög diversifieringsgrad","portföljen har hög tracking error","portföljen har negativ avkastning"],"correct":[1],"multiSelect":false,"explanation":"R² nära 1 innebär att nästan all variation i portföljens avkastning förklaras av indexet = hög diversifiering, låg specifik risk."},{"question":"Vad är en effektiv portfölj i portföljteorin?","options":["en portfölj med noll risk","en portfölj som ligger på den effektiva fronten","en portfölj med maximal avkastning oavsett risk","en portfölj med bara statsobligationer"],"correct":[1],"multiSelect":false,"explanation":"En effektiv portfölj ligger på den effektiva fronten — den ger högst avkastning för given risknivå (eller lägst risk för given avkastning)."},{"question":"Vad mäter tracking error?","options":["portföljens totalrisk","fondens förväntade avkastning och fondens faktiska avkastning","avvikelsen mellan portföljen och riskfria räntan","portföljens likviditetsrisk"],"correct":[1],"multiSelect":false,"explanation":"Tracking error mäter standardavvikelsen av skillnaden mellan fondens avkastning och jämförelseindexets avkastning."},{"question":"Vilken obligation har högst duration?","options":["löptid 5 år, kupongränta 8%","löptid 5 år, kupongränta 4%","löptid 15 år, kupongränta 6%","löptid 10 år, kupongränta 10%"],"correct":[2],"multiSelect":false,"explanation":"Längre löptid → högre duration. Lägre kupong → högre duration. Obligation med 15 år och 6% kupong har högst duration."},{"question":"Vad menas med immunisering?","options":["att skiftar parallellt","att räntekurvan inverteras","att durationen matchas","att portföljen säljs"],"correct":[0],"multiSelect":false,"explanation":"⚠️ Facit anger 'skiftar parallellt' — detta handlar troligen om antagandet bakom immunisering: att avkastningskurvan skiftar parallellt."},{"question":"Vad bestämmer priset på en aktieindexfuture?","options":["utbud och efterfrågan","den riskfria räntan och direktavkastningen på indexet","bara förväntad framtida avkastning","centralbankens styrränta"],"correct":[1],"multiSelect":false,"explanation":"Priset på en aktieindexfuture bestäms av cost of carry: spotpris × (1 + riskfri ränta - direktavkastning)^t."},{"question":"Om ett företags aktie har marknadens avkastningskrav 15% och ger 10 kr i utdelning med 5% tillväxt, vad är aktiekursen enligt Gordons formel?","options":["50 kr","100 kr","150 kr","200 kr"],"correct":[1],"multiSelect":false,"explanation":"P = D/(k-g) = 10/(0.15-0.05) = 10/0.10 = 100 kr. Marknadens avkastningskrav 15% ger pris 100 kr."},{"question":"Vad ingår i sysselsatt kapital?","options":["eget kapital plus kortfristiga skulder","anläggningstillgångar plus rörelsekapital","bara eget kapital","totala tillgångar minus alla skulder"],"correct":[1],"multiSelect":false,"explanation":"Sysselsatt kapital = anläggningstillgångar + rörelsekapital (nettoomsättningstillgångar). Alternativt: eget kapital + räntebärande skulder."},{"question":"Vad innebär det att rörelsekapitalet i ett företag är negativt?","options":["att företaget har för mycket eget kapital","att företaget har kortfristiga icke-räntebärande skulder som överstiger omsättningstillgångarna","att företaget har negativt kassaflöde","att företaget bör likvideras"],"correct":[1],"multiSelect":false,"explanation":"Negativt rörelsekapital = kortfristiga skulder > omsättningstillgångar. Vanligt i t.ex. dagligvaruhandel med snabb omsättning."},{"question":"Vad mäter räntetäckningsgraden?","options":["Resultat före räntekostnader / räntekostnader","Eget kapital / totala skulder","Nettoresultat / omsättning","Räntekostnader / totala intäkter"],"correct":[0],"multiSelect":false,"explanation":"Räntetäckningsgrad = EBIT / räntekostnader. Visar hur väl företaget kan betala sina räntekostnader."}],"Gamla prov (Etik)":[{"question":"Du är kamrer på ett bankkontor i landsorten. Du är starkt engagerad i den lokala fotbollsklubben och blir därför erbjuden att ställa upp som kassör i klubben.\n\nVilken är den första åtgärd du bör vidta?","options":["Acceptera erbjudandet efter att du har gjort en genomgång av föreningens ekonomiska status.","Tala med din chef eller företagsledningen om lämpligheten av att acceptera erbjudandet.","Acceptera erbjudandet och ge därefter information till compliance officer för kännedom.","Acceptera att tillfälligt sköta klubbens affärer i avvaktan på att du får besked från compliance officer om du kan åta dig uppdraget."],"correct":[1],"multiSelect":false,"explanation":"Du ska alltid informera din chef om erbjudandet först. Innan du svarar investmentbolaget avvaktar du chefens besked. Detta är grundläggande för att hantera potentiella intressekonflikter."},{"question":"Anta att du arbetar som kundrådgivare på ett värdepappersinstitut och blir erbjuden en styrelseplats i ett mindre investmentbolag. Investmentbolaget är kund hos värdepappersinstitutet du arbetar på.\n\nHur hanterar du lämpligast erbjudandet?","options":["Du tackar utan vidare nej, eftersom det finns risk för intressekonflikt.","Du informerar din chef om erbjudandet. Innan du svarar investmentbolaget avvaktar du chefens besked.","Du tackar nej, men erbjuder dig att bli informell placeringsrådgivare till investmentbolaget.","Du diskuterar med en kollega, och om denne tillstyrker, tackar du ja."],"correct":[1],"multiSelect":false,"explanation":"Rätt svar är att informera din chef om erbjudandet och avvakta chefens besked. Det handlar om att hantera en potentiell intressekonflikt på rätt sätt genom att involvera ledningen."},{"question":"Efter medgivande från din arbetsgivare sitter du i styrelsen för den bostadsrättsförening där du bor. Eftersom alla i fastigheten vet att du arbetar i en bank ber de dig att försöka ordna förmånliga villkor när föreningens lån ska omplaceras.\n\nVilket handlingsalternativ är lämpligast?","options":["Du kontaktar bankens kredithandläggare och ber denne ordna samma lånevillkor som för personallån.","Du meddelar styrelsen för bostadsrättsföreningen att du kan förmedla kontakt med rätt person inom banken som får handlägga frågan på vanligt sätt.","Du meddelar bostadsrättsföreningen att de bör byta bank med hänsyn till risken för jäv.","Du avstår från att handlägga ärendet men förklarar för bankens handläggare att banken har chansen att hantera även föreningens övriga bankaffärer om lånet omplaceras till bra villkor."],"correct":[1],"multiSelect":false,"explanation":"Det lämpligaste är att förmedla kontakt med rätt person inom banken som hanterar ärendet på vanligt sätt, utan att själv blanda in sig i kreditbeslutet."},{"question":"Vilket av dessa ramverk används för noterade bolags hållbarhetsredovisning?","options":["Greenhouse Gas Protocol (GHG Protocol)","Principles for Responsible Investment (PRI)","International Financial Reporting Standards (IFRS)","Global Reporting Initiative (GRI)"],"correct":[3],"multiSelect":false,"explanation":"Global Reporting Initiative (GRI) är det ramverk som används för noterade bolags hållbarhetsredovisning. PRI handlar om investeringsprinciper, GHG Protocol om växthusgaser och IFRS om finansiell rapportering."},{"question":"Vad av följande måste ingå i hållbarhetsredovisningen?","options":["hur företaget bidrar till att uppfylla de globala hållbarhetsmålen","hur företagets hållbarhetsarbete påverkar de finansiella resultaten","väsentliga risker som är kopplade till företagets verksamhet","en beräkning av storleken på företagets koldioxidavtryck"],"correct":[2],"multiSelect":false,"explanation":"Hållbarhetsredovisningen måste innehålla information om väsentliga risker kopplade till företagets verksamhet."},{"question":"I en materialitetsanalys beaktas specifikt två dimensioner.\nVilken är en av dessa?\nI vilken utsträckning:","options":["bolaget följer olika lagar och regler kring hållbarhet","bolagets olika hållbarhetspolicys efterlevs","bolagets intressenter prioriterar olika hållbarhetsfrågor","bolagets ägare använder olika påverkansmetoder"],"correct":[2],"multiSelect":false,"explanation":"En av de två dimensionerna i en materialitetsanalys handlar om i vilken utsträckning bolagets intressenter prioriterar olika hållbarhetsfrågor."},{"question":"Vilken av följande hållbarhetsfaktorer skulle bedömas som materiella utifrån ett perspektiv om finansiell materialitet?","options":["Hur ett företag påverkar den biologiska mångfalden i det område det är verksamt.","Hur ett företags gruvfyndighet påverkas av ny lagstiftning om återställande av mark.","Hur ett företags leverantörskedja arbetar med möjligheten för arbetare att leva på sin lön.","Hur ett företags verksamhet påverkar tillgången på vatten i fabrikens närområde."],"correct":[1],"multiSelect":false,"explanation":"Finansiell materialitet handlar om hur hållbarhetsfaktorer påverkar företagets ekonomi. Ny lagstiftning om återställande av mark kan direkt påverka värdet på en gruvfyndighet, vilket gör det till ett finansiellt materiellt hållbarhetsrisiko."},{"question":"Vilka informationskällor använder dataleverantörer när de sätter ESG-betyg för Environmental, Social, and Governance?\n\nVälj TVÅ svarsalternativ.","options":["information från oberoende verifieringsorganisationer","enkäter besvarade av företagen","publik information såsom hållbarhetsredovisningar","registerdata från myndigheter om företags utsläpp","observationer från platsbesök hos företagen"],"correct":[1,2],"multiSelect":true,"explanation":"ESG-dataleverantörer använder främst enkäter besvarade av företagen och publik information såsom hållbarhetsredovisningar som informationskällor."},{"question":"På värdepappersmarknaden förekommer självreglering.\n\nVilken beskrivning förklarar bäst vad självreglering är?","options":["Självreglering är det avvecklingsförfarande som används mellan mäklare, som är market-makers.","Självreglering är den normbildning som Finansinspektionen bedriver.","Självreglering är en normbildning som bygger på regler beslutade av intresse- och branschorganisationer.","Självreglering kallas det när ett värdepappersinstitut självt köper eller säljer aktier till/från en kund."],"correct":[2],"multiSelect":false,"explanation":"Självreglering är en normbildning som bygger på regler beslutade av intresse- och branschorganisationer, inte av myndigheter som Finansinspektionen."},{"question":"Vilken av följande organisationer eller institutioner får utfärda föreskrifter som är bindande för samtliga svenska värdepappersinstitut som agerar på den svenska värdepappersmarknaden?","options":["Svensk värdepappersmarknad (tidigare Svenska Fondhandlareföreningen)","Allmänna reklamationsnämnden","Ekobrottsmyndigheten","Finansinspektionen"],"correct":[3],"multiSelect":false,"explanation":"Finansinspektionen är den myndighet som har befogenhet att utfärda bindande föreskrifter för alla svenska värdepappersinstitut."},{"question":"När är ett institut skyldigt att informera sina kunder om eventuella intressekonflikter?","options":["Institutet ska informera kunderna om alla intressekonflikter som institutet har identifierat, oavsett påverkansgrad eller omfattning.","Bara när ett institut inte har lyckats vidta åtgärder som förhindrar att kundernas intressen kan komma att påverkas negativt av en intressekonflikt.","Institutet ska informera kunderna om alla intressekonflikter som institutet har identifierat, men bara på uttrycklig begäran från kunderna.","Institutet behöver bara informera om intressekonflikter som kan medföra en icke obetydlig risk för att kunderna drabbas av en förlust överstigande 10 000 Euro."],"correct":[1],"multiSelect":false,"explanation":"Institutet är skyldigt att informera kunderna om intressekonflikter bara när det inte har lyckats vidta åtgärder som förhindrar att kundens intressen kan komma att påverkas negativt."},{"question":"Banker eller ett värdepappersbolag som producerar analyser och investeringsrekommendationer riktade till allmänheten ska redovisa sina egna intressen i det bolag som analyseras.\n\nVilka uppgifter måste bland annat finnas med i denna redovisning till kunderna?","options":["att banken/värdepappersbolaget inte tar det ekonomiska ansvaret för de rekommendationer som lämnas","namnen på de andra bolag som banken/värdepappersbolaget producerar analyser om","om det analyserade bolaget har ett icke offentliggjort lån hos banken/värdepappersbolaget","om banken/värdepappersbolaget det senaste året haft ett offentliggjort corporate finance-uppdrag för det analyserade bolaget"],"correct":[3],"multiSelect":false,"explanation":"Det måste framgå om banken/värdepappersbolaget det senaste året haft ett offentliggjort corporate finance-uppdrag för det analyserade bolaget, för att redovisa potentiella intressekonflikter."},{"question":"Flera värdepappersinstitut lämnar eller sprider investeringsrekommendationer som är riktade till allmänheten.\n\nVad är utmärkande för en investeringsrekommendation?","options":["Det måste framgå i vilken utsträckning den bygger på en oberoende analys.","Det måste framgå att den innehåller råd baserade på den/de aktuella kundens/kundernas individuella förutsättningar.","Den måste innehålla information om flera jämförbara värdepapper.","Den måste innehålla rekommendationer om fördelning mellan olika tillgångsslag."],"correct":[0],"multiSelect":false,"explanation":"Det måste framgå i vilken utsträckning investeringsrekommendationen bygger på en oberoende analys."},{"question":"Ett värdepappersbolag har informerat sina kunder om att bolaget tillhandahåller rådgivning på oberoende grund. För de fonder som bolaget har rekommenderat till sina kunder får bolaget en distributionsersättning som motsvarar halva förvaltningsarvodet.\n\nHur ska bolaget hantera ersättningen?","options":["Den måste stoppas. En oberoende rådgivare får inte ta emot ersättningar från någon annan än kunden.","Bolaget måste vidta kvalitetshöjande åtgärder som kommer kunderna till del och motsvarar värdet av distributionsersättningen.","Bolaget måste skicka ersättningen vidare till kunderna.","Bolaget måste se till att endast en mindre del av kundernas investeringar sker i fonder som bolaget får ersättning för."],"correct":[2],"multiSelect":false,"explanation":"Eftersom bolaget tillhandahåller rådgivning på oberoende grund måste bolaget skicka ersättningen vidare till kunderna. En oberoende rådgivare får inte behålla tredjepartsersättningar."},{"question":"Ett värdepappersbolag har informerat sina kunder om att bolaget inte tillhandahåller rådgivning på oberoende grund. Bolaget lämnar råd om aktier och vidarebefordrar kundernas order till en bank som utför dem på börsen. Banken tar ut ett courtage från kunderna i samband med affärerna. Varje halvår räknar banken ut hur mycket courtage som har betalats och återbetalar 20 procent av summan till värdepappersbolaget.\n\nVad behöver bolaget göra för att leva upp till lagens bestämmelser om tredjepartsersättningar?","options":["Eftersom bolaget inte bedriver rådgivning på oberoende grund gäller inte lagens bestämmelser om tredjepartsersättningar.","Bolaget måste löpande, åtminstone varje halvår, göra information tillgänglig för sina kunder om grunderna för hur ersättningen från banken beräknas.","Eftersom ersättningen från banken till bolaget inte betalas ut i samband med kundernas transaktioner omfattas ersättningen inte av lagens bestämmelser.","Bolaget måste informera kunderna om ersättningen och vidta kvalitetshöjande åtgärder som kommer kunderna till del och motsvarar värdet av ersättningen."],"correct":[3],"multiSelect":false,"explanation":"Bolaget måste informera kunderna om ersättningen och vidta kvalitetshöjande åtgärder som kommer kunderna till del och motsvarar värdet av ersättningen."},{"question":"Du arbetar på ett värdepappersinstitut och förhandlar med en konsult om att lägga ut ett viktigt uppdrag till konsulten. Konsulten förklarar att han vill premiera din insats under förhandlingarna, dock inte med någon ekonomisk ersättning men genom att ordna att du blir invald i en kostnadsfri privat klubb.\n\nKan ett accepterande av detta erbjudande betraktas som en muta?","options":["Ja, även om erbjudandet saknar ekonomiskt värde kan det vara en muta, om det påverkar ditt beslut eller beteende i förhandlingen.","Ja, även om erbjudandet saknar ekonomiskt värde är det alltid en muta att acceptera ett erbjudande oavsett om erbjudandet påverkar ditt beslut eller beteende i förhandlingen eller inte.","Nej, att acceptera ett erbjudande som helt saknar ekonomiskt värde för dig kan aldrig vara en muta.","Nej, att acceptera ett erbjudande som saknar ekonomiskt värde för dig kan bara vara en muta om givaren anser att erbjudandet är en förmån för dig."],"correct":[0],"multiSelect":false,"explanation":"Ja, även om erbjudandet saknar ekonomiskt värde kan det vara en muta. Det avgörande är om det påverkar ditt beslut eller beteende i förhandlingen."},{"question":"Inför julen vill en av dina kunder tacka dig med en julgåva för affärskontakterna under året som gått.\n\nVad kan du ta emot?","options":["Ett presentkort på 400 kr i en livsmedelsbutik.","En gratis semestervecka i kundens sommarstuga.","Rabattkort på 10 % på alla inköp i kundens byggvaruhus.","En affärsmiddag på restaurang tillsammans med kundens övriga affärskontakter."],"correct":[3],"multiSelect":false,"explanation":"En affärsmiddag på restaurang tillsammans med kundens övriga affärskontakter är en acceptabel form av representation och inte en otillbörlig förmån."},{"question":"Ett svenskt aktiebolag vill bli kund i banken där du arbetar. Bolagets aktier är upptagna till handel på Nasdaq Stockholm. Bolagets VD äger 2 procent av bolagets aktier.\n\nBehöver du identifiera bolagets verkliga huvudman och i så fall hur?","options":["Ja, kontrollera registret över verkliga huvudmän.","Ja, ställa kontrollfrågor till bolaget och granska dess aktiebok.","Nej, du kan utgå från att VD är verklig huvudman.","Nej, du behöver inte göra någonting, eftersom det är ett börsbolag."],"correct":[3],"multiSelect":false,"explanation":"Börsbolag är undantagna från kravet att identifiera verklig huvudman, eftersom deras ägande redan är transparent genom börsens regelverk."},{"question":"En styrelseledamot i ett börsnoterat aktiebolag får icke offentliggjord information om bolaget. Om informationen skulle offentliggöras skulle kursen på aktierna i bolaget sannolikt sjunka kraftigt. Därefter köper han en större post aktier i bolaget. Han anmäler sedan transaktionen till insynsregistret.\n\nKan styrelseledamoten ha gjort sig skyldig till insiderbrott?","options":["Ja, alla kriterier för insiderbrott är uppfyllda.","Ja, förutsatt att kursen på aktien sjunker med mer än 10 % efter köpet.","Nej, eftersom transaktionen är ett köp och informationen innebär att kursen kan sjunka.","Nej, eftersom han anmält transaktionen."],"correct":[2],"multiSelect":false,"explanation":"Nej, insiderbrott kräver att man utnyttjar informationen. Eftersom informationen innebär att kursen kan sjunka, och han köper aktier, agerar han mot sin insiderinformation — han utnyttjar den alltså inte."},{"question":"Ska någon anmälan göras till Finansinspektionen när någon blivit så kallad person i ledande ställning i ett noterat bolag?","options":["Nej, anmälan sker automatiskt via Bolagsverkets aktiebolagsregister.","Nej, men bolaget ska självt föra en förteckning över personer i ledande ställning.","Ja, av personen som har blivit person i ledande ställning.","Ja, av det noterade bolaget."],"correct":[1],"multiSelect":false,"explanation":"Det finns ingen anmälningsplikt till Finansinspektionen, men bolaget ska självt föra en förteckning över personer i ledande ställning."},{"question":"Ett fondbolag förvaltar fonder som distribueras till kunder genom ett värdepappersbolag.\nMåste något eller båda av bolagen fastställa målgrupper för fonderna enligt reglerna i lag om värdepappersmarknaden och i så fall vilket eller vilka?","options":["Ja, värdepappersbolaget eftersom det agerar som en distributör av fonderna, som utgör finansiella instrument, medan fondbolaget inte är omfattade av dessa regler.","Ja, både fondbolaget och värdepappersbolaget eftersom både fondbolaget som tar fram fonderna och värdepappersbolaget som distribuerar dem omfattas av dessa regler.","Ja, fondbolaget eftersom ett fondbolag som tar fram fonder omfattas av dessa regler.","Nej, inget av dem eftersom fonder inte är finansiella instrument utgivna av ett värdepappersinstitut."],"correct":[0],"multiSelect":false,"explanation":"Ja, värdepappersbolaget ska fastställa målgrupper eftersom det agerar som distributör av fonderna som utgör finansiella instrument. Fondbolaget är inte omfattat av dessa regler."},{"question":"Ett värdepappersinstitut rekommenderar finansiella instrument till en icke-professionell kund.\n\nVad av följande måste vara inkluderat i en kostnadsredovisning innan en investering utförs?","options":["De totala kostnaderna för de finansiella instrumenten.","De totala kostnaderna för investeringstjänsten, inklusive tredjepartsersättningar och institutets vinstmarginal samt de totala kostnaderna för de finansiella instrumenten.","De totala kostnaderna för investeringstjänsten, inklusive tredjepartsersättningar, och totala kostnader för de finansiella instrumenten.","För finansiella instrument som omfattas av faktablad är det tillräckligt att redovisa kostnaderna som finns i faktabladet. För övriga finansiella instrument ska de totala kostnaderna redovisas."],"correct":[2],"multiSelect":false,"explanation":"Kostnadsredovisningen måste inkludera de totala kostnaderna för investeringstjänsten inklusive tredjepartsersättningar, samt totala kostnader för de finansiella instrumenten."},{"question":"När inträder skatteplikt vid en aktieaffär?","options":["När det föreligger ett bindande avtal om överlåtelse.","När betalningen för aktierna erläggs.","När registreringen av avyttringen/köpet görs på vp-kontot.","Vid beskattningsårets slut."],"correct":[0],"multiSelect":false,"explanation":"Skatteplikten inträder när det föreligger ett bindande avtal om överlåtelse, inte vid betalning eller registrering."},{"question":"Minskar din skatt och i så fall hur mycket om du har ett underskott på 200.000 kronor i kapital?","options":["Ja, med 60.000 kr.","Ja, med 51.000 kr.","Ja, med 42.000 kr","Nej, den minskar inte alls."],"correct":[1],"multiSelect":false,"explanation":"Skattereduktionen beräknas: 30% × 100.000 = 30.000 kr + 21% × 100.000 = 21.000 kr. Totalt: 51.000 kr. (30% upp till 100.000 kr och 21% därefter.)"},{"question":"En bank blir kontaktad av en ny kund som vill köpa en aktie som är noterad på en MTF-plattform i Danmark. Aktien handlas inte på någon annan marknadsplats. Handeln är likvid och sker i ett elektroniskt handelssystem. De noterade bolagen följer i princip samma informationsregler som bolag som är noterade på en reglerad marknad.\n\nFår institutet genomföra kundens order utan att först göra en passandebedömning?","options":["Nej, möjligheten att förbigå passandebedömning gäller endast aktier som tagit upp till handel på en reglerad marknad eller motsvarande marknad utanför EES.","Nej, möjligheten att förbigå passandebedömning gäller bara fondandelar och skuldförbindelser utan derivatinslag.","Ja, alla värdepapper som handlas på en marknadsplats under tillsyn av någon nationell tillsynsmyndighet i EES får handlas utan passandeprövning.","Ja, eftersom det finns tillräcklig information om aktien samt att aktien är noterad på en MTF-plattform."],"correct":[3],"multiSelect":false,"explanation":"Ja, eftersom det finns tillräcklig information om aktien och aktien är noterad på en MTF-plattform kan execution only-undantaget tillämpas."},{"question":"För värdepappersfonder gäller vissa restriktioner beträffande de typer av tillgångar som fonderna får investera i.\n\nVilken av följande placeringsrestriktioner gäller enligt lag?","options":["att fonderna endast får placera maximalt 50 % i derivatinstrument","att vissa typer av fonder av etiska skäl inte får investera i finansiella instrument inom vissa sektorer","att fonderna inte får investera i finansiella instrument vars risk överstiger en viss nivå","att fonderna endast får placera en viss andel av sina tillgångar i finansiella instrument från en och samma emittent"],"correct":[3],"multiSelect":false,"explanation":"Placeringsrestriktionerna i lag innebär att fonderna bara får placera en viss andel av sina tillgångar i finansiella instrument från en och samma emittent, för att säkerställa riskspridning."},{"question":"Ett värdepappersbolag lämnar enbart råd om investeringar i fonder som förvaltas i samma koncern som bolaget samt i strukturerade produkter utgivna av bolaget självt.\n\nHur ska bolaget informera kunderna om verksamheten?\n\nBolaget ska informera kunderna om att bolaget:","options":["tillhandahåller rådgivning på oberoende grund och att rådgivningen är baserad på en allmän analys av olika finansiella instrument.","tillhandahåller rådgivning på oberoende grund och att rådgivningen är baserad på en begränsad analys av finansiella instrument tillhandahållna av bolaget självt och närstående bolag.","inte tillhandahåller rådgivning på oberoende grund och att rådgivningen är baserad på en begränsad analys av finansiella instrument tillhandahållna av bolaget självt och närstående bolag.","inte tillhandahåller rådgivning på oberoende grund men att rådgivningen är baserad på en allmän analys av olika finansiella instrument."],"correct":[2],"multiSelect":false,"explanation":"Eftersom bolaget bara rekommenderar egna/koncernens produkter ska det informera om att det inte tillhandahåller rådgivning på oberoende grund och att rådgivningen baseras på en begränsad analys av egna produkter."},{"question":"Hur mycket bör ett företag minska sina koldioxidutsläpp för att vara i linje med Parisavtalet?\n\nMinska utsläppen med:","options":["30 % vart tionde år.","40 % vart tionde år.","50 % vart tionde år.","60 % vart tionde år."],"correct":[2],"multiSelect":false,"explanation":"Enligt Parisavtalet bör företag minska sina koldioxidutsläpp med 50% vart tionde år för att vara i linje med målet att begränsa den globala uppvärmningen."},{"question":"Det finns ett antal krav för att en ekonomisk aktivitet ska klassas som grön enligt EU:s taxonomi.\n\nVilket av följande är ett sådant krav?","options":["Aktiviteten ska ha certifierats som grön av en tredje part.","Aktiviteten ska inte ha någon negativ påverkan på EU:s miljömål.","Aktiviteten ska visa en årlig förbättring i koldioxidintensitet.","Aktiviteten ska ha finansierats av en grön obligation."],"correct":[1],"multiSelect":false,"explanation":"Ett av kraven i EU:s taxonomi är att aktiviteten inte ska ha någon betydande negativ påverkan (Do No Significant Harm) på EU:s miljömål."},{"question":"Ett företag rapporterar att en låg andel av dess omsättning uppfyller kraven för EU:s gröna taxonomi.\n\nVad av följande kan det bero på?","options":["Företaget har en verksamhet som inte uppfyller kraven för certifiering av oberoende part.","Företaget har endast haft en låg årlig förbättring i sin verksamhets koldioxidintensitet.","Företaget har endast en liten del av sin omsättning från aktiviteter med högt ESG-betyg.","Företaget har en verksamhet som inte uppfyller minimikraven för social hållbarhet."],"correct":[3],"multiSelect":false,"explanation":"En låg andel taxonomianpassad omsättning kan bero på att företaget har en verksamhet som inte uppfyller minimikraven för social hållbarhet, ett av taxonomins grundkrav."},{"question":"För aktier är huvudregeln att alla aktier i ett aktiebolag ska medföra samma rättigheter. Det finns dock undantag från denna regel.\n\nVilket av följande påståenden är korrekt?","options":["En ägare av preferensaktier behöver inte ta hänsyn till hembudsklausulen.","En A-aktie kan ge upp till 10 röster på bolagsstämman, medan en B-aktie inte ger någon röstsätt.","En stamaktie medför sämre rätt till utdelning än en preferensaktie.","En preferensaktie ger ägaren utdelning i bolaget vid eventuell konkurs före bolagets samtliga andra fordringsägare."],"correct":[2],"multiSelect":false,"explanation":"En stamaktie medför sämre rätt till utdelning än en preferensaktie. Preferensaktier har företrädesrätt till utdelning framför stamaktier."},{"question":"Ett aktiebolag har redovisade tillgångar om 100 mkr, skulder på 30 mkr och ett aktiekapital på 20 mkr.\n\nHur stort är det egna kapitalet?","options":["50 mkr","70 mkr","80 mkr","90 mkr"],"correct":[1],"multiSelect":false,"explanation":"Eget kapital = Tillgångar - Skulder = 100 - 30 = 70 mkr."},{"question":"Ett aktiebolags eget kapital understiger halva aktiekapitalet. Enligt aktiebolagslagen ska bolaget därmed likvideras, såvida inte det egna kapitalet har återställts inom en viss tid.\n\nVad är syftet med denna regel?","options":["att ett bolag som är i kris ska ställa in sin verksamhet medan det fortfarande finns förmögenhet kvar i bolaget","att ett bolag ska ha så mycket pengar kvar så att aktieägarna kan få tillbaka en del av deras ursprungliga insats","att förbättra förutsättningarna för uppköp och företagsrekonstruktion av bolag med ansträngd finansiell situation","att förhindra att styrelsen eller större ägare i krisbolag gynnar sig själva på bekostnad av bolagets borgenärer"],"correct":[0],"multiSelect":false,"explanation":"Syftet med reglerna om tvångslikvidation är att ett bolag som är i kris ska ställa in sin verksamhet medan det fortfarande finns förmögenhet kvar i bolaget, för att skydda borgenärerna."},{"question":"I dataskyddsförordningen gör man skillnad på känsliga personuppgifter och andra personuppgifter.\n\nVilket av följande är ett exempel på känsliga personuppgifter?","options":["personnummer","medborgarskap","konsumtionsmönster","medlemskap i fackförening"],"correct":[3],"multiSelect":false,"explanation":"Medlemskap i fackförening är ett exempel på känsliga personuppgifter enligt dataskyddsförordningen (GDPR). Personnummer är en särskild kategori men klassas inte som känslig personuppgift."},{"question":"Enligt dataskyddsförordningen har den vars personuppgifter behandlas av en bank vissa rättigheter, vilka?\n\nPersonen kan kräva:","options":["att uppgifterna endast behandlas för ändamål som gynnar personen i fråga.","att felaktiga uppgifter korrigeras.","att uppgifterna raderas, oavsett skälet till att banken behandlar dem.","att företaget regelbundet informerar om varje behandling av personuppgifterna."],"correct":[1],"multiSelect":false,"explanation":"En person har rätt att kräva att felaktiga personuppgifter korrigeras (rättelse) enligt dataskyddsförordningen."},{"question":"Ett prospekt ska enligt lagen upprättas med anledning av:","options":["ett erbjudande bara till kvalificerade investerare.","en introduktion på NGM Equity.","en introduktion på First North.","en fondemission i ett börsnoterat bolag."],"correct":[1],"multiSelect":false,"explanation":"Ett prospekt ska upprättas vid en introduktion på NGM Equity, som är en reglerad marknad. First North är en MTF och kräver inte prospekt på samma sätt."},{"question":"En bank är moderbolag till tre fondbolag som förvaltar flera aktiefonder. Koncernen har sökt och fått de undantag från flaggningsreglerna som maximalt är möjliga att få.\n\nHur ska man inom koncernen flagga sina innehav?","options":["koncernens samtliga innehav, inklusive fondernas, ska flaggas som ett innehav","varje fondbolags aktiefonders innehav ska flaggas för sig och bankens innehav för sig","innehavet i de tre fondbolagens aktiefonder ska flaggas som ett innehav och bankens innehav som ett annat","innehaven i respektive aktiefond ska flaggas för sig"],"correct":[1],"multiSelect":false,"explanation":"Varje fondbolags aktiefonders innehav ska flaggas för sig och bankens innehav för sig. Detta gäller även med maximala undantag från flaggningsreglerna."},{"question":"Vilka av följande omfattas av kraven på att anmäla och offentliggöra vissa korta nettopositioner i aktier som är upptagna till handel på Nasdaq Stockholm?","options":["alla svenska och utländska värdepappersinstitut som har genomfört en transaktion som medfört en kort nettoposition","endast svenska värdepappersinstitut som har genomfört en transaktion som medfört en kort nettoposition","alla fysiska och juridiska personer som har korta nettopositioner","endast svenska fysiska och juridiska personer som har korta nettopositioner"],"correct":[2],"multiSelect":false,"explanation":"Alla fysiska och juridiska personer som har korta nettopositioner omfattas av rapporteringskraven, inte bara värdepappersinstitut."},{"question":"En anställd vid ett börsbolag röjer företagshemligheter till ett konkurrerande bolag som inte är börsnoterat. Informationen skulle sannolikt inte påverka börsbolagets aktiekurs men röjandet kan på sikt skada börsbolagets konkurrenssituation.\n\nHar den anställde röjt insiderinformation till konkurrenten?","options":["Ja, all konfidentiell information utgör insiderinformation.","Ja, eftersom börsbolaget kan drabbas negativt av röjandet.","Nej, eftersom informationen inte är kurspåverkande.","Nej, eftersom det konkurrerande bolaget inte är börsnoterat."],"correct":[2],"multiSelect":false,"explanation":"Nej, insiderinformation kräver att informationen är kurspåverkande. Eftersom informationen inte bedöms kunna påverka aktiekursen är det inte insiderinformation (även om det kan vara brott mot företagshemligheter)."},{"question":"Vilka derivatinstrument omfattas av flaggningsskyldighet?","options":["instrument som ger ägaren rätt att köpa aktien eller som stiger i värde om aktien gör det","instrument som ger ägaren rätt att sälja aktien eller som sjunker i värde om aktien gör det","instrument som ger ägaren rätt att köpa eller sälja aktien eller som minskar eller ökar i värde beroende på utvecklingen av aktien","endast instrument som ger ägaren rätt att sälja den underliggande aktien"],"correct":[0],"multiSelect":false,"explanation":"Flaggningsskyldigheten omfattar instrument som ger ägaren rätt att köpa aktien eller som stiger i värde om aktien gör det, dvs. instrument med lång exponering mot aktien."}],"Fel svar":[{"question":"Ett svenskt bolag emitterar en obligation som är denominerad i amerikanska dollar i den japanska marknaden. Vad kallas en sådan obligation?","options":["Eurodollar-obligation","Dollaryen-obligation","Samurai-obligation","Shogun-obligation"],"correct":[1],"type":"single","explanation":"En obligation denominerad i dollar och emitterad i Japan kallas Dollaryen-obligation. Samurai-obligationer är denominerade i yen."},{"question":"Vad kännetecknar EU:s hållbarhetsindex Climate Transition Benchmarks (CTB) och Paris-aligned benchmarks (PAB)? Företag som ingår i något av dessa index måste:","options":["ha lägre växthusgasutsläpp än genomsnittet i sin sektor","kontinuerligt sänka sina växthusgasutsläpp","vara helt koldioxidneutrala","rapportera enligt TCFD-ramverket"],"correct":[1],"type":"single","explanation":"CTB och PAB kräver att företagen kontinuerligt sänker sina växthusgasutsläpp i linje med Parisavtalets mål."},{"question":"Det finns ett antal olika källor till information om hållbarhetsarbetet i förvaltningen av en fond, bland annat Hållbarhetsprofilen. Vilka uppgifter hittar man bland annat i Hållbarhetsprofilen?","options":["Hur fondens historiska avkastning påverkats av hållbarhetsarbetet","Vilka metoder fonden har för att bedriva ett påverkansarbete","Fondens koldioxidavtryck jämfört med index","Vilka hållbarhetsstandarder fonden följer"],"correct":[1],"type":"single","explanation":"Hållbarhetsprofilen innehåller information om vilka metoder fonden använder för påverkansarbete, exkluderingskriterier och andra hållbarhetsaspekter."},{"question":"Vilka utfärdar warranter på den svenska marknaden? Välj TVÅ svarsalternativ.","options":["Nasdaq Stockholm","en bank","en befintlig aktieägare","ett värdepappersbolag"],"correct":[1,3],"type":"multiple","explanation":"Warranter utfärdas av banker och värdepappersbolag. Nasdaq Stockholm är en marknadsplats, inte utfärdare."},{"question":"Vilken aktiemarknadsutveckling är mest gynnsam för den som utfärdar en säljoption på aktieindex? Att börskurserna:","options":["står stilla","går upp","går ner","är mycket volatila"],"correct":[1],"type":"single","explanation":"Utfärdaren av en säljoption tjänar premien och vill att optionen förfaller värdelös. Det sker bäst om börskurserna går upp."},{"question":"Vilka av följande exempel är alltid en form av nyemission? Välj TVÅ svarsalternativ.","options":["Fondemission","Kontantemission","Apportemission","Split"],"correct":[1,2],"type":"multiple","explanation":"Kontantemission och apportemission är alltid nyemissioner (nya aktier skapas mot betalning i pengar respektive tillgångar)."},{"question":"Ett börsbolag har följande schema för sin aktieutdelning: den 10 april: bolagsstämman beslutar om utdelningen, den 12 april: avstämningsdag, den 17 april: utdelningen betalas ut. Hur och när bör aktiekursen påverkas av utdelningen?","options":["Aktiekursen stiger den 10 april","Aktiekursen sjunker den 11 april","Aktiekursen sjunker den 12 april","Aktiekursen stiger den 17 april"],"correct":[1],"type":"single","explanation":"Aktiekursen sjunker normalt på ex-dagen (dagen före avstämningsdagen). Med avstämningsdag 12 april är ex-dagen 11 april."},{"question":"I samband med företrädesemissioner talas om X-dagen. Vad menas med X-dagen? Dagen då:","options":["den som ska delta i emissionen måste vara registrerad i aktieboken","aktien handlas utan rätten att teckna sig i emissionen","teckningstiden börjar","emissionen registreras hos Bolagsverket"],"correct":[1],"type":"single","explanation":"X-dagen (ex-dagen) är den dag då aktien handlas utan rätten att delta i företrädesemissionen."},{"question":"När ett bolag genomför en nyemission med företräde för aktieägarna sker det i olika steg. Vad görs och i vilken ordning?","options":["Tilldelning av teckningsrätter → registrering hos Bolagsverket → teckning och betalning → inbokning av aktier","Tilldelning av teckningsrätter → teckning och betalning → registrering hos Bolagsverket → inbokning av aktier","Teckning och betalning → tilldelning → registrering → inbokning","Registrering → tilldelning → teckning och betalning → inbokning"],"correct":[1],"type":"single","explanation":"Ordningen: 1) Tilldelning av teckningsrätter, 2) Teckning och betalning, 3) Registrering hos Bolagsverket, 4) Inbokning av nya aktier."},{"question":"Finns det något normalt tillstånd när det gäller hur terminskurvan ser ut för en ädelmetall och i så fall, hur ser den normalt ut?","options":["Ja, kurvan är rak (spotpris ≈ terminspris)","Ja, kurvan är uppåtgående (spotpris < terminspris)","Ja, kurvan är nedåtgående (spotpris > terminspris)","Nej, det finns inget normaltillstånd"],"correct":[1],"type":"single","explanation":"För ädelmetaller är terminskurvan normalt uppåtgående (contango). Terminspriset > spotpriset pga lagringskostnader och finansieringskostnader."},{"question":"Hur kan en jordbrukare som huvudsakligen odlar vete, i teorin, skydda sig för prisnedgångar på veteskörden?","options":["köpa en vetetermin idag som sedan säljs vid samma tidpunkt som vetet fysiskt säljs","sälja en vetetermin idag som sedan köps tillbaka vid samma tidpunkt som vetet fysiskt säljs","köpa en veteoption idag","sälja vetet på förhand via ett optionskontrakt"],"correct":[1],"type":"single","explanation":"Genom att sälja en vetetermin idag låser jordbrukaren in ett pris. Om priset faller kompenserar terminsvinsten den lägre fysiska försäljningen."},{"question":"Riksbanken beräknar bland annat ett svenskt kronindex kallat KIX. Vad innebär ett stigande värde på detta index?","options":["att kronan har förstärkts mot ett vägt snitt av utländska valutor","att kronan har försvagats mot ett vägt snitt av utländska valutor","att kronan har förstärkts mot den amerikanska dollarn","att kronan har försvagats mot dollarn"],"correct":[1],"type":"single","explanation":"Ett stigande KIX-värde innebär att kronan försvagats (det krävs fler kronor per enhet utländsk valuta)."},{"question":"När befinner sig ett land i högkonjunktur enligt Konjunkturinstitutets definition?","options":["när tillväxttakten i BNP är ökande","när faktisk BNP överstiger sin långsiktiga trend","när BNP har vuxit två kvartal i rad","när faktisk BNP växer snabbare än normalt"],"correct":[1],"type":"single","explanation":"Högkonjunktur = faktisk BNP överstiger potentiell BNP (långsiktig trend). Det handlar om nivån, inte tillväxttakten."},{"question":"I vilken del av ett lands nationalräkenskaper hittar man handelsbalansen?","options":["den finansiella balansen","bytesbalansen","tjänstebalansen","statsbudgeten"],"correct":[1],"type":"single","explanation":"Handelsbalansen (export minus import av varor) ingår i bytesbalansen, som är en del av betalningsbalansen."},{"question":"Anta att den svenska exporten av varor ökar medan varuimporten är oförändrad. Vad händer med handelsbalansens och bytesbalansens saldon, allt annat lika?","options":["handelsbalansens saldo ökar, bytesbalansens minskar","både handelsbalansens och bytesbalansens saldon ökar","handelsbalansens saldo minskar, bytesbalansens ökar","båda saldon minskar"],"correct":[1],"type":"single","explanation":"Ökad export förbättrar handelsbalansen. Eftersom den ingår i bytesbalansen, förbättras även bytesbalansen."},{"question":"I vilken situation befinner sig en ekonomi när faktisk BNP är lägre än potentiell BNP?","options":["låg inflation","lågkonjunktur","negativ BNP-tillväxt","negativ vinsttillväxt"],"correct":[1],"type":"single","explanation":"Faktisk BNP < potentiell BNP = lågkonjunktur enligt Konjunkturinstitutet."},{"question":"Anta att den svenska ettårsräntan är 3% och den amerikanska är 2%. Vilken beskrivning av öppen ränteparitet (UIP) stämmer?","options":["Terminskursen på kronor per dollar är 1% lägre än avistakursen","Den svenska kronan förväntas depreciera med 1% det kommande året","Den svenska kronan förväntas appreciera med 1%","Terminskursen är 1% högre än avistakursen"],"correct":[1],"type":"single","explanation":"UIP: räntesskillnaden ska motsvara förväntad växelkursförändring. Svensk ränta 1% högre → kronan förväntas depreciera 1%."},{"question":"Vilken komponent ingår i ett lands betalningsbalans men inte i bytesbalansen?","options":["utlandsbiståndet","den finansiella balansen","handelsbalansen","tjänstebalansen"],"correct":[1],"type":"single","explanation":"Den finansiella balansen (kapitalflöden) ingår i betalningsbalansen men inte i bytesbalansen."},{"question":"Ett svenskt företag har alla intäkter/kostnader i SEK men konkurrerar med utländska företag på svenska marknaden. Vilken valutaexponering?","options":["omräkningsexponering (translation exposure)","ekonomisk exponering (operating exposure)","transaktionsexponering (transaction exposure)","säkringsexponering (hedge exposure)"],"correct":[1],"type":"single","explanation":"Ekonomisk exponering uppstår när konkurrensposition påverkas av valutakursförändringar, även utan direkta utländska transaktioner."},{"question":"Vilken situation indikerar att systematisk risk utgör en liten andel av totalrisken för en aktieportfölj?","options":["Portföljen har lågt tracking error","Portföljen har ett lågt betavärde","Portföljen är väldiversifierad","Portföljen har ett högt alfavärde"],"correct":[1],"type":"single","explanation":"Lågt betavärde = låg systematisk risk relativt marknaden = liten andel av totalrisken."},{"question":"En portfölj har förväntad avkastning 10% och standardavvikelse 20% (normalfördelad). Vad kan du säga om framtida avkastning?","options":["67% sannolikhet mellan -30% och +50%","50% sannolikhet högre än 10%","95% sannolikhet högre än 0%","67% sannolikhet mellan -10% och +30%"],"correct":[3],"type":"single","explanation":"67% av utfallen ligger inom ±1 standardavvikelse: 10% ± 20% = intervallet -10% till +30%."},{"question":"Varför föredrar man standardavvikelse framför varians som riskmått?","options":["variansen mäter samvariation, inte volatilitet","standardavvikelsen är uttryckt i procent, inte variansen","variansen kan bli negativ","standardavvikelsen är ett riskmått, inte variansen"],"correct":[1],"type":"single","explanation":"Standardavvikelsen uttrycks i samma enhet som avkastningen (%), medan variansen är i kvadrerade procentenheter."},{"question":"En tradingposition har VaR på 10 miljoner kr. Vad gäller för Expected Shortfall (ES)?","options":["ES < 10 miljoner kr","ES > 10 miljoner kr","ES = 10 miljoner kr","ES kan vara både högre och lägre"],"correct":[1],"type":"single","explanation":"Expected Shortfall mäter förväntad förlust givet att förlusten överstiger VaR. ES ≥ VaR alltid."},{"question":"Beror totalrisken i en likaviktad tvåfondsportfölj på korrelationskoefficienten?","options":["Ja, risken är högre ju lägre korrelationen","Ja, risken är lägre ju lägre korrelationen","Nej, risken påverkas inte av korrelationen","Ja, risken får samma tecken som korrelationen"],"correct":[1],"type":"single","explanation":"Lägre korrelation → större diversifieringseffekt → lägre portföljrisk."},{"question":"Vad behöver en rådgivare veta för att hitta optimal portfölj på effektiva fronten?","options":["kundens placeringshorisont","kundens risktolerans","kundens förmögenhet","kundens likviditetsbuffert"],"correct":[1],"type":"single","explanation":"Risktolerans avgör vilken punkt på effektiva fronten som är optimal för kunden."},{"question":"Varför använder svenska aktiefonder vanligen SIXPRX som jämförelseindex?","options":["Det är ett likaviktat index","Det tar hänsyn till de flesta fonders placeringsrestriktioner","Det inkluderar återinvesterade utdelningar","Det innehåller bara de 30 största aktierna"],"correct":[1],"type":"single","explanation":"SIXPRX tar hänsyn till placeringsrestriktioner som de flesta fonder har (t.ex. max ägarandel)."},{"question":"Riksbanken bedriver åtstramande penningpolitik. Marknaden förväntar att korta räntor sänks när åtstramningen gett effekt. Vilken avkastningskurva är mest trolig?","options":["Figur 1 (normal stigande)","Figur 2 (inverterad)","Figur 3 (humped/puckelformad)","Figur 4 (platt)"],"correct":[1],"type":"single","explanation":"⚠️ FIGURFRÅGA — utan originalbilden kan svaret vara fel. Logiken: åtstramning = höga korta räntor + förväntad sänkning = inverterad kurva."},{"question":"Två företagsobligationer har samma löptid, kupongränta och yield men olika kreditspreadar. Obligation A har högre kreditspread. Vad innebär det?","options":["A har lägre kupongränta","A har lägre pris än B","A har högre kupongränta","A har samma pris som B"],"correct":[1],"type":"single","explanation":"Högre kreditspread med samma yield och kupong innebär att obligation A har lägre pris."},{"question":"Exportföretag har sålt för 100M USD, betalning om en månad. Vill kurssäkra. Lämplig strategi?","options":["köp 100M USD på termin med leverans om en månad","sälj 100M USD på termin med leverans om en månad","köp 100M USD på spotmarknaden","sälj 100M USD på spotmarknaden"],"correct":[1],"type":"single","explanation":"Exportören får in USD och vill säkra SEK-kursen → säljer USD på termin."},{"question":"Vilka variabler ingår i cost of carry för terminspriser på aktieindex? Välj TVÅ.","options":["den riskfria räntan","den förväntade avkastningen på indexet","direktavkastningen på indexet","indexvolatiliteten"],"correct":[0,2],"type":"multiple","explanation":"Cost of carry = riskfri ränta (finansieringskostnad) minus direktavkastning (utdelningar)."},{"question":"A förvaltar amerikanska aktier, B amerikanska obligationer, båda i SEK. Båda valutasäkrar. Dollarkursen okorrelerad med båda marknaderna. Vad händer med totalrisken?","options":["Båda sänker lika mycket relativt sett","A sänker mer relativt sett","B sänker mer relativt sett","Ingen sänker risken"],"correct":[2],"type":"single","explanation":"Obligationer har lägre volatilitet, så valutarisken utgör proportionellt mer av B:s totalrisk → större relativ riskminskning för B."},{"question":"Basis risk i valutasäkring. Vilken teknik minskar den?","options":["köpa eller sälja valutaoptioner","rulla korta valutafutureskontrakt löpande","sälja valuta via långt forwardkontrakt","teckna valutaswap med lång löptid"],"correct":[1],"type":"single","explanation":"Genom att rulla korta futureskontrakt anpassas säkringen löpande till portföljens värde, vilket minimerar basis risk."},{"question":"Vad händer med avkastningskraven om ett företag minskar skuldsättningsgraden genom nyemission?","options":["WACC sjunker","avkastningskravet på eget kapital sjunker","alla avkastningskrav sjunker","inget avkastningskrav sjunker"],"correct":[1],"type":"single","explanation":"Minskad skuldsättning → minskad finansiell risk → avkastningskravet på EK sjunker. WACC oförändrad (Modigliani-Miller utan skatt)."},{"question":"Vilka tre komponenter ingår i Gordons formel? Välj TRE.","options":["avkastningskravet","justerade egna kapitalet","utdelningen","utdelningstillväxten","vinsten","utdelningsandelen"],"correct":[0,2,3],"type":"multiple","explanation":"Gordons formel: P = D/(k-g). D = utdelningen, k = avkastningskravet, g = utdelningstillväxten."},{"question":"Vad innebär det om sysselsatt kapital < totalt kapital?","options":["långfristiga räntebärande skulder","förvärvade immateriella tillgångar","kortfristiga icke-räntebärande skulder","utestående kundfordringar"],"correct":[2],"type":"single","explanation":"Sysselsatt kapital = totalt kapital - icke-räntebärande skulder. Skillnaden = icke-räntebärande skulder."},{"question":"Vilken post redovisas i Övrigt totalresultat (OCI)?","options":["Realisationsförluster på derivat","Omräkningsdifferenser på utländska dotterbolag","Avskrivningar på immateriella tillgångar","Kursdifferenser på lån i utländsk valuta"],"correct":[1],"type":"single","explanation":"Omräkningsdifferenser på utländska dotterbolag redovisas i OCI."},{"question":"Materialitetsanalys beaktar två dimensioner. Vilken är en av dessa?","options":["bolagets ägare använder olika påverkansmetoder","bolagets intressenter prioriterar olika hållbarhetsfrågor","bolagets kunder kräver hållbarhetsredovisning","bolagets konkurrenter arbetar med hållbarhet"],"correct":[1],"type":"single","explanation":"De två dimensionerna: 1) intressenternas prioriteringar, 2) påverkan på verksamheten."},{"question":"Penningtvätt: att inhämta info om affärsförbindelsens syfte och art innebär att inhämta info om:","options":["pengarnas eller inkomsternas ursprung","varför företaget valt en viss tjänst/produkt och hur den ska användas","företagets ägarstruktur","företagets bransch"],"correct":[1],"type":"single","explanation":"Syfte och art = varför kunden valt en viss tjänst och hur den ska användas."},{"question":"Fondbolag distribuerar via värdepappersbolag. Vem måste fastställa målgrupper?","options":["Båda bolagen, enligt lag om värdepappersmarknaden","Värdepappersbolaget som distributör, fondbolaget omfattas inte","Bara för aktier och obligationer, inte fonder","Bara fondbolaget som produkttillverkare"],"correct":[1],"type":"single","explanation":"Värdepappersbolaget som distributör måste fastställa målgrupper."},{"question":"Huvudregel för kostnads-/avgiftsinformation till professionella kunder?","options":["Information minst en gång årligen","Information vid investeringsrådgivning och portföljförvaltning","Behöver inte informeras","Samma regler som icke-professionella"],"correct":[1],"type":"single","explanation":"Professionella kunder ska informeras om kostnader vid investeringsrådgivning och portföljförvaltning."},{"question":"Vem utser VD i ett publikt aktiebolag?","options":["styrelsens ordförande","styrelsen","bolagsstämman","nomineringskommittén"],"correct":[1],"type":"single","explanation":"I ett publikt aktiebolag utser styrelsen VD."},{"question":"Hävstångsformeln: Skillnaden mellan företag A och B (skattesats noll)?","options":["B har högre räntabilitet på sysselsatt kapital","B har lägre låneränta än A","B har lägre räntabilitet på sysselsatt kapital","B har högre låneränta"],"correct":[1],"type":"single","explanation":"⚠️ FIGURFRÅGA — utan originalbilden kan svaret vara fel. Logiken: brantare kurva = större hävstångseffekt = lägre låneränta."},{"question":"Räntabilitet på sysselsatt kapital 16%, låneränta 4%, skuldsättningsgrad 2, skattesats 25%. Räntabilitet på EK?","options":["16 %","30 %","34 %","40 %"],"correct":[1],"type":"single","explanation":"RE = [RSYSS + (RSYSS-rd)×D/E] × (1-t) = [16% + 12%×2] × 0.75 = 40% × 0.75 = 30%."}],"Kunskapstest del 2":[{"question":"Vad menas vanligtvis med en expansiv penningpolitik?","options":["stimulans av efterfrågan via styrräntan","stimulans via devalveringar","stimulans via skattesänkningar","stimulans via transfereringar"],"correct":[0],"type":"single","explanation":"Expansiv penningpolitik = centralbanken sänker styrräntan."},{"question":"Vad är det primära syftet med 'sedelpressfinansiering'?","options":["att säkerställa lämnade krediter","att finansiera ett budgetunderskott","att stimulera privat konsumtion","att dämpa inflationsförväntningar"],"correct":[1],"type":"single","explanation":"Sedelpressfinansiering = staten finansierar budgetunderskott genom att centralbanken trycker pengar."},{"question":"Vad omfattas av begreppet finanspolitik?","options":["statens inkomster och utgifter","allmänhetens belåning av fastigheter","bankernas utlåning till allmänheten","kronans konkurrenskraft"],"correct":[0],"type":"single","explanation":"Finanspolitik = statens inkomster (skatter) och utgifter."},{"question":"Vilken del av kapitalmarknaden utgör marknad för riskkapital?","options":["penningmarknaden","obligationsmarknaden","aktiemarknaden","derivatmarknaden"],"correct":[2],"type":"single","explanation":"Aktiemarknaden = marknaden för riskkapital (equity)."},{"question":"Riksbanken höjer oväntat styrräntan. Vilken effekt är normal?","options":["långa statsobligationers värde stiger","inflationsförväntningarna går upp","bankerna höjer in- och utlåningsräntor","svenska företags konkurrenskraft ökar"],"correct":[2],"type":"single","explanation":"Bankerna höjer sina räntor. Obligationsvärden sjunker. Konkurrenskraft minskar (starkare krona)."},{"question":"Riksbankens viktigaste styrinstrument för att nå inflationsmålet?","options":["styra kort in-/utlåningsränta till affärsbanker","indirekt styra långa statsobligationsräntor","påverka växelkursen via valutapolitik","påverka penningutbudet genom sedeltryck"],"correct":[0],"type":"single","explanation":"Styrräntan (reporäntan) = viktigaste instrumentet."},{"question":"Vad innebär kreditmultiplikatorn?","options":["offentliga utgifter +1 kr → BNP +mer än 1 kr","utlåningsräntor ökar mer än inlåningsräntor","kreditvolymen växer snabbare än BNP","penningmängden växer snabbare än monetära basen"],"correct":[3],"type":"single","explanation":"Kreditmultiplikatorn: penningmängden ökar mer än den monetära basen genom bankernas utlåning."},{"question":"Finanspolitisk stimulans vid full sysselsättning. Vad händer på lång sikt (Phillipskurvan)?","options":["BNP och inflation ökar","BNP ökar, inflation oförändrad","inflation ökar, BNP oförändrad","båda oförändrade"],"correct":[2],"type":"single","explanation":"Långsiktiga Phillipskurvan är vertikal: BNP kan inte permanent överstiga potentiell BNP → bara inflation ökar."},{"question":"Ränteparitet innebär att räntor i två länder ska vara lika justerade för:","options":["skillnader i löptid","förväntad inflation","förväntad växelkursändring","skillnader i ränterisk"],"correct":[2],"type":"single","explanation":"Ränteparitet: ränteskillnaden ska motsvara förväntad växelkursförändring."},{"question":"Total produktion > total resursanvändning i ett land. Vad händer?","options":["budgetöverskottet ökar","budgetöverskottet minskar","utlandsskulden ökar","utlandsskulden minskar"],"correct":[3],"type":"single","explanation":"Överskottsproduktion → export → bytesbalansöverskott → utlandsskulden minskar."},{"question":"Hur stor andel av Sveriges BNP är privat konsumtion?","options":["cirka 10%","cirka 25%","cirka 50%","cirka 75%"],"correct":[2],"type":"single","explanation":"Privat konsumtion ≈ 45-50% av Sveriges BNP."},{"question":"Vilken makroekonomisk storhet varierar mest över en konjunkturcykel?","options":["privat konsumtion","offentlig konsumtion","bruttoinvesteringar","BNP"],"correct":[2],"type":"single","explanation":"Bruttoinvesteringar är mest volatila."},{"question":"Centralbanken sänker korta räntan i en liten öppen ekonomi med rörlig växelkurs. Vad händer?","options":["valutainflödena ökar, växelkursen försvagas","valutainflödena ökar, växelkursen stärks","valutainflödena minskar, växelkursen försvagas","valutainflödena minskar, växelkursen stärks"],"correct":[2],"type":"single","explanation":"Lägre ränta → mindre attraktivt att placera i SEK → valutainflöden minskar → kronan försvagas."},{"question":"Växelkursen SEK/EUR går från 11 till 10. Typ av förändring och effekt på import från Tyskland?","options":["kronan apprecieras, import billigare","kronan apprecieras, import dyrare","kronan deprecieras, import billigare","kronan deprecieras, import dyrare"],"correct":[0],"type":"single","explanation":"Färre kronor per euro = kronan starkare (apprecieras). Import i EUR blir billigare i SEK."},{"question":"Vad beskrivs typiskt som en carry trade?","options":["blankning + investering i annan aktie","placering i stats- och kreditobligationer","lån i en valuta, placering i en annan","köp utländska aktier med valutasäkring"],"correct":[2],"type":"single","explanation":"Carry trade = låna i lågräntevaluta, placera i högräntevaluta."},{"question":"Exempel på outsourcing?","options":["köpa upp underleverantörer","förvärva konkurrenter utomlands","lägga ut produktion på underleverantörer","licensiera varumärken till franchisetagare"],"correct":[2],"type":"single","explanation":"Outsourcing = lägga ut produktion/tjänster på externa underleverantörer."},{"question":"När går statsskuldkvoten upp?","options":["statsskulden som andel av BNP ökar","statsskulden som andel av BNP minskar","efterfrågan på statsobligationer ökar","efterfrågan på statsobligationer minskar"],"correct":[0],"type":"single","explanation":"Statsskuldkvoten = statsskuld/BNP."},{"question":"Vilket internationellt kapitalflöde räknas som realt i betalningsbalansen?","options":["svenskt företag exporterar varor till Tyskland","svensk aktiefond investerar i amerikanska fastighetsaktier","amerikansk placerare köper svensk kontrollpost","Riksgälden emitterar realobligationer på eurobondmarknaden"],"correct":[0],"type":"single","explanation":"Varuexport = realt flöde (handelsbalansen)."},{"question":"Vilken komponent ingår i betalningsbalansen men INTE bytesbalansen?","options":["handelsbalansen","tjänstebalansen","utlandsbiståndet","den finansiella balansen"],"correct":[3],"type":"s
