ingle","explanation":"Finansiella balansen ingår i betalningsbalansen men inte i bytesbalansen."},{"question":"J-kurveeffekten vid depreciering innebär att handelsbalansen initialt:","options":["försämras pga lägre exportpriser","förbättras pga högre exportpriser","förbättras pga lägre importpriser","försämras pga högre importpriser"],"correct":[3],"type":"single","explanation":"Depreciering → importpriser stiger omedelbart → handelsbalansen försämras initialt."},{"question":"Importföretag har 50M GBP skuld, förfaller om 3 mån. Vilken valutaexponering?","options":["ekonomisk exponering","transaktionsexponering","omräkningsexponering","säkringsexponering"],"correct":[1],"type":"single","explanation":"Avtalad framtida betalning i utländsk valuta = transaktionsexponering."},{"question":"Finansinspektionens huvudsakliga ansvarsområde för finansiell stabilitet?","options":["statliga insättningsgarantin","övervakning av enskilda finansiella företags hälsotillstånd","reglering av finansiella företag","betalningssystemet vid kris"],"correct":[1],"type":"single","explanation":"FI:s huvudansvar = microprudentiell tillsyn."},{"question":"Tre grundfunktioner i ett stabilt finansiellt system? Välj TRE.","options":["garantera pensionssystem","förmedla betalningar","möjliggöra bostadsfinansiering","omvandla sparande till finansiering","hantera risker","tillhandahålla bankkonton"],"correct":[1,3,4],"type":"multiple","explanation":"1) Förmedla betalningar, 2) Omvandla sparande till finansiering, 3) Hantera risker."},{"question":"Nominella räntan består av vilka delar? Välj TVÅ.","options":["real BNP-tillväxt","reala räntan","obligationsmarknadens riskpremie","real tillväxt i disponibla inkomster","förväntad inflation"],"correct":[1,4],"type":"multiple","explanation":"Fisher-ekvationen: nominell ränta = real ränta + förväntad inflation."},{"question":"Vilken händelse motiverar högre aktiekurs enligt Gordons formel?","options":["höjd utdelning nästa år","utdelningstillväxten väntas öka","avkastningskravet stiger","större andel vinst delas ut"],"correct":[1],"type":"single","explanation":"P = D/(k-g). Högre tillväxt (g) → mindre nämnare → högre pris."},{"question":"Korrekt påstående om förklaringsvärdet (R²)?","options":["Kan bara anta värden 0 till 1","Kan anta värden -1 till +1","R² < 0.5 anger passiv förvaltning","R² > 0.5 anger aktiv förvaltning"],"correct":[0],"type":"single","explanation":"R² ligger mellan 0 och 1."},{"question":"Vilken risk är företagsspecifik (osystematisk)?","options":["börsindex faller kraftigt","lågkonjunktur inträffar","VD lämnar bolaget","styrräntan stiger kraftigt"],"correct":[2],"type":"single","explanation":"VD som lämnar = unikt för bolaget."},{"question":"Fond med beta 0.50, riskfri ränta 3%, riskpremie 6%. Förväntad avkastning?","options":["4,5 %","6 %","7,5 %","9 %"],"correct":[1],"type":"single","explanation":"CAPM: E(R) = 3% + 0.50 × 6% = 6%."},{"question":"När ingår riskpremien som komponent i finansiell ekonomi?","options":["bedömning av likviditetsrisker","beräkning av avkastningskrav enligt CAPM","optionsvärdering enligt Black-Scholes","beräkning av duration"],"correct":[1],"type":"single","explanation":"Riskpremien är central i CAPM."},{"question":"Avkastning tre år: -5%, +12%, 0%. Geometrisk årsavkastning?","options":["7,00 %","6,40 %","2,33 %","2,09 %"],"correct":[3],"type":"single","explanation":"(0.95 × 1.12 × 1.00)^(1/3) - 1 ≈ 2,09%."},{"question":"Högt förklaringsvärde (R²) för en portfölj innebär?","options":["hög totalrisk","högt betavärde","högt alfavärde","hög diversifieringsgrad"],"correct":[3],"type":"single","explanation":"Högt R² = hög diversifiering."},{"question":"Problem i Value at Risk-sammanhang?","options":["korrelationerna oväntat sjunker","korrelationerna oväntat stiger","diversifierbar risk ökar","diversifierbar risk minskar"],"correct":[1],"type":"single","explanation":"Stigande korrelationer (kriser) gör att VaR underskattar risken."},{"question":"Placering A: E(R)=10%, σ=20%. Placering B: E(R)=20%, σ=40%. Sannolikhet för förlust?","options":["A har större sannolikhet","B har större sannolikhet","A och B har lika stor sannolikhet","Varken kan ge förlust"],"correct":[2],"type":"single","explanation":"Avstånd till noll: A = 10/20 = 0.5, B = 20/40 = 0.5. Samma!"},{"question":"Regressionsanalys: obligationsfond vs styrränta. Vilket mått visar sambandets styrka?","options":["interceptet","lutningskoefficienten","förklaringsvärdet","standardavvikelsen"],"correct":[2],"type":"single","explanation":"R² visar sambandets styrka."},{"question":"Enfaktormodell R_A = a + b×F + e. Vilken komponent beräknar unik risk?","options":["både b och e","endast e","endast b","både a och e"],"correct":[1],"type":"single","explanation":"e (feltermen) = företagsspecifik risk."},{"question":"VaR-skalning (1-dag till 10-dagar via √10). Vilket antagande krävs?","options":["dagsavkastningar positivt korrelerade","dagsavkastningar okorrelerade","dagsavkastningar mean-reverting","dagsavkastningar normalfördelade"],"correct":[1],"type":"single","explanation":"Skalregeln kräver okorrelerade avkastningar."},{"question":"1-dags 99% VaR = 100 mkr. Vad är 10-dagars 99% VaR?","options":["ca 175 mkr","ca 320 mkr","ca 725 mkr","ca 1000 mkr"],"correct":[1],"type":"single","explanation":"100 × √10 ≈ 316 mkr ≈ 320 mkr."},{"question":"Varför har tillgång med hög standardavvikelse hög risk?","options":["faktisk avkastning kan bli mycket låg","avkastningen kan inte vara normalfördelad","förväntad avkastning lägre än marknadens","betavärdet > 1,00"],"correct":[0],"type":"single","explanation":"Hög spridning = faktisk avkastning kan avvika kraftigt."},{"question":"Exempel på finansiell risk enligt teori?","options":["förväntad avkastning lägre än förra året","förväntad avkastning varierar slumpmässigt","realiserad avkastning kan bli högre än förväntad","realiserad kan inte överstiga förväntad"],"correct":[1],"type":"single","explanation":"Finansiell risk = osäkerhet, slumpmässig variation."},{"question":"Vilket begrepp tillhör portföljteorin?","options":["Effektiv front","Effektiv avkastning","Effektiv ränta","Effektiv placeringshorisont"],"correct":[0],"type":"single","explanation":"Effektiva fronten (Markowitz)."},{"question":"Vilken aktiefond har normalt lägst total risk?","options":["svensk indexfond","europeisk indexfond","global indexfond","nordamerikansk indexfond"],"correct":[0],"type":"single","explanation":"Svensk indexfond = ingen valutarisk."},{"question":"Korrekt om kovarians?","options":["i allmänhet negativ","kan vara positiv och negativ","noll för väldiversifierade portföljer","alltid mellan -1 och +1"],"correct":[1],"type":"single","explanation":"Kovarians kan anta alla reella värden."},{"question":"Vad krävs av marknadsportföljen i CAPM?","options":["högst förväntad avkastning","lägst standardavvikelse","lägst samvariation med samtliga tillgångar","samtliga tillgångar som kan prissättas"],"correct":[3],"type":"single","explanation":"Marknadsportföljen = alla prissättbara tillgångar."},{"question":"Vad menas med en effektiv portfölj?","options":["maximal effektivavkastning","handlas på effektiv marknad","ligger på effektiva fronten","ger positiv diversifieringseffekt"],"correct":[2],"type":"single","explanation":"Effektiv portfölj = ligger på effektiva fronten."},{"question":"Skillnad mellan standardavvikelse och korrelationskoefficient?","options":["Standardavvikelse kan aldrig bli negativ, korrelation kan","Korrelation påverkar inte portföljrisk, std gör det","Korrelation är bakåtblickande, std är inte det","Std mäter samvariation, korrelation gör det inte"],"correct":[0],"type":"single","explanation":"Standardavvikelse ≥ 0. Korrelation mellan -1 och +1."},{"question":"Korrekt beskrivning av diversifieringseffekten?","options":["kursuppgångar/nedgångar tar ut varandra","fler tillgångar → lägre total risk","mer räntepapper → mer diversifierad","aktieportfölj > obligationsportfölj långsiktigt"],"correct":[1],"type":"single","explanation":"Diversifiering: fler tillgångar → företagsspecifik risk diversifieras bort."},{"question":"Vilken formulering är CAPM?","options":["Förväntad avkastning = Ränta + Aktieavkastning","Förväntad avkastning = Tidspremie + Riskpremie","Förväntad avkastning = Ränta + Tidspremie","Förväntad avkastning = Riskpremie + Aktieavkastning"],"correct":[1],"type":"single","explanation":"⚠️ OSÄKERT SVAR — 'Tidspremie + Riskpremie' är en ovanlig formulering. Tolkning: Tidspremie = riskfri ränta, Riskpremie = beta × marknadens riskpremie."},{"question":"Jensens alpha anger skillnad mellan vilka två faktorer? Välj TVÅ.","options":["fondens risk","marknadens risk","fondens förväntade avkastning","riskfria avkastningen","fondens faktiska avkastning","avkastningen på marknaden"],"correct":[2,4],"type":"multiple","explanation":"Jensens alpha = faktisk avkastning - förväntad avkastning (enligt CAPM)."},{"question":"Vilken risk beaktas i Sharpekvoten?","options":["total risk","marknadsrisk","residualrisk","value at risk"],"correct":[0],"type":"single","explanation":"Sharpekvoten = (Rp-Rf)/σp, total risk."},{"question":"Tracking error mäter?","options":["total risk","systematisk risk","aktiv risk","indexrisk"],"correct":[2],"type":"single","explanation":"Tracking error = aktiv risk."},{"question":"Avkastningsmåttet i informationskvoten?","options":["totalavkastning","avkastning över riskfri ränta","avkastning över jämförelseindex","Jensens alfa"],"correct":[2],"type":"single","explanation":"Informationskvot = överavkastning vs index / tracking error."},{"question":"Kännetecknande för SIXPRX?","options":["inkluderar återinvesterade utdelningar","rent prisindex","bara 30 största aktierna","småbolagsindex"],"correct":[0],"type":"single","explanation":"SIXPRX = totalavkastningsindex med utdelningar."},{"question":"Vad visar en avkastningskurva?","options":["förhållande obligationsränta och löptid","obligationers avkastning senaste året","relation mellan räntefonders avkastning","obligationers risk vs avkastning"],"correct":[0],"type":"single","explanation":"Ränta (yield) som funktion av löptid."},{"question":"Vilken obligation har längst duration?","options":["löptid 8 år, kupong 6%","löptid 8 år, kupong 11%","löptid 15 år, kupong 6%","löptid 15 år, kupong 11%"],"correct":[2],"type":"single","explanation":"Längre löptid + lägre kupong = längst duration."},{"question":"Obligation: kupong 3%, löptid 10 år, nominellt 1000 kr. Marknadsränta 3%. Pris?","options":["< 1000 kr","≈ 1000 kr","> 1000 kr men < 2000 kr","> 2000 kr"],"correct":[1],"type":"single","explanation":"Kupong = marknadsränta → par."},{"question":"Obligation G: kupong 3%, yield 3%. Obligation H: kupong 3%, yield 4%. Priser?","options":["G = 100, H < 100","H = 100, G < 100","Båda < 100","Båda = 100"],"correct":[0],"type":"single","explanation":"G: kupong = yield → par. H: yield > kupong → rabatt."},{"question":"A och B: löptid 5 år, kupong 3%. A yield 3%, B yield 6%. Durationer?","options":["A = 5, B < 5","B = 5, A < 5","Båda < 5","Båda = 5"],"correct":[2],"type":"single","explanation":"Kupongobligationer: duration < löptid."},{"question":"Ettårig nollkupongsränta 3.0%, tvåårig 3.5%. Ettårig terminsränta (start år 2)?","options":["< 3.0%","= 3.0%","= 3.5%","> 3.5%"],"correct":[3],"type":"single","explanation":"(1.035)²/(1.03) - 1 ≈ 4.0%."},{"question":"Priset på en obligation när yielden sjunker?","options":["Priset stiger (diskonteringsräntan sjunker)","Priset sjunker (mindre attraktiv ränta)","Oförändrat (kupongräntan ändras inte)","Oförändrat (durationen påverkas inte)"],"correct":[0],"type":"single","explanation":"Lägre yield → högre nuvärde → högre pris."},{"question":"Duration som ränteriskmått antar vilken typ av avkastningskurveförändring?","options":["brantare","flackare","parallellt skift","icke-parallellt skift"],"correct":[2],"type":"single","explanation":"Duration antar parallellt skift."},{"question":"A och B: löptid 5 år, kupong 2%. A yield 3%, B yield 4%. Durationer?","options":["Båda < 5 år","Båda = 5 år","A = 5 år, B < 5 år","B = 5 år, A < 5 år"],"correct":[0],"type":"single","explanation":"Kupongobligationer: duration < löptid."},{"question":"Köpoption, lösenpris 100 kr, aktie 103 kr, lösen idag. Optionsvärde?","options":["0 kr","3 kr","100 kr","103 kr"],"correct":[1],"type":"single","explanation":"max(103-100, 0) = 3 kr."},{"question":"Forward eliminerar risk i lång position. Varför? Terminspriset:","options":["perfekt korrelerat med underliggande","okorrelerat med underliggande","bestäms vid tecknande","bestäms vid förfall"],"correct":[2],"type":"single","explanation":"Priset sätts vid tecknande → risk eliminerad."},{"question":"Du äger indexportfölj, orolig för nedgång. Vad gäller?","options":["utställd köpoption eliminerar förlust utan att begränsa uppsidan","kort termin eliminerar förlust men begränsar uppsidan","köpt köpoption = såld säljoption","köpt säljoption = kort termin"],"correct":[1],"type":"single","explanation":"Kort termin: låser pris."},{"question":"Euro kostar 10 SEK. Svensk ränta 3%, europeisk 6%. Ettårigt futurespris i SEK?","options":["mellan 9.40 och 10.00","10.00","mellan 10.00 och 10.60","10.60"],"correct":[0],"type":"single","explanation":"F = 10 × (1.03/1.06) ≈ 9.72 SEK."},{"question":"USD kostar 10 SEK. Svensk ränta 5%, amerikansk 3%. Volatiliteten i SEK/USD stiger 10%. Futurespris?","options":["stiger","oförändrat","sjunker"],"correct":[1],"type":"single","explanation":"Futurespris bestäms av ränteparitet, inte volatilitet."},{"question":"Portfölj: 50% amerikanska + 50% europeiska aktier i SEK. Mest negativa valutascenario?","options":["Både USD och EUR försvagas mot SEK","USD stärks, EUR försvagas","USD försvagas, EUR stärks","Båda stärks mot SEK"],"correct":[0],"type":"single","explanation":"Båda valutor försvagas = mest negativt."},{"question":"Aktie: pris 20 kr, utdelning 1 kr, utdelningstillväxt 10%/år. Avkastningskrav?","options":["5%","10%","15%","20%"],"correct":[2],"type":"single","explanation":"Gordon: 20 = 1/(k-0.10). k = 15%."},{"question":"Företagsvärdering: NV kassaflöden 100 mkr + NV horisont 900 mkr. Skuld 500 mkr. Bokfört EK 300 mkr. Kassa 200 mkr (100 nödvändig). Marknadsvärde EK?","options":["300 mkr","500 mkr","600 mkr","700 mkr"],"correct":[2],"type":"single","explanation":"EV = 1000. EK = 1000 - 500 + 100 = 600 mkr."},{"question":"Företag behöver öka fritt kassaflöde. Bästa åtgärd?","options":["öka anläggningsinvesteringar 100 mkr","minska rörelsekapital 100 mkr","sänka utdelning 100 mkr","öka kortfristiga lån 100 mkr"],"correct":[1],"type":"single","explanation":"Minskat rörelsekapital frigör kassaflöde direkt."},{"question":"Mycket stort lån + återköp aktier. Vad händer med WACC?","options":["stiger kraftigt","stiger en aning","sjunker en aning","sjunker kraftigt"],"correct":[1],"type":"single","explanation":"Överdriven belåning → financial distress → WACC stiger en aning."},{"question":"WACC-vikter baseras på vilka värden?","options":["bokfört EK och nettoskuld","bokfört EK, marknadsvärde nettoskuld","marknadsvärde EK, bokfört nettoskuld","marknadsvärde EK och nettoskuld"],"correct":[3],"type":"single","explanation":"WACC med marknadsvärden."},{"question":"Vilka delar ingår i sysselsatt kapital?","options":["eget kapital plus totala skulder","eget kapital plus rörelseskulder","totalt kapital minus likvida medel","anläggningstillgångar plus rörelsekapital"],"correct":[0],"type":"single","explanation":"⚠️ OSÄKERT SVAR — Sysselsatt kapital = EK + räntebärande skulder, inte EK + totala skulder. Inget alternativ matchar perfekt. Alt A är närmast men tekniskt felaktigt. Kontrollera gärna mot kursmaterialet."},{"question":"Vinstbegrepp 'högst upp' i resultaträkningen?","options":["EBIT","EBT","EBITDA","EBITA"],"correct":[2],"type":"single","explanation":"EBITDA ligger högst. Ordning: EBITDA → EBITA → EBIT → EBT."},{"question":"Avkastningskrav vid minskad skuldsättning genom nyemission?","options":["alla sjunker","EK-kravet sjunker","WACC sjunker","inget sjunker"],"correct":[1],"type":"single","explanation":"Lägre finansiell risk → EK-kravet sjunker. WACC oförändrat (M&M utan skatt)."},{"question":"Kapitalkostnad EK vid negativ nettoskuld (nettokassa)?","options":["högre än WACC","lika med WACC","lägre än WACC men positiv","lägre än WACC men negativ"],"correct":[2],"type":"single","explanation":"Nettokassa → EK-kostnad lägre än WACC men positiv."},{"question":"EK 40, Avsättningar 20, Räntebärande skulder 30, Leverantörsskulder 10. Skuldsättningsgrad?","options":["1,50","1,25","1,00","0,75"],"correct":[3],"type":"single","explanation":"Skuldsättningsgrad = 30/40 = 0,75."},{"question":"Vilka figurer har perfekt positiv korrelation mellan A och B?","options":["Figur 1 (samma riktning, olika amplitud)","Figur 2 (samma riktning, samma amplitud)","Figur 3 (ibland sammanfaller)","Figur 4 (exakt samma mönster)"],"correct":[3],"type":"single","explanation":"⚠️ FIGURFRÅGA — utan originalbilden kan svaret vara fel. Perfekt positiv korrelation = exakt proportionellt samma rörelse."}]};
var MODULES=Object.keys(DATA);
var MOD_DESC={"Modul 1": "Finansiella instrument, marknader & handel", "Modul 2": "Ekonomisk analys", "Modul 3": "Etik & regelverk", "Kunskapskrav": "AI-genererade frågor från kunskapskraven", "Gamla prov (Finans)": "Finansiella instrument — provfrågor med facit", "Gamla prov (Ekonomi)": "Ekonomisk analys — provfrågor med facit", "Gamla prov (Etik)": "Etik & regelverk — provfrågor med facit", "Fel svar": "Frågor du svarat fel på — öva tills du kan dem!", "Kunskapstest del 2": "Övningsfrågor från diagnostest och övningsprov"}

var S={screen:"menu",mod:null,qs:[],qi:0,sel:[],done:false,res:{},mode:"all",confirmReset:false};

try { var saved=localStorage.getItem("sq_res8"); if(saved) S.res=JSON.parse(saved); } catch(e){}

function save(){try{localStorage.setItem("sq_res8",JSON.stringify(S.res))}catch(e){}}

function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function stats(m){var r=S.res[m]||{};var t=DATA[m].length;var a=Object.keys(r).length;var c=0;for(var k in r){if(r[k])c++;}return{t:t,a:a,c:c,w:a-c,p:a?Math.round(c/a*100):0};}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function ring(p,col,sz){
  sz=sz||54;var r=(sz-4)/2;var c=2*Math.PI*r;var o=c-(p/100)*c;
  return '<div class="ring-container" style="width:'+sz+'px;height:'+sz+'px"><svg width="'+sz+'" height="'+sz+'" style="transform:rotate(-90deg)"><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="#1e1a35" stroke-width="4"/><circle cx="'+sz/2+'" cy="'+sz/2+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="4" stroke-dasharray="'+c+'" stroke-dashoffset="'+o+'" stroke-linecap="round" style="transition:stroke-dashoffset .6s"/></svg><span class="ring-text" style="color:'+col+'">'+p+'%</span></div>';
}

function R(){var a=document.getElementById("app");if(S.screen==="menu")renderMenu(a);else if(S.screen==="quiz")renderQuiz(a);else renderResult(a);}

function renderMenu(a){
  var total=0;var totalA=0;var totalC=0;
  for(var mi=0;mi<MODULES.length;mi++){var s=stats(MODULES[mi]);total+=s.t;totalA+=s.a;totalC+=s.c;}
  var totalP=totalA?Math.round(totalC/totalA*100):0;

  var h='<div class="header"><div class="logo">S</div><div><div class="title">SwedSec f\u00f6r min \u00e4lsklingsprinsessa</div><div class="subtitle">'+total+' fr\u00e5gor \u00b7 '+MODULES.length+' moduler \u00b7 med f\u00f6rklaringar</div></div></div>';

  var cols=["#8b5cf6","#a855f7","#0891b2","#f59e0b","#10b981"];
  for(var mi=0;mi<MODULES.length;mi++){
    var m=MODULES[mi];var s=stats(m);var col=cols[mi%cols.length];
    h+='<div class="card"><div style="display:flex;align-items:center;gap:16px;margin-bottom:10px">'+ring(s.p,col)+'<div><div class="mod-name">'+m+'</div><div class="mod-desc">'+(MOD_DESC[m]||'')+'</div></div></div><div class="stats"><span>'+s.t+' fr\u00e5gor</span>';
    if(s.a>0)h+='<span class="green">'+s.c+' r\u00e4tt</span>';
    if(s.w>0)h+='<span class="red">'+s.w+' fel</span>';
    h+='</div><div class="btn-row"><button class="btn btn-primary" onclick="go(\''+m+'\',\'all\')">Starta quiz</button>';
    if(s.w>0)h+='<button class="btn btn-secondary" onclick="go(\''+m+'\',\'wrong\')">Tr\u00e4na fel ('+s.w+')</button>';
    h+='</div></div>';
  }
  var hasRes=false;for(var k in S.res){hasRes=true;break;}
  if(hasRes){
    if(!S.confirmReset){
      h+='<button class="btn btn-danger" style="width:100%;margin-top:14px" onclick="S.confirmReset=true;R()">\u00c5terst\u00e4ll alla resultat</button>';
    }else{
      h+='<div class="confirm-row"><span class="confirm-text">\u00c4r du s\u00e4ker?</span><button class="btn btn-danger" style="flex:1" onclick="S.res={};S.confirmReset=false;save();R()">Ja, nollst\u00e4ll</button><button class="btn btn-ghost" style="flex:1" onclick="S.confirmReset=false;R()">Avbryt</button></div>';
    }
  }
  a.innerHTML=h;
}

function go(m,mode){
  S.mod=m;S.mode=mode;S.confirmReset=false;
  var qs=[];
  if(mode==="wrong"){
    var r=S.res[m]||{};
    for(var k in r){if(!r[k]){var idx=parseInt(k);var q=DATA[m][idx];qs.push({question:q.question,options:q.options,correct:q.correct,multiSelect:q.multiSelect,explanation:q.explanation,oi:idx});}}
  }else{
    for(var i=0;i<DATA[m].length;i++){var q=DATA[m][i];qs.push({question:q.question,options:q.options,correct:q.correct,multiSelect:q.multiSelect,explanation:q.explanation,oi:i});}
  }
  S.qs=shuffle(qs);S.qi=0;S.sel=[];S.done=false;S.screen="quiz";R();window.scrollTo(0,0);
}

function renderQuiz(a){
  var q=S.qs[S.qi],tot=S.qs.length;
  var pct=Math.round((S.qi+(S.done?1:0))/tot*100);
  var r=S.res[S.mod]||{};
  var cSoFar=0;for(var i=0;i<=S.qi-(S.done?0:1);i++){if(i>=0&&r[S.qs[i].oi])cSoFar++;}
  var wSoFar=S.qi+(S.done?1:0)-cSoFar;

  var h='<div class="topbar"><div class="topbar-left"><button class="back-btn" onclick="S.screen=\'menu\';R()">\u2190</button><span class="progress-text">'+(S.qi+1)+' / '+tot+'</span></div><div class="score-pill"><span style="color:#4ade80">\u2713 '+cSoFar+'</span><span style="color:#4c3b8f">|</span><span style="color:#f87171">\u2717 '+wSoFar+'</span></div></div>';
  h+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%"></div></div>';

  var badge=q.multiSelect?'Flerval \u2014 v\u00e4lj '+q.correct.length+' alternativ':'Enkelval';
  h+='<span class="q-badge">'+badge+'</span>';
  h+='<div class="q-text">'+esc(q.question)+'</div>';

  for(var i=0;i<q.options.length;i++){
    var cls="option";
    if(S.done){
      var ws=S.sel.indexOf(i)>=0;var ic=q.correct.indexOf(i)>=0;
      if(ws&&ic)cls+=" correct";else if(ws&&!ic)cls+=" wrong";else if(!ws&&ic)cls+=" missed";
    }else{if(S.sel.indexOf(i)>=0)cls+=" selected";}
    var ltr=String.fromCharCode(65+i);
    var mark=ltr;
    if(S.done&&q.correct.indexOf(i)>=0)mark="\u2713";
    else if(S.done&&S.sel.indexOf(i)>=0&&q.correct.indexOf(i)<0)mark="\u2717";
    h+='<div class="'+cls+'" onclick="tog('+i+')"><div class="opt-marker">'+mark+'</div><div>'+esc(q.options[i])+'</div></div>';
  }

  if(S.done){
    var selSorted=S.sel.slice().sort();var corSorted=q.correct.slice().sort();
    var ok=selSorted.length===corSorted.length;
    if(ok){for(var i=0;i<selSorted.length;i++){if(selSorted[i]!==corSorted[i]){ok=false;break;}}}
    h+='<div class="explain-box">';
    h+=ok?'<div class="explain-correct">\u2705 R\u00e4tt svar!</div>':'<div class="explain-wrong">\u274c Fel svar</div>';
    if(q.explanation){h+='<div class="explain-label">\ud83d\udca1 F\u00f6rklaring</div><div style="color:#d4cceb">'+esc(q.explanation)+'</div>';}
    h+='</div>';
    var isLast=S.qi>=tot-1;
    h+='<button class="btn '+(isLast?"btn-success":"btn-primary")+'" style="width:100%;margin-top:8px" onclick="nxt()">'+(isLast?"Se resultat \u2192":"N\u00e4sta fr\u00e5ga \u2192")+'</button>';
  }else{
    var dis=S.sel.length===0?"opacity:0.35;pointer-events:none":"";
    h+='<button class="btn btn-primary" style="width:100%;margin-top:14px;'+dis+'" onclick="sub()">Svara</button>';
  }
  a.innerHTML=h;
}

function renderResult(a){
  var r=S.res[S.mod]||{};
  var c=0,t=S.qs.length;
  var wrong=[];
  for(var i=0;i<S.qs.length;i++){if(r[S.qs[i].oi])c++;else wrong.push(S.qs[i]);}
  var p=Math.round(c/t*100);
  var col=p>=70?"#4ade80":"#f87171";
  var h='<div style="text-align:center;padding:24px 0"><div class="result-pct" style="color:'+col+'">'+p+'%</div><div class="result-sub">'+c+' av '+t+' r\u00e4tt</div><div class="result-title">'+(p>=70?'Bra jobbat! \ud83c\udf89':'Forts\u00e4tt tr\u00e4na! \ud83d\udcaa')+'</div></div>';
  if(wrong.length>0){
    h+='<div style="margin:24px 0"><h3 style="color:#c084fc;font-size:15px;font-weight:700;margin-bottom:12px">Fr\u00e5gor att repetera ('+wrong.length+'):</h3>';
    for(var i=0;i<wrong.length;i++){
      var txt=wrong[i].question.split("\n")[0];if(txt.length>130)txt=txt.substring(0,130)+"\u2026";
      h+='<div class="wrong-item">'+esc(txt)+'</div>';
    }
    h+='</div>';
  }
  h+='<div class="btn-row"><button class="btn btn-primary" onclick="S.screen=\'menu\';R()">Tillbaka</button>';
  if(wrong.length>0)h+='<button class="btn btn-secondary" onclick="go(\''+S.mod+'\',\'wrong\')">Tr\u00e4na fel ('+wrong.length+')</button>';
  h+='<button class="btn btn-ghost" onclick="go(\''+S.mod+'\',\'all\')">G\u00f6r om alla</button></div>';
  a.innerHTML=h;
}

function tog(i){
  if(S.done)return;
  var q=S.qs[S.qi];
  if(q.multiSelect){var x=S.sel.indexOf(i);if(x>=0)S.sel.splice(x,1);else S.sel.push(i);}
  else{S.sel=[i];}
  R();
}

function sub(){
  if(S.sel.length===0)return;
  var q=S.qs[S.qi];
  var selSorted=S.sel.slice().sort();var corSorted=q.correct.slice().sort();
  var ok=selSorted.length===corSorted.length;
  if(ok){for(var i=0;i<selSorted.length;i++){if(selSorted[i]!==corSorted[i]){ok=false;break;}}}
  if(!S.res[S.mod])S.res[S.mod]={};
  S.res[S.mod][q.oi]=ok;
  save();S.done=true;R();
  setTimeout(function(){var el=document.querySelector('.explain-box');if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);
}

function nxt(){
  if(S.qi<S.qs.length-1){S.qi++;S.sel=[];S.done=false;R();window.scrollTo(0,0);}
  else{S.screen="result";R();window.scrollTo(0,0);}
}

R();
</script>
</body>
</html>
