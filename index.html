er och andra lån","Frågor om säkerhetskrav vid handel med standariserade optioner och terminer"],"correct":[1],"multiSelect":false,"explanation":"Allmänna villkor för handel med finansiella instrument behandlar frågor om när pengar och värdepapper ska göras tillgängliga för kunden respektive banken — dvs. avvecklingsprocessen."},{"question":"I dataskyddsförordningen gör man skillnad på känsliga personuppgifter och andra personuppgifter. Vilket av följande är ett exempel på känsliga personuppgifter?","options":["Personnummer","Medborgarskap","Konsumtionsmönster","Medlemskap i fackförening"],"correct":[3],"multiSelect":false,"explanation":"Medlemskap i fackförening är en känslig personuppgift enligt dataskyddsförordningen (GDPR). Personnummer, medborgarskap och konsumtionsmönster är personuppgifter men inte känsliga i GDPR:s mening."},{"question":"Enligt dataskyddsförordningen har den vars personuppgifter behandlas av en bank vissa rättigheter.\n\nPersonen kan kräva:","options":["Att uppgifterna endast behandlas för ändamål som gynnar personen i fråga","Att felaktiga uppgifter korrigeras","Att uppgifterna raderas, oavsett skälet till att banken behandlar dem","Att företaget regelbundet informerar om varje behandling av personuppgifterna"],"correct":[1],"multiSelect":false,"explanation":"Enligt GDPR har den registrerade rätt att kräva att felaktiga personuppgifter korrigeras (rättas). Rätten att radera uppgifter är inte absolut — den gäller inte om det finns laglig grund att behålla dem."}],"Kunskapskrav":[{"question":"En pensionssparare vill placera sitt månadssparande i en bred global fond. Vilken aktör på retailmarknaden har som huvuduppgift att förvalta detta kapital?","options":["En investmentbank","Ett fondbolag","En market maker","En mäklare"],"correct":[1],"multiSelect":false,"explanation":"Fondbolag förvaltar fonder åt privatpersoner (retailkunder). Investmentbanker och market makers verkar på den institutionella marknaden."},{"question":"På den institutionella marknaden finns flera aktörer med olika funktioner. Vilken aktör har som främsta uppgift att ställa köp- och säljkurser för att säkerställa likviditet i handeln?","options":["En kapitalförvaltare","En market maker","Ett fondbolag","En börs"],"correct":[1],"multiSelect":false,"explanation":"En market maker ställer löpande köp- och säljkurser och säkerställer därmed att det finns likviditet i marknaden. Kapitalförvaltare investerar kapital, fondbolag förvaltar fonder, och börsen tillhandahåller handelsplattformen."},{"question":"Vilken av följande är en korrekt beskrivning av skillnaden mellan en statsskuldväxel och ett räntecertifikat?","options":["Statsskuldväxlar har kupongränta medan räntecertifikat är nollkupongare","Statsskuldväxlar emitteras av Riksgälden medan räntecertifikat kan emitteras av banker och kommuner","Räntecertifikat har alltid längre löptid än statsskuldväxlar","Det finns ingen skillnad — det är olika namn på samma instrument"],"correct":[1],"multiSelect":false,"explanation":"Statsskuldväxlar emitteras av Riksgälden (staten) medan räntecertifikat emitteras av andra aktörer som affärsbanker och kommuner. Båda är penningmarknadsinstrument med kort löptid."},{"question":"En depositplacering hos en bank innebär att:","options":["Banken placerar pengar hos kunden mot ränta","Kunden lånar ut pengar till banken under en bestämd tid mot ränta","Kunden köper en obligation utfärdad av banken","Banken garanterar en viss avkastning på kundens aktieportfölj"],"correct":[1],"multiSelect":false,"explanation":"En depositplacering innebär att kunden placerar (lånar ut) pengar hos banken under en bestämd tid och erhåller ränta. Det är ett av de vanligaste penningmarknadsinstrumenten."},{"question":"En investerare funderar på att köpa en säkerställd obligation (covered bond). Vilken egenskap skiljer den mest från en vanlig företagsobligation?","options":["Den har alltid högre kupongränta","Den har en underliggande säkerhetsmassa, t.ex. bostadslån","Den kan bara köpas av institutionella investerare","Den är alltid emitterad av staten"],"correct":[1],"multiSelect":false,"explanation":"Säkerställda obligationer har en underliggande säkerhetsmassa (typiskt bostadslån eller offentliga krediter) som skyddar investeraren vid emittentens konkurs. Detta ger lägre risk och lägre ränta jämfört med vanliga företagsobligationer."},{"question":"Ett FRN-lån (Floating Rate Note) skiljer sig från en vanlig obligation genom att:","options":["Det saknar kupongbetalningar","Dess kupongränta justeras periodvis, exempelvis kopplad till STIBOR","Det alltid har kortare löptid än ett år","Det bara kan emitteras av staten"],"correct":[1],"multiSelect":false,"explanation":"FRN (Floating Rate Note) är ett räntebärande instrument vars ränta justeras periodvis, ofta kopplad till en referensränta som STIBOR. Till skillnad från en fastränteobligation förändras kupongen över tid."},{"question":"Vilken av följande beskrivningar av efterställda skulder (förlagslån) är korrekt?","options":["De har företräde framför alla andra fordringar vid konkurs","De har lägre ränta än vanliga obligationer på grund av lägre risk","Vid konkurs får fordran betalas först efter att andra gäldenärers skulder betalats","De kan aldrig konverteras till aktier"],"correct":[2],"multiSelect":false,"explanation":"Efterställda skulder (förlagslån) har vid konkurs sämre prioritet — de betalas först efter att övriga gäldenärers skulder har reglerats. Detta innebär högre risk, och därmed högre ränta. Konvertibler är ofta en form av förlagslån."},{"question":"En rating på BBB- hos Standard & Poor's innebär att obligationen:","options":["Klassas som speculative grade (high yield)","Ligger precis på gränsen till investment grade","Har den högsta möjliga kreditvärdigheten","Inte kan handlas på den svenska marknaden"],"correct":[1],"multiSelect":false,"explanation":"BBB- är det lägsta betyget inom investment grade hos S&P. Ett steg nedåt (BB+) innebär att obligationen klassas som speculative grade/high yield. Gränsen investment grade/speculative grade går vid BBB-/Baa3."},{"question":"Vad skiljer en hållbarhetslänkad obligation från en grön obligation?","options":["En hållbarhetslänkad obligation har alltid lägre ränta","En grön obligation öronmärker kapitalet för miljöprojekt, medan en hållbarhetslänkad obligation kopplar villkoren till uppnående av hållbarhetsmål","En grön obligation kan bara emitteras av stater","Det finns ingen skillnad — de följer samma principer"],"correct":[1],"multiSelect":false,"explanation":"En grön obligation öronmärker hela likviden till specifika miljöprojekt. En hållbarhetslänkad obligation däremot öronmärker inte kapitalet, utan kopplar istället obligationens villkor (t.ex. räntan) till huruvida emittenten uppnår förutbestämda hållbarhetsmål."},{"question":"En investerare tittar på sociala obligationer. Vilken beskrivning stämmer?","options":["Kapitalet öronmärks för tydlig social nytta, som minskad hemlöshet eller bättre hälsa","Avkastningen beror helt på om sociala mål uppnås — annars förloras hela kapitalet","De lyder inte under samma lagstiftning som vanliga ränteinstrument","De kan bara emitteras av kommuner och regioner"],"correct":[0],"multiSelect":false,"explanation":"Sociala obligationer är marknadsnoterade och reglerade instrument vars kapital öronmärks för projekt med tydlig social nytta. De lyder under samma lagstiftning som vanliga ränteinstrument. Sociala utfallskontrakt däremot är kontrakt mellan parter där avkastningen beror på om målen uppnås."},{"question":"Medium Term Notes (MTN) är:","options":["Statsobligationer med medellång löptid","Skuldebrev med perioder på typiskt 5-10 år, ofta emitterade via investmentbanker","Penningmarknadsinstrument med löptid under ett år","En typ av strukturerad produkt med kapitalgaranti"],"correct":[1],"multiSelect":false,"explanation":"MTN (Medium Term Notes) är skuldebrev med löptider på typiskt 5-10 år. De ges ofta ut av företag via investmentbanker genom s.k. scheduled programmes, vilket gör det möjligt att emittera löpande under programmets ram."},{"question":"En omvänd repa innebär att:","options":["Riksbanken säljer ett värdepapper och köper tillbaka det senare","Riksbanken lånar in pengar med ett värdepapper som säkerhet","En bank säljer obligationer utan återköpsavtal","En bank tar ut pengar ur RIX-systemet"],"correct":[1],"multiSelect":false,"explanation":"Vid en omvänd repa lånar Riksbanken in pengar från banksystemet med ett värdepapper som säkerhet. En vanlig repa är motsatsen — Riksbanken lånar ut pengar med värdepapper som säkerhet."},{"question":"En Credit Default Swap (CDS) kan bäst beskrivas som:","options":["Ett försäkringslikt kontrakt som överför kreditrisken från köparen till säljaren mot en löpande premie","En ränteswap där parterna byter fast ränta mot rörlig ränta","En termin på en obligations framtida kreditbetyg","En option som ger rätten att köpa en obligation till ett förutbestämt pris"],"correct":[0],"multiSelect":false,"explanation":"En CDS fungerar som en försäkring mot kreditrisk. Köparen betalar en löpande premie till säljaren, och om en kredithändelse (t.ex. konkurs) inträffar i det underliggande bolaget ersätter CDS-säljaren köparen. CDS-priset är ett snabbare mått på kreditrisk än kreditrating."},{"question":"En preferensaktie skiljer sig från en stamaktie genom att den:","options":["Alltid har högre rösträtt","Har företräde till utdelning men ofta begränsad uppsida och rösträtt","Inte kan handlas på börsen","Alltid har samma röstvärde som stamaktien"],"correct":[1],"multiSelect":false,"explanation":"Preferensaktier har företräde till utdelning framför stamaktier, men har ofta begränsad rösträtt och begränsad uppsida. Om utdelningen ställs in ackumuleras skulden till preferensaktieägarna. Stamaktieägarna kan rösta om att lösa in preferensaktier till lösenpriset."},{"question":"En konvertibel kvoteras till 120. Vad innebär detta?","options":["Konvertibeln kostar 120 kronor","Konvertibeln är värd 120% av sitt nominella värde","Konvertibeln ger 120% ränta","Konverteringskursen är 120 kronor per aktie"],"correct":[1],"multiSelect":false,"explanation":"Konvertibler kvoteras i procent av nominellt värde. En kurs på 120 innebär att konvertibeln handlas till 120% av nominellt värde — dvs. en konvertibel med 10 kr nominellt är värd 12 kr. Premien speglar optionsvärdet i konverteringsrätten."},{"question":"En Contingent Convertible Bond (CoCo) skiljer sig från en vanlig konvertibel genom att:","options":["Innehavaren fritt kan välja när konvertering sker","Konvertering bara kan ske vid en förutbestämd triggerhändelse, t.ex. att ett nyckeltal understiger en viss nivå","Den aldrig kan konverteras till aktier","Den alltid har högre kupongränta än vanliga obligationer"],"correct":[1],"multiSelect":false,"explanation":"En CoCo-obligation konverteras automatiskt till aktier när en förutbestämd triggerhändelse inträffar, t.ex. att bankens kärnprimärkapitalrelation faller under en viss nivå. Risken är att innehavaren ofrivilligt blir aktieägare vid en oönskad tidpunkt."},{"question":"Du har köpt en säljoption med lösenpris 100 kr. Vid lösen är aktiekursen 85 kr. Vad är optionens realvärde?","options":["0 kr — optionen är värdelös","15 kr","85 kr","100 kr"],"correct":[1],"multiSelect":false,"explanation":"En säljoptions realvärde beräknas som Max(X - S, 0) = Max(100 - 85, 0) = 15 kr. Innehavaren har rätt att sälja aktien för 100 kr trots att marknadspriset bara är 85 kr, vilket ger ett realvärde på 15 kr."},{"question":"En investerare utfärdar (säljer) en köpoption. Vilken riskprofil har denna position?","options":["Begränsad förlust och begränsad vinst","Obegränsad förlust och begränsad vinst (premien)","Begränsad förlust (premien) och obegränsad vinst","Obegränsad förlust och obegränsad vinst"],"correct":[1],"multiSelect":false,"explanation":"Den som utfärdar en köpoption tar emot premien men har en teoretiskt obegränsad förlustrisk om aktiekursen stiger kraftigt. Vinsten är begränsad till den mottagna premien. Formeln: -Max(S - X, 0) + premie."},{"question":"Vid en börsintroduktion (IPO) används ofta en övertilldelningsoption ('greenshoe'). Vad är dess syfte?","options":["Att ge tidiga investerare rätt att köpa fler aktier till rabatterat pris","Att möjliggöra stabilisering av aktiekursen efter noteringen genom att emittera ytterligare aktier","Att garantera att alla som tecknat aktier får tilldelning","Att tvinga befintliga aktieägare att behålla sina aktier under en viss period"],"correct":[1],"multiSelect":false,"explanation":"En övertilldelningsoption ger den ansvariga banken rätt att emittera ytterligare aktier (vanligen upp till 15%) för att stabilisera kursen efter noteringen. Lock-up-avtal är det som hindrar befintliga ägare från att sälja sina aktier under en period."},{"question":"Vad innebär en lock-up vid en börsintroduktion?","options":["Att handeln i aktien stoppas tillfälligt vid kraftiga kursrörelser","Att befintliga ägare förbinder sig att inte sälja sina aktier under en viss period efter noteringen","Att investerare som tecknat aktier inte kan sälja dem förrän nästa kvartal","Att aktiekursen har ett förutbestämt golv under de första handelsdagarna"],"correct":[1],"multiSelect":false,"explanation":"Lock-up innebär att befintliga ägare (t.ex. grundare, tidiga investerare) avtalar om att inte sälja sina aktier under en bestämd period efter börsnoteringen, typiskt 3-12 månader. Syftet är att undvika att stora försäljningar pressar kursen."},{"question":"Vid en nyemission med företrädesrätt, vad händer med aktiekursen på ex-dagen?","options":["Den stiger eftersom bolaget tillförs kapital","Den faller med ett belopp som motsvarar teckningsrättens värde","Den är oförändrad eftersom teckningsrätterna har eget värde","Den stiger med teckningskursens belopp"],"correct":[1],"multiSelect":false,"explanation":"På ex-dagen, när aktien handlas utan teckningsrätt, faller kursen med ett belopp som ungefär motsvarar teckningsrättens värde. Totalt förändras dock inte aktieägarens förmögenhet — värdet delas upp mellan aktien och teckningsrätten."},{"question":"En aktie handlas till 200 kr dagen innan ex-utdelningsdagen. Utdelningen är 10 kr. Vilket pris kan förväntas vid öppning på ex-dagen, allt annat lika?","options":["210 kr","200 kr","190 kr","180 kr"],"correct":[2],"multiSelect":false,"explanation":"På ex-utdelningsdagen handlas aktien utan rätt till utdelningen, och priset faller normalt med utdelningsbeloppet. 200 - 10 = 190 kr. Den totala förmögenheten för aktieägaren (aktie + utdelning) är dock oförändrad."},{"question":"Budplikt uppstår när en aktieägare, ensam eller tillsammans med närstående, innehar:","options":["10% av rösterna","20% av aktierna","30% av rösterna","50% av aktierna"],"correct":[2],"multiSelect":false,"explanation":"Budplikt innebär skyldighet att lämna ett offentligt uppköpserbjudande och uppstår vid 30% av rösterna i bolaget. Observera att det är rösterna (inte aktierna) som räknas, och att närstående personers innehav räknas samman."},{"question":"Vid vilken ägarandel har en majoritetsägare rätt att tvångsinlösa minoritetens aktier?","options":["50% av kapitalet","67% av kapitalet","90% av kapitalet","95% av kapitalet"],"correct":[2],"multiSelect":false,"explanation":"Tvångsinlösen kan ske när en aktieägare äger minst 90% av kapitalet. Majoritetsägaren har då rätt att lösa in resterande aktier, men även minoriteten har rätt att kräva att bli inlöst. Vid tvist får majoritetsägaren förhandstillträde mot att ställa säkerhet."},{"question":"Vilket av följande påståenden om återköp av egna aktier i ett publikt aktiebolag är korrekt?","options":["Bolaget får inneha upp till 25% av aktiekapitalet i egna aktier","Återköp får ske med bundet eget kapital","Stämman beslutar om återköp med 2/3 majoritet och max 10% av aktiekapitalet får innehas","Återköp kräver godkännande av Finansinspektionen"],"correct":[2],"multiSelect":false,"explanation":"Ett publikt AB får inneha högst 10% av aktiekapitalet i egna aktier. Återköpet ska ske på börsen eller genom erbjudande till samtliga ägare. Stämman beslutar med 2/3 majoritet och bara fritt eget kapital får användas."},{"question":"En kapitalskyddad strukturerad produkt består typiskt av:","options":["Två aktier med negativ korrelation","En nollkupongobligation (trygghet) plus en köpoption (avkastningsmöjlighet)","En ränteswap och en terminsposition","En fond kombinerad med en försäkring"],"correct":[1],"multiSelect":false,"explanation":"En kapitalskyddad produkt kombinerar en nollkupongobligation (som säkerställer att nominellt belopp återbetalas vid förfall) med en köpoption på underliggande tillgång (som ger möjlighet till avkastning vid uppgång)."},{"question":"En investerare köper ett hävstångscertifikat med hävstång 10 kopplat till ett index. Marknaden stiger 1% en dag och faller 1% nästa dag. Vad händer med certifikatets värde jämfört med index?","options":["Certifikatet återgår till samma värde som index","Certifikatet tappar mer i värde än index på grund av ränta-på-ränta-effekten i en svängande marknad","Certifikatet stiger mer än index","Certifikatet påverkas inte av dagliga svängningar"],"correct":[1],"multiSelect":false,"explanation":"I en svängande marknad drabbas hävstångscertifikat av negativ ränta-på-ränta-effekt. Med hävstång 10: dag 1: 100 × 0.90 × 1.10 = 99.0 (index: 100 × 0.99 × 1.01 = 99.99). Certifikatet tappar alltså oproportionerligt mycket i en sidledes marknad."},{"question":"Vad innebär deltagandegraden i en kapitalskyddad strukturerad produkt?","options":["Den andel av kapitalet som är skyddat","Den andel av underliggande tillgångs uppgång som investeraren får ta del av","Procentandelen av premien som går till avgifter","Den maximala möjliga avkastningen uttryckt i procent"],"correct":[1],"multiSelect":false,"explanation":"Deltagandegraden anger hur stor del av en gynnsam utveckling i underliggande tillgång som investeraren får ta del av. En deltagandegrad på 0.5 innebär att investeraren får 50% av uppgången. Man kan generellt öka deltagandegraden genom att köpa till överkurs."},{"question":"Vilken typ av strukturerad produkt har en barriärnivå (knock-out) som gör att den påverkas mindre av volatilitet?","options":["Trackercertifikat","Maxcertifikat","Turbowarrant","Autocall"],"correct":[2],"multiSelect":false,"explanation":"En turbowarrant är en vanlig warrant kombinerad med en knock-out-barriär. Tack vare barriären påverkas priset betydligt mindre av förändringar i underliggande tillgångs volatilitet jämfört med en vanlig warrant. Priset bestäms främst av realvärdet."},{"question":"Vilken kostnad ingår INTE i den årliga avgiften för en fond?","options":["Förvaltningsavgift","Förvaringskostnader","Transaktionskostnader","Revisionskostnader"],"correct":[2],"multiSelect":false,"explanation":"Transaktionskostnader (courtage) ingår inte i den årliga avgiften — de tas direkt ur fonden. Inte heller prestationsbaserade avgifter eller insättnings/uttagsavgifter ingår. Förvaltningsavgift, förvaringskostnader och revisionskostnader ingår."},{"question":"Normanbeloppet beräknas utifrån ett sparande om:","options":["500 kr/månad i 5 år","1000 kr/månad i 10 år","2000 kr/månad i 10 år","1000 kr/månad i 20 år"],"correct":[1],"multiSelect":false,"explanation":"Normanbeloppet är ett standardiserat räkneexempel baserat på ett sparande om 1000 kr per månad i 10 år. Det visar skillnaden mellan vad kunden hade fått utan avgifter och vad kunden faktiskt får efter avgifter."},{"question":"Vilken av följande beskrivningar av en specialfond är korrekt?","options":["Den måste följa alla UCITS-regler men har en speciell placeringsinriktning","Den har fått undantag från en eller flera regler som gäller för värdepappersfonder och får därför inte fritt marknadsföras inom EU","Den får bara investera i alternativa tillgångar som fastigheter och råvaror","Den är inte reglerad och kräver inget tillstånd"],"correct":[1],"multiSelect":false,"explanation":"En specialfond har begärt och fått undantag från en eller flera UCITS-regler. Då den inte följer UCITS fullt ut klassas den som en alternativ investeringsfond och får inte fritt marknadsföras i Europa. För försäljning till icke-professionella krävs tillstånd i varje land."},{"question":"Vad skiljer en börshandlad fond (ETF) från en traditionell fond?","options":["ETF:er har alltid lägre risk","ETF-andelar handlas löpande på börsen till marknadspris medan traditionella fonder handlas till NAV-kurs en gång per dag","ETF:er får bara investera i aktier","Traditionella fonder har alltid högre avgifter"],"correct":[1],"multiSelect":false,"explanation":"ETF:er handlas som aktier på börsen med löpande prissättning via en orderbok. Traditionella fonder sätter NAV-kurs en gång per dag och handlas därför till 'okänd kurs'. ETF:er kan ha alla typer av placeringsinriktningar."},{"question":"Enligt Disclosureförordningen (SFDR), vad innebär det att en fond klassas som artikel 9 ('mörkgrön')?","options":["Fonden beaktar hållbarhetsrisker men har inte hållbarhet som mål","Fonden främjar miljörelaterade eller sociala egenskaper","Fonden har hållbar investering som sitt uttryckliga mål","Fonden är undantagen från hållbarhetsrapportering"],"correct":[2],"multiSelect":false,"explanation":"Artikel 9 (mörkgröna fonder) har hållbar investering som sitt uttryckliga syfte och mål. Artikel 8 (ljusgröna) främjar hållbarhetsegenskaper. Artikel 6 (gråa) är alla övriga produkter. Kraven på kundinformation ökar med ambitionsnivån."},{"question":"Vilken av följande handelsplatser är en reglerad marknad i Sverige?","options":["First North","Spotlight Stock Market","Nasdaq Stockholm","Nordic MTF"],"correct":[2],"multiSelect":false,"explanation":"Nasdaq Stockholm och NGM Equity är de två reglerade marknaderna i Sverige. First North, Nordic MTF och Spotlight Stock Market är MTF-plattformar med lägre inträdeskrav. Aktier som handlas på MTF:er är formellt onoterade."},{"question":"En OTF (Organised Trading Facility) skiljer sig från en MTF genom att:","options":["Aktier inte får handlas på en OTF","En OTF har lägre krav på transparens","En OTF bara finns utanför Sverige","Det inte finns någon skillnad"],"correct":[0],"multiSelect":false,"explanation":"På en OTF får inte aktier eller liknande instrument handlas — bara obligationer, strukturerade produkter, utsläppsrätter och derivatinstrument. OTF är ett försök att få in OTC-handlade produkter på en mer reglerad och transparent marknad."},{"question":"Den institutionella räntemarknaden i Sverige är huvudsakligen:","options":["Börshandlad","OTC-handlad","Reglerad genom en MTF","Hanterad av Riksbanken"],"correct":[1],"multiSelect":false,"explanation":"Den institutionella räntemarknaden är huvudsakligen OTC — dvs affärer görs direkt mellan parterna utan att gå genom en börs. Retailmarknaden för ränteinstrument är däremot börshandlad. First North Bond Market är en alternativ marknad för företagsobligationer."},{"question":"Vad innebär en forward rate på valutamarknaden?","options":["Den aktuella växelkursen för omedelbar leverans","En överenskommen växelkurs för leverans vid en framtida tidpunkt","Den historiska genomsnittskursen under det senaste året","Riksbankens officiella referenskurs"],"correct":[1],"multiSelect":false,"explanation":"En forward rate (terminskurs) är en överenskommen växelkurs för leverans vid en framtida tidpunkt. Den bestäms av spotpriset plus ränteskillnaden mellan de två valutorna. Spot rate avser omedelbar leverans (T+2)."},{"question":"Vad menas med Smart Order Routing (SOR)?","options":["En algoritm som analyserar bolagsnyheter för att generera köp- eller säljsignaler","Ett system som automatiskt väljer den bästa marknadsplatsen för kundens order baserat på pris och likviditet","En manuell process där en mäklare väljer handelsplats åt kunden","En typ av dark pool-handel"],"correct":[1],"multiSelect":false,"explanation":"Smart Order Routing (SOR) är ett system som automatiskt bestämmer vilken marknadsplats kundens order ska skickas till, baserat på bästa pris och likviditet. Om SOR:en enbart väljer marknadsplats utan att modifiera ordervillkor utgör det inte nödvändigtvis algoritmisk handel i lagens mening."},{"question":"Vad innebär regeln om bästa orderutförande?","options":["Att institutet alltid ska ge kunden den lägsta courtagesatsen","Att institutet ska vidta alla rimliga åtgärder för att uppnå bästa möjliga resultat för kunden avseende pris, kostnad, snabbhet m.m.","Att kundens order alltid ska utföras på den största börsen","Att institutet ska garantera vinst för kunden"],"correct":[1],"multiSelect":false,"explanation":"Bästa orderutförande innebär att institutet ska ta alla rimliga åtgärder för bästa möjliga resultat avseende pris, totalkostnad, snabbhet, sannolikhet för utförande m.m. För icke-professionella kunder är priset det viktigaste kriteriet."},{"question":"Vid en blankningsaffär med aktier, vem erhåller rösträtten under lånets löptid?","options":["Aktieutlånaren behåller rösträtten","Rösträtten tillfaller låntagaren (blankaren)","Rösträtten fördelas mellan utlånare och låntagare","Ingen har rösträtt under låneperioden"],"correct":[1],"multiSelect":false,"explanation":"Vid aktielån övertar låntagaren (blankaren) äganderätten och därmed rösträtten. Utlånaren har dock rätt till utdelning (som blankaren måste kompensera) och teckningsrätter ska levereras till utlånaren snarast möjligt."},{"question":"Vad är den grundläggande skillnaden mellan att ha aktier direktregistrerade hos Euroclear Sweden och att ha dem i en depå hos ett värdepappersinstitut?","options":["Depåaktier kan inte säljas lika snabbt","Direktregistrerade aktier ger automatiskt rätt att delta på bolagsstämma, medan depåaktier kräver omregistrering","Det finns ingen skillnad — det är bara två namn på samma sak","Direktregistrerade aktier har högre courtage vid handel"],"correct":[1],"multiSelect":false,"explanation":"Direktregistrerade aktier (VP-konto) registreras i ägarens namn hos Euroclear, vilket automatiskt ger rösträtt på bolagsstämma. Depåaktier registreras i förvaltarens namn (förvaltarregistrering) och kräver tillfällig omregistrering för att ägaren ska kunna rösta."},{"question":"Avräkningsnotan vid en aktieaffär ska upprättas senast:","options":["På likviddagen","Tre bankdagar efter avslut","Omedelbart för depåkunder, senast påföljande bankdag om det inte är tidsmässigt möjligt","Senast en vecka efter avslut"],"correct":[2],"multiSelect":false,"explanation":"Avräkningsnota ska skickas omedelbart för depåkunder. Om det inte är tidsmässigt möjligt ska den upprättas senast påföljande bankdag. Notan ska innehålla uppgifter om pris, antal, instrument, courtage, transaktionstid och marknadsplats."},{"question":"Vad menas med ett negativt produktionsgap (BNP-gap)?","options":["Att BNP minskar jämfört med föregående år","Att faktisk BNP understiger potentiell BNP, vilket innebär lediga resurser i ekonomin","Att statsskulden överstiger BNP","Att exporten understiger importen"],"correct":[1],"multiSelect":false,"explanation":"Ett negativt produktionsgap innebär att den faktiska BNP-nivån understiger den potentiella. Det betyder att ekonomin har lediga resurser och inte producerar till full kapacitet. Riksbanken bör i denna situation stimulera ekonomin genom att sänka styrräntan."},{"question":"I modellen med aggregerad efterfrågan och aggregerat utbud, vad händer på kort sikt vid en negativ efterfrågechock?","options":["BNP ökar och inflationen stiger","BNP faller och inflationen faller","BNP faller men inflationen stiger (stagflation)","BNP är oförändrad men inflationen faller"],"correct":[1],"multiSelect":false,"explanation":"En negativ efterfrågechock (t.ex. minskad konsumtion) skiftar efterfrågekurvan åt vänster, vilket på kort sikt leder till att både BNP och prisnivå/inflation faller. På lång sikt anpassar sig priser och löner, och BNP återgår till sin potentiella nivå."},{"question":"Vad händer med BNP och prisnivå på lång sikt vid en negativ utbudschock?","options":["BNP är oförändrad men prisnivån stiger permanent","BNP faller permanent och prisnivån stiger","BNP faller och prisnivån sjunker","BNP och prisnivå återgår till sina ursprungliga nivåer"],"correct":[0],"multiSelect":false,"explanation":"En negativ utbudschock (t.ex. energiprisökning) minskar den potentiella BNP:n. På lång sikt anpassar sig ekonomin till den nya lägre kapaciteten, medan prisnivån stiger. BNP kan återhämta sig om utbudet normaliseras, men den omedelbara effekten är stagflation."},{"question":"Multiplikatoreffekten i keynesiansk teori innebär att:","options":["En ränteförändring multiplikeras genom banksystemet","En ökning av offentliga utgifter leder till en ännu större ökning av BNP genom att pengarna cirkulerar i ekonomin","Skattehöjningar alltid ger större intäkter än förväntat","Valutakursen förstärker effekten av finanspolitik"],"correct":[1],"multiSelect":false,"explanation":"Multiplikatoreffekten innebär att en ökning av offentliga utgifter med 1 krona leder till en ökning av BNP med mer än 1 krona. Pengarna cirkulerar — mottagaren spenderar, vilket skapar nya inkomster som i sin tur spenderas, osv."},{"question":"Kvantitativa lättnader (QE) innebär att centralbanken:","options":["Höjer styrräntan kraftigt","Köper obligationer från marknaden för att öka penningmängden och sänka långa räntor","Sänker kapitalkraven för banker","Ger direkta lån till företag och hushåll"],"correct":[1],"multiSelect":false,"explanation":"Vid kvantitativa lättnader köper centralbanken obligationer (framför allt långa) från marknaden. Detta ökar penningmängden, höjer obligationspriserna och sänker därmed de långa räntorna. Kvantitativa åtstramningar är motsatsen — att sälja obligationer eller låta dem förfalla."},{"question":"Transmissionsmekanismen beskriver hur penningpolitiken påverkar ekonomin. Vilken kanal verkar genom att en höjd styrränta gör kronan mer attraktiv för utländska investerare?","options":["Räntekanalen","Kreditkanalen","Växelkurskanalen","Tillgångspriskanalen"],"correct":[2],"multiSelect":false,"explanation":"Växelkurskanalen: Högre ränta gör kronan mer attraktiv → kronans värde stiger → import blir billigare → priset på varor i Sverige kan sänkas → inflationen dämpas. Räntekanalen verkar genom minskad konsumtion/investering, kreditkanalen genom bankernas utlåningsvilja."},{"question":"Riksbankens inflationsmål mäts i:","options":["KPI (Konsumentprisindex)","KPIF (KPI med fast ränta)","BNP-deflator","Producentprisindex"],"correct":[1],"multiSelect":false,"explanation":"Riksbankens mål mäts i KPIF — KPI med fast ränta. KPIF beräknas som KPI men med effekten av ändrade boräntor borttagen. Detta gör att ränteförändringar inte direkt påverkar det mått som inflationsmålet baseras på."},{"question":"Phillipskurvan beskriver ett samband mellan inflation och arbetslöshet. Vad gäller på lång sikt?","options":["Sambandet är stabilt — lägre arbetslöshet ger alltid högre inflation","Den långsiktiga Phillipskurvan är vertikal — ekonomin återgår till naturlig arbetslöshet oavsett inflation","Sambandet är omvänt på lång sikt — högre inflation ger lägre arbetslöshet permanent","Phillipskurvan gäller bara för kortsiktiga analyser och har ingen långsiktig tolkning"],"correct":[1],"multiSelect":false,"explanation":"På lång sikt är Phillipskurvan vertikal vid den naturliga arbetslöshetsnivån. Försök att permanent sänka arbetslösheten under denna nivå leder bara till ständigt stigande inflation. Stagflationen på 1970-talet visade att det kortsiktiga sambandet inte är stabilt."},{"question":"Ränteparitet innebär att:","options":["Alla länder ska ha samma styrränta","Ränteskillnaden mellan två länder ska motsvara den förväntade växelkursförändringen","Real ränta alltid är lika i alla länder","Centralbanker koordinerar sina räntebeslut"],"correct":[1],"multiSelect":false,"explanation":"Ränteparitet innebär att en investerare ska få samma avkastning oavsett vilken valuta den investerar i. Om ett land har högre ränta förväntas dess valuta depreciera motsvarande, så att den totala avkastningen jämnas ut."},{"question":"Vad innebär en 'carry trade' på valutamarknaden?","options":["Att köpa och sälja samma valuta på olika marknader för att utnyttja prisskillnader","Att låna i en lågräntevaluta och placera i en högräntevaluta för att utnyttja ränteskillnaden","Att valutasäkra alla utländska investeringar","Att handla fysiska varor i utländsk valuta"],"correct":[1],"multiSelect":false,"explanation":"En carry trade innebär att man lånar i en valuta med låg ränta och placerar i en valuta med hög ränta. Vinsten uppstår om ränteskillnaden inte äts upp av valutakursförändringar. Strategin är lönsam när räntepariteten inte håller fullt ut."},{"question":"J-kurveeffekten beskriver hur handelsbalansen påverkas efter en depreciering av valutan. Vad innebär den?","options":["Handelsbalansen förbättras omedelbart och sedan försämras","Handelsbalansen försämras initialt (volymer anpassas långsamt) men förbättras så småningom när export ökar","Handelsbalansen är opåverkad av valutakursförändringar","Importen ökar medan exporten minskar"],"correct":[1],"multiSelect":false,"explanation":"J-kurveeffekten: Efter en depreciering blir import dyrare omedelbart (handelsbalansen försämras), men det tar tid innan exportvolymer ökar och importvolymer minskar. Så småningom förbättras handelsbalansen — kurvan ser ut som bokstaven J."},{"question":"Vilket organ har huvudansvaret för den finansiella stabiliteten vad gäller tillsyn av finansiella institut i Sverige?","options":["Riksbanken","Finansinspektionen","Riksgälden","Finansdepartementet"],"correct":[1],"multiSelect":false,"explanation":"Ansvaret för finansiell stabilitet är fördelat: Finansinspektionen har tillsyn av finansiella institut, Riksbanken ansvarar för det finansiella systemets stabilitet och betalningssystemet, Riksgälden hanterar insättningsgaranti och bankstöd, och Finansdepartementet samordnar."},{"question":"En aktie ger avkastningarna +20%, -10% och +15% under tre år. Vilket är det geometriska medelvärdet?","options":["8.33%","7.36%","6.88%","25%"],"correct":[1],"multiSelect":false,"explanation":"Geometriskt medelvärde: (1.20 × 0.90 × 1.15)^(1/3) - 1 = (1.242)^(1/3) - 1 ≈ 0.0749 ≈ 7.5%. Närmast 7.36%. Det geometriska medelvärdet tar hänsyn till ränta-på-ränta-effekten och ger en lägre siffra än det aritmetiska (8.33%)."},{"question":"Vad mäter variansen?","options":["Det genomsnittliga kvadrerade avståndet från medelvärdet","Det genomsnittliga absoluta avståndet från medelvärdet","Skillnaden mellan högsta och lägsta värde","Sannolikheten för ett negativt utfall"],"correct":[0],"multiSelect":false,"explanation":"Variansen beräknas som det genomsnittliga kvadrerade avståndet från medelvärdet. Standardavvikelsen är kvadratroten av variansen och ger ett mått i samma enhet som den ursprungliga variabeln (t.ex. procent)."},{"question":"Vilken korrelation mellan tillgångar ger störst diversifieringseffekt i en portfölj?","options":["+1 (perfekt positiv korrelation)","0 (ingen korrelation)","-1 (perfekt negativ korrelation)","+0.5 (måttlig positiv korrelation)"],"correct":[2],"multiSelect":false,"explanation":"Perfekt negativ korrelation (-1) ger störst diversifieringseffekt — tillgångarna rör sig i exakt motsatt riktning och kan teoretiskt eliminera all risk. I praktiken är korrelationer mellan tillgångar sällan -1, men ju lägre korrelation desto bättre diversifiering."},{"question":"I en normalfördelning, hur stor andel av utfallen ligger inom ±2 standardavvikelser från medelvärdet?","options":["68%","90%","95%","99%"],"correct":[2],"multiSelect":false,"explanation":"I en normalfördelning: ±1 standardavvikelse täcker ca 68% av utfallen, ±2 standardavvikelser ca 95%, och ±3 standardavvikelser ca 99.7%. Detta är grundläggande för riskberäkningar som VaR."},{"question":"I en regressionsanalys, vad visar förklaringsvärdet (R²)?","options":["Korrelationen mellan två variabler","Hur stor andel av variationen i den beroende variabeln som förklaras av modellen","Sannolikheten att modellen är statistiskt signifikant","Standardavvikelsen för residualerna"],"correct":[1],"multiSelect":false,"explanation":"R² (förklaringsvärdet) anger hur stor andel av variationen i den beroende variabeln som förklaras av de oberoende variablerna. R² = 0.80 innebär att 80% av variationen förklaras. Värdet ligger alltid mellan 0 och 1."},{"question":"En obligation har en enkel ränta på 8% med kvartalsvis räntebetalning. Vad blir den effektiva årsräntan ungefär?","options":["8.00%","8.24%","8.50%","9.00%"],"correct":[1],"multiSelect":false,"explanation":"Effektiv ränta = (1 + 0.08/4)^4 - 1 = (1.02)^4 - 1 ≈ 0.0824 = 8.24%. Den effektiva räntan är alltid högre än den enkla räntan när det finns fler än en betalning per år, tack vare ränta-på-ränta-effekten."},{"question":"En obligation har kupongränta 5% och marknadsräntan (yield) är 7%. Handlas obligationen till överkurs, underkurs eller pari?","options":["Överkurs (över nominellt värde)","Underkurs (under nominellt värde)","Pari (nominellt värde)","Det går inte att avgöra utan att veta löptiden"],"correct":[1],"multiSelect":false,"explanation":"När marknadsräntan (yield) överstiger kupongräntan handlas obligationen till underkurs. Investeraren kompenseras genom att köpa obligationen billigare. Omvänt: om kupongränta > yield → överkurs; kupongränta = yield → pari."},{"question":"Vilken kombination av egenskaper ger den längsta durationen för en obligation?","options":["Kort löptid och hög kupongränta","Lång löptid och låg kupongränta","Kort löptid och låg kupongränta","Lång löptid och hög kupongränta"],"correct":[1],"multiSelect":false,"explanation":"Duration ökar med längre löptid (fler betalningar längre fram) och minskar med högre kupongränta (mer av värdet betalas tidigt). En nollkupongare har duration = löptid. Högre yield minskar också durationen."},{"question":"Vad innebär en inverterad avkastningskurva?","options":["Långa räntor är högre än korta räntor","Korta räntor är högre än långa räntor, vilket ofta tolkas som att marknaden förväntar sig räntesänkningar","Alla räntor är lika oavsett löptid","Räntorna svänger kraftigt mellan löptider"],"correct":[1],"multiSelect":false,"explanation":"En inverterad avkastningskurva innebär att korta räntor är högre än långa. Detta tolkas som att marknaden förväntar sig att centralbanken kommer sänka räntan framöver. En inverterad kurva har historiskt varit en signal om kommande lågkonjunktur."},{"question":"Terminspriset på en aktie som inte betalar utdelning bestäms av:","options":["Marknadens förväntningar om framtida aktiekurs","Spotpriset justerat för finansieringskostnaden (cost of carry) under löptiden","Genomsnittspriset under de senaste 12 månaderna","Analys av bolagets framtida vinster"],"correct":[1],"multiSelect":false,"explanation":"Enligt cost of carry-formeln: Terminspris = Spotpris × (1 + riskfri ränta)^t. Terminspriset bestäms av arbitrage — inte av förväntningar. Om det finns utdelning minskas terminspriset med nuvärdet av utdelningen."},{"question":"Ett svenskt exportföretag ska få betalt i USD om tre månader. Hur kan företaget säkra sig mot valutarisk?","options":["Köpa USD på termin","Sälja USD på termin","Köpa en köpoption på USD","Köpa en säljoption på SEK"],"correct":[1],"multiSelect":false,"explanation":"Exportföretaget ska få in USD och vill skydda sig mot att USD tappar i värde (kronförstärkning). Genom att sälja USD på termin låser de kursen och eliminerar valutarisken helt."},{"question":"En investerare äger aktier och vill skydda sig mot nedgång, men ändå behålla uppsidepotentialen. Vilken strategi är mest lämplig?","options":["Utfärda köpoptioner (covered call)","Köpa säljoptioner (protective put)","Sälja aktier på termin","Utfärda säljoptioner"],"correct":[1],"multiSelect":false,"explanation":"Att köpa säljoptioner (protective put) ger ett golv på nedsidan — om aktien faller under lösenpriset kompenseras förlusten av optionen. Uppsidepotentialen behålls (minus premien). En covered call begränsar uppsidan, och en termin eliminerar både uppsida och nedsida."},{"question":"Vilket av följande ökar värdet av en köpoption, allt annat lika?","options":["Lägre volatilitet i underliggande tillgång","Kortare återstående löptid","Högre riskfri ränta","Lägre pris på underliggande tillgång"],"correct":[2],"multiSelect":false,"explanation":"En köpoptions värde ökar med: högre pris på underliggande, lägre lösenpris, längre löptid, högre volatilitet och högre riskfri ränta. Högre riskfri ränta gynnar köpoptioner eftersom nuvärdet av lösenpriset minskar."},{"question":"Enligt Gordons formel: En aktie förväntas ge 5 kr i utdelning nästa år. Utdelningen förväntas växa med 3% per år och avkastningskravet är 8%. Vad är aktiens teoretiska värde?","options":["62.50 kr","100 kr","125 kr","166.67 kr"],"correct":[1],"multiSelect":false,"explanation":"Gordons formel: P = D/(k-g) = 5/(0.08-0.03) = 5/0.05 = 100 kr. Modellen kräver att avkastningskravet (k) är högre än tillväxttakten (g). Om g ≥ k ger modellen ett oändligt eller negativt värde."},{"question":"I en kassaflödesmodell (DCF), vad representerar horisontvärdet?","options":["Nuvärdet av alla kassaflöden under den detaljerade prognosperioden","Nuvärdet av alla kassaflöden efter den detaljerade prognosperioden","Företagets skulder","Skillnaden mellan enterprise value och eget kapital"],"correct":[1],"multiSelect":false,"explanation":"Horisontvärdet (terminal value) representerar nuvärdet av alla kassaflöden efter den detaljerade prognosperioden — dvs. företagets värde från det att man slutar göra detaljerade årsprognoser och framåt i all evighet."},{"question":"WACC beräknas med marknadsvärden. Varför används inte bokförda värden?","options":["Bokförda värden ger alltid en högre WACC","Marknadsvärden speglar de aktuella avkastningskrav som marknaden ställer","Bokförda värden finns inte alltid tillgängliga","Det finns ingen skillnad i praktiken"],"correct":[1],"multiSelect":false,"explanation":"WACC ska beräknas med marknadsvärden på eget kapital och skulder eftersom dessa speglar marknadens aktuella avkastningskrav. Bokförda värden kan vara väsentligt annorlunda och skulle ge en missvisande kapitalkostnad."},{"question":"Ett bolag har omsättning 10m, EBITDA 2m, EBIT 1.5m och årets resultat 1m. Vad är rörelsemarginalen?","options":["10%","15%","20%","25%"],"correct":[1],"multiSelect":false,"explanation":"Rörelsemarginalen = EBIT / Omsättning = 1.5m / 10m = 15%. OBS: EBIT (Earnings Before Interest and Tax) kallas också rörelseresultat. EBITDA-marginalen vore 20% och vinstmarginalen 10%."},{"question":"Skuldsättningsgraden beräknas som skulder dividerat med eget kapital. Ett bolag har tillgångar om 40m och eget kapital om 10m. Vad är skuldsättningsgraden?","options":["0.25","0.75","3.0","4.0"],"correct":[2],"multiSelect":false,"explanation":"Skulder = Tillgångar - Eget kapital = 40m - 10m = 30m. Skuldsättningsgrad = 30m / 10m = 3.0. Soliditet hade varit 10m / 40m = 0.25. Ju högre skuldsättningsgrad, desto mer belånat är bolaget."},{"question":"Enligt CAPM, vad är förväntad avkastning på en tillgång med beta 1.5 om riskfria räntan är 2% och marknadens riskpremie är 6%?","options":["8%","9%","11%","14%"],"correct":[2],"multiSelect":false,"explanation":"CAPM: E(r) = Rf + β × riskpremie = 2% + 1.5 × 6% = 2% + 9% = 11%. Beta 1.5 innebär att tillgången har 50% högre systematisk risk än marknaden och ska därför kompenseras med högre förväntad avkastning."},{"question":"Vad mäter Sharpekvoten?","options":["Avkastning utöver index per enhet aktiv risk","Avkastning utöver riskfri ränta per enhet total risk (standardavvikelse)","Portföljens alfa relativt CAPM","Portföljens beta"],"correct":[1],"multiSelect":false,"explanation":"Sharpekvoten = (Avkastning - Riskfri ränta) / Standardavvikelse. Den mäter riskjusterad avkastning — hur mycket överavkastning man får per enhet total risk. Informationskvoten mäter aktiv avkastning per enhet aktiv risk."},{"question":"Vad mäter tracking error?","options":["Total risk i portföljen","Standardavvikelsen av skillnaden mellan portföljens och jämförelseindexets avkastning","Portföljens beta","Avkastning utöver riskfri ränta"],"correct":[1],"multiSelect":false,"explanation":"Tracking error (aktiv risk) mäter hur mycket portföljens avkastning avviker från jämförelseindexets. Hög tracking error innebär att förvaltaren tar stora aktiva positioner. Informationskvoten = aktiv avkastning / tracking error."},{"question":"Value at Risk (VaR) med 95% konfidensgrad under en dag är 10 MSEK. Vad betyder detta?","options":["Den förväntade förlusten under en dag är 10 MSEK","Det finns en 5% sannolikhet att förlusten överstiger 10 MSEK under en dag","Den maximala förlusten under en dag är 10 MSEK","Portföljens standardavvikelse är 10 MSEK"],"correct":[1],"multiSelect":false,"explanation":"VaR anger den maximala förlusten för en given sannolikhetsnivå. 95% VaR = 10 MSEK innebär att det finns en 5% risk att den dagliga förlusten överstiger 10 MSEK. VaR säger inget om hur stor förlusten kan bli om gränsen passeras — det mäter Expected Shortfall."},{"question":"Hur beräknas 10-dagars VaR utifrån 1-dags VaR?","options":["1-dags VaR × 10","1-dags VaR × √10","1-dags VaR × 10²","1-dags VaR / √10"],"correct":[1],"multiSelect":false,"explanation":"10-dagars VaR = 1-dags VaR × √10 ≈ 1-dags VaR × 3.16. Denna omräkning förutsätter att dagsavkastningarna är oberoende (okorrelerade) över tiden. Om de vore korrelerade skulle formeln inte gälla."},{"question":"Vad skiljer ett prisindex från ett totalavkastningsindex?","options":["Prisindex inkluderar utdelningar, totalavkastningsindex gör inte det","Totalavkastningsindex antar att utdelningar återinvesteras, prisindex visar bara kursutvecklingen","Prisindex viktar bolagen lika, totalavkastningsindex viktar efter marknadsvärde","Det finns ingen skillnad"],"correct":[1],"multiSelect":false,"explanation":"Ett prisindex visar bara kursutvecklingen. Ett totalavkastningsindex antar att utdelningar återinvesteras löpande i portföljen, vilket ger en mer rättvisande bild av den faktiska avkastningen. OMXS30 är ett prisindex, OMXS30GI är totalavkastningsindex."},{"question":"Du sitter i styrelsen för din bostadsrättsförening. Alla vet att du arbetar på bank. Styrelsen ber dig ordna förmånliga lånevillkor. Vad bör du göra?","options":["Kontakta bankens kreditavdelning och be om personalvillkor för föreningen","Förmedla kontakt med rätt person på banken som handlägger frågan på vanligt sätt","Själv ta ett personallån och låna vidare till föreningen","Lova att föreningen får bättre villkor om de flyttar alla bankaffärer till din arbetsgivare"],"correct":[1],"multiSelect":false,"explanation":"Det etiskt korrekta är att förmedla kontakt med rätt person som handlägger frågan på vanligt sätt. Man ska inte utnyttja sin position för personliga fördelar eller blanda ihop roller. Personalvillkor, vidarelån och villkorade erbjudanden innebär intressekonflikter."},{"question":"Visselblåsarlagen (SFS 2021:890) ger skydd vid rapportering av missförhållanden. Vad är det viktigaste skyddet?","options":["Att anmälaren alltid förblir anonym","Ansvarsfrihet för visselblåsaren och förbud mot repressalier","Att arbetsgivaren måste betala ersättning till visselblåsaren","Att Finansinspektionen omedelbart utreder varje anmälan"],"correct":[1],"multiSelect":false,"explanation":"Visselblåsarlagen ger framför allt ansvarsfrihet för den som rapporterar samt förbud mot hindrande åtgärder och repressalier. Lagen gäller rapportering av missförhållanden som det finns ett allmänintresse av att de kommer fram, i ett arbetsrelaterat sammanhang."},{"question":"Finansinspektionen kan vidta olika åtgärder mot företag som bryter mot regelverket. Vilken sanktion utfärdas när överträdelsen är allvarlig men åtgärder redan vidtagits med goda utsikter?","options":["Anmärkning","Varning","Återkallelse av tillstånd","Sanktionsavgift"],"correct":[1],"multiSelect":false,"explanation":"Varning ges när överträdelsen är så allvarlig att tillståndet i princip kan återkallas, men företaget redan vidtagit åtgärder vars utsikter bedöms goda. Anmärkning ges vid allvarliga men inte lika grova överträdelser. Sanktionsavgift kan utfärdas tillsammans med varning/anmärkning."},{"question":"Bolagsstyrningskollegiet förvaltar Svensk kod för bolagsstyrning. Vilken princip bygger koden på?","options":["Samtliga regler är tvingande och fastställda i lag","Följ-eller-förklara-principen","Reglerna gäller bara för statligt ägda bolag","Reglerna ersätter aktiebolagslagen för börsbolag"],"correct":[1],"multiSelect":false,"explanation":"Koden bygger på följ-eller-förklara-principen (comply or explain). Bolagen ska antingen följa koden eller förklara varför de avviker. Koden gäller för bolag på en reglerad marknad (Nasdaq Stockholm och NGM Equity). Sverige valde att inte lagstifta på området."},{"question":"Ett värdepappersbolag säljer aktier till en kund från eget lager. Vilken intressekonflikt föreligger?","options":["Ingen — det är en normal transaktion","Institutet är både säljare och kundens rådgivare/förmedlare, och institutets intresse att sälja till högt pris står mot kundens intresse att köpa billigt","Intressekonflikten finns bara om kunden förlorar pengar","Intressekonflikten gäller bara vid rådgivning, inte vid handel"],"correct":[1],"multiSelect":false,"explanation":"När institutet säljer från eget lager agerar det som motpart till kunden. Institutets intresse (sälja till högt pris) står i konflikt med kundens (köpa till lågt pris). Institutet ska informera kunden och ha rutiner för att hantera sådana konflikter."},{"question":"I vilka situationer får ett värdepappersinstitut INTE behålla tredjepartsersättningar?","options":["Vid försäljning av strukturerade produkter","Vid investeringsrådgivning på oberoende grund samt vid portföljförvaltning","Vid mottagande och vidarebefordran av order","Tredjepartsersättningar är alltid tillåtna"],"correct":[1],"multiSelect":false,"explanation":"Vid oberoende rådgivning och portföljförvaltning får institutet inte behålla tredjepartsersättningar — de måste skickas vidare till kunderna. I andra fall är ersättningar tillåtna om de höjer kvaliteten och kunden informeras."},{"question":"Enligt reglerna om anställdas egna värdepappersaffärer, vad gäller för en anställd som har tillgång till kurspåverkande information som ännu inte offentliggjorts?","options":["Anställda får göra långsiktiga affärer baserade på informationen","Anställda får aldrig göra egna värdepappersaffärer genom att utnyttja sådan information","Anställda får handla om informationen kommer från en extern källa","Det är tillåtet om chefen ger sitt godkännande"],"correct":[1],"multiSelect":false,"explanation":"Anställda får aldrig utnyttja kurspåverkande information som inte offentliggjorts för egna affärer — oavsett tidshorisont, informationskälla eller godkännande. Reglerna syftar till att skydda förtroendet för värdepappersmarknaden."},{"question":"Vilket av följande påståenden om mutbrott är korrekt?","options":["En förmån måste ha ekonomiskt värde för att kunna utgöra en muta","Givande och tagande av muta är två separata brott — givande kan föreligga utan tagande","Det krävs bevis på att mutan påverkat ett specifikt beslut","Mutor kan bara förekomma i kontakter med myndigheter"],"correct":[1],"multiSelect":false,"explanation":"Givande och tagande av muta är helt orelaterade brott. Om någon erbjuder en muta som tackas nej till kan givande av muta föreligga utan tagande. Det krävs inget orsakssamband mellan mutan och en specifik tjänsteåtgärd, och förmånen behöver inte ha materiellt värde."},{"question":"En styrelseledamot i ett värdepappersbolag röjer konfidentiell kundinformation till en bekant. Vad kan bli konsekvensen?","options":["Inget — tystnadsplikten gäller bara anställda","Styrelseledamoten kan dömas till straff för brott mot tystnadsplikten","Styrelseledamoten får bara en intern tillrättavisning","Bolaget ansvarar, inte styrelseledamoten personligen"],"correct":[1],"multiSelect":false,"explanation":"Sekretessbestämmelserna gäller inte bara anställda utan även styrelseledamöter i värdepappersbolag. Brott mot tystnadsplikten kan leda till straff. Undantag finns vid lagstadgad uppgiftsskyldighet, t.ex. till Finansinspektionen eller Skatteverket."},{"question":"Vad krävs för att information ska klassas som insiderinformation?","options":["Att den är hemligstämplad av bolaget","Att den är av specifik natur, icke-offentliggjord och sannolikt skulle ha väsentlig inverkan på priset","Att den rör bolagets framtida utdelning","Att minst 10 personer känner till den"],"correct":[1],"multiSelect":false,"explanation":"Insiderinformation kräver: (1) specifik natur (t.ex. vinstvarning, stor affär), (2) icke-offentliggjord, och (3) sannolikt väsentlig prispåverkan. Bedömningen av väsentlig prispåverkan görs genom att beakta om en förnuftig investerare skulle använda informationen i sitt investeringsbeslut."},{"question":"30-dagarsregeln innebär att personer i ledande ställning i börsbolag:","options":["Ska rapportera alla transaktioner inom 30 dagar","Inte får handla i bolagets värdepapper under 30 kalenderdagar före en finansiell rapport","Måste hålla sina aktier i minst 30 dagar innan de säljer","Ska flagga sitt innehav var 30:e dag"],"correct":[1],"multiSelect":false,"explanation":"30-dagarsregeln (artikel 19.12 MAR) förbjuder personer i ledande ställning att handla i bolagets värdepapper under 30 kalenderdagar före offentliggörande av en finansiell rapport. Det finns vissa undantag från denna regel."},{"question":"Vid misstanke om penningtvätt, till vilken myndighet ska detta rapporteras?","options":["Finansinspektionen","Riksbanken","Finanspolisen","Skatteverket"],"correct":[2],"multiSelect":false,"explanation":"Misstankar om penningtvätt eller terrorismfinansiering ska rapporteras till Finanspolisen — inte till Finansinspektionen. FI ansvarar för tillsynen av att institut har rätt system och rutiner, men det operativa arbetet med misstänkta transaktioner hanteras av Finanspolisen."},{"question":"När ska skärpta kundkännedomsåtgärder alltid vidtas?","options":["Vid alla nya kundrelationer","När kunden är en PEP (politiskt exponerad person) eller närstående till en PEP","Bara vid transaktioner över 1 miljon euro","Bara vid kontantinsättningar"],"correct":[1],"multiSelect":false,"explanation":"Skärpta kundkännedomsåtgärder ska alltid vidtas vid PEP (politiskt exponerad person), inklusive familjemedlemmar och medarbetare till PEP. Pengarnas ursprung ska fastställas och OK krävs från behörig intern beslutsfattare."},{"question":"Vilken av följande uppgifter är en känslig personuppgift enligt GDPR?","options":["Personnummer","Medlemskap i fackförening","Medborgarskap","Konsumtionsmönster"],"correct":[1],"multiSelect":false,"explanation":"Medlemskap i fackförening är en känslig personuppgift enligt GDPR. Andra känsliga uppgifter inkluderar hälsa, politiska åsikter, etniskt ursprung, religiös övertygelse och biometriska data. Personnummer, medborgarskap och konsumtionsmönster är personuppgifter men inte känsliga i GDPR:s mening."},{"question":"Vad skiljer investeringsrådgivning från en generell investeringsrekommendation?","options":["Investeringsrådgivning kräver alltid skriftligt avtal","Investeringsrådgivning innebär personliga rekommendationer anpassade efter kundens situation","Generella rekommendationer kräver högre kompetens","Det finns ingen skillnad"],"correct":[1],"multiSelect":false,"explanation":"Investeringsrådgivning innebär 'tillhandahållande av personliga rekommendationer till en kund i fråga om transaktioner som rör finansiella instrument'. Utan personlig anpassning är det marknadsföring eller en generell investeringsrekommendation."},{"question":"Vid en lämplighetsbedömning ska tre typer av uppgifter inhämtas från kunden. Vilka?","options":["Namn, adress och personnummer","Ekonomisk situation, placeringsmål samt kunskap och erfarenhet","Inkomst, förmögenhet och skulder","Riskbenägenhet, tidshorisont och ålder"],"correct":[1],"multiSelect":false,"explanation":"Lämplighetsbedömningen kräver: (1) ekonomisk situation (förmåga att bära risk), (2) mål med investeringen, och (3) kunskap och erfarenhet (förståelse för riskerna). Utan dessa uppgifter får inte råd ges. Hållbarhetspreferenser bedöms sekundärt."},{"question":"I vilken situation behövs INGEN passandebedömning (execution only)?","options":["Kunden köper en strukturerad produkt på eget initiativ","Kunden köper aktier på en reglerad marknad på eget initiativ och har informerats om att ingen bedömning görs","Kunden köper warranter utan rådgivning","Kunden köper andelar i en hedgefond på eget initiativ"],"correct":[1],"multiSelect":false,"explanation":"Undantag från passandebedömning (execution only) kräver att alla tre villkor uppfylls: (1) kundens eget initiativ, (2) okomplicerat instrument (t.ex. aktier på reglerad marknad/MTF), och (3) kunden har informerats. Strukturerade produkter, warranter och hedgefonder är komplicerade instrument."},{"question":"Reglerna om produktstyrning innebär att:","options":["Bara Finansinspektionen får godkänna nya finansiella instrument","Både den som tar fram och den som distribuerar ett finansiellt instrument ska definiera en målgrupp och följa upp hur produkten fungerar","Bara fondbolag omfattas av produktstyrningsregler","Distributören bestämmer ensam vilka kunder produkten riktar sig till"],"correct":[1],"multiSelect":false,"explanation":"Produktstyrningsreglerna kräver att både produkttillverkaren och distributören definierar målgrupp, anpassar instrumentet, testar det i olika scenarion och följer upp. Syftet är att rätt produkter når rätt kunder."},{"question":"Vad innebär begreppet 'dubbel materialitet'?","options":["Att ett bolag måste rapportera hållbarhet i två format","Att man beaktar både hur hållbarhetsrisker påverkar bolaget OCH hur bolagets verksamhet påverkar omvärlden","Att bolaget ska ha dubbelt så mycket hållbar investering som konventionell","Att rapporteringen ska ske halvårsvis istället för årsvis"],"correct":[1],"multiSelect":false,"explanation":"Dubbel materialitet innebär att man beaktar båda riktningarna: (1) hur externa hållbarhetsfaktorer (t.ex. klimatförändringar) påverkar bolaget, och (2) hur bolagets verksamhet påverkar omvärlden (t.ex. utsläpp, sociala konsekvenser)."},{"question":"En privatperson har ett underskott av kapital på 200,000 kr. Hur stor blir skattereduktionen?","options":["60,000 kr","51,000 kr","42,000 kr","30,000 kr"],"correct":[1],"multiSelect":false,"explanation":"Skattereduktion: 30% på de första 100,000 kr = 30,000 kr. 21% på beloppet över 100,000 kr (dvs. 100,000 × 21% = 21,000 kr). Totalt: 30,000 + 21,000 = 51,000 kr."},{"question":"Utdelning till en fysisk person som äger aktier direkt (inte i ISK) beskattas med:","options":["20.6%","25%","30%","Skattefritt"],"correct":[2],"multiSelect":false,"explanation":"Utdelning till fysisk person beskattas med 30% kapitalskatt. Bolaget har dessutom redan skattat bolagsskatt (20.6%) på vinsten innan utdelning. I ett ISK är utdelningen skattefri — istället betalas en årlig schablonintäkt."},{"question":"Vad händer med fondens tillgångar om fondbolaget går i konkurs?","options":["Andelsägarna förlorar hela sitt kapital","Tillgångarna tillfaller fondbolagets borgenärer","Andelsägarna är skyddade — fondens tillgångar ägs av andelsägarna, inte fondbolaget","Finansinspektionen tar över förvaltningen permanent"],"correct":[2],"multiSelect":false,"explanation":"Fondens tillgångar ägs av andelsägarna, inte fondbolaget. Fondbolagets ekonomi är skild från fondens. Om fondbolaget konkar berörs inte fondens tillgångar — förvaringsinstitutet övertar förvaltningen tills en ny förvaltare utses."},{"question":"I ett publikt aktiebolag gäller att:","options":["VD får vara styrelseordförande","Styrelsen ska ha minst 3 ledamöter och VD får inte vara styrelseordförande","Styrelsen behöver bara ha 1 ledamot om bolaget har en VD","VD är frivillig i publika aktiebolag"],"correct":[1],"multiSelect":false,"explanation":"I publika AB krävs en VD (frivillig i privata), styrelsen ska ha minst 3 ledamöter, och VD får inte samtidigt vara styrelseordförande. En revisor utsedd av stämman ska finnas."},{"question":"I vilket av följande fall måste ett prospekt upprättas?","options":["Vid ett private placement till 50 kvalificerade investerare","När aktier tas upp till handel på en reglerad marknad","Vid återköp av egna aktier","Vid en fondemission i ett börsnoterat bolag"],"correct":[1],"multiSelect":false,"explanation":"Prospekt måste upprättas vid erbjudande till allmänheten eller vid upptagande till handel på en reglerad marknad. Undantag finns för private placements (färre än 150 investerare), erbjudanden till kvalificerade investerare, och minsta belopp 100,000 EUR."},{"question":"Flaggning ska ske varje gång en viss gräns passeras. Vilka är de lägsta och högsta gränsvärdena?","options":["1% och 50%","3% och 75%","5% och 90%","10% och 100%"],"correct":[2],"multiSelect":false,"explanation":"Flaggningsgränserna är 5, 10, 15, 20, 25, 30, 50, 66 och 90% av samtliga aktier/röster. Flaggning ska ske varje gång en gräns passeras, upp eller ner. Anmälan ska ske senast tre handelsdagar efter förvärvet till bolaget och FI."},{"question":"En kort nettoposition i aktier på 0.3% av aktiekapitalet — vad gäller för rapportering?","options":["Ingen rapportering krävs","Positionen ska anmälas till Finansinspektionen men behöver inte offentliggöras","Positionen ska både anmälas till FI och offentliggöras","Bara offentliggörande krävs, inte anmälan"],"correct":[1],"multiSelect":false,"explanation":"Korta nettopositioner i aktier: ≥0.2% ska anmälas till FI (ej offentliggöras). ≥0.5% ska även offentliggöras. Vid 0.3% anmäls alltså till FI. Dessutom ska varje förändring om 0.1%-enhet anmälas."},{"question":"Vilka påföljder kan SwedSec rikta mot en licenshavare som bryter mot regelverket?","options":["Böter, fängelse eller samhällstjänst","Erinran, varning eller licensåterkallelse","Bara muntlig tillsägelse","Skadestånd till drabbade kunder"],"correct":[1],"multiSelect":false,"explanation":"SwedSecs disciplinära åtgärder är: erinran (lindrig), varning (allvarlig) eller licensåterkallelse (grövre). SwedSec har ingen egen övervakningsfunktion utan bygger på att anslutna bolag självrapporterar. Vid återkallelse publiceras ett anonymiserat pressmeddelande."},{"question":"Enligt EU:s Taxonomiförordning, vad krävs för att en verksamhet ska klassas som miljömässigt hållbar?","options":["Att bolaget har en hållbarhetspolicy","Att verksamheten väsentligt bidrar till minst ett av sex miljömål utan att orsaka betydande skada på de andra","Att mer än 50% av omsättningen kommer från gröna produkter","Att bolaget har en ESG-rating på A eller högre"],"correct":[1],"multiSelect":false,"explanation":"Taxonomin kräver att verksamheten: (1) väsentligt bidrar till minst ett av sex miljömål, (2) inte orsakar betydande skada på de andra miljömålen, och (3) följer minimiskyddsåtgärder (OECD:s riktlinjer, FN:s principer). De sex miljöområdena inkluderar bl.a. klimat, vatten, cirkulär ekonomi och biologisk mångfald."}],"Gamla prov (Finans)":[{"question":"Vilken av följande delar består en Minifuture bland annat av?","options":["en kapitalinsats","en option","ett terminskontrakt","en obligation"],"correct":[0],"multiSelect":false,"explanation":"En Minifuture består bland annat av en kapitalinsats (finansieringsnivå) och en barriärnivå (stop loss-nivå)."},{"question":"Vilken är en av de huvudsakliga skillnaderna mellan en vanlig warrant och en turbowarrant?","options":["Turbowarrantens värde kan sjunka under det insatta kapitalet, vilket inte kan hända vid placering i en vanlig warrant.","Turbowarranten har en barriärnivå som innebär att den ger en kraftigare uppgång om aktien når barriärnivån.","Turbowarrantens värde påverkas mindre än en vanlig warrant vid förändring av volatiliteten.","Turbowarranter kan endast ge avkastning vid positiv kursutveckling på den underliggande tillgången."],"correct":[2],"multiSelect":false,"explanation":"Turbowarrantens värde påverkas mindre av volatilitetsförändringar jämfört med en vanlig warrant, eftersom turbowarranten har en barriärnivå och är mer linjärt prissatt."},{"question":"När utnyttjas normalt en övertilldelningsoption i samband med stabilisering?","options":["när efterfrågan är begränsad och marknadspriset understiger priset i erbjudandet","när efterfrågan är begränsad och marknadspriset överstiger priset i erbjudandet","när efterfrågan är stor och marknadspriset överstiger priset i erbjudandet","när efterfrågan är stor och marknadspriset understiger priset i erbjudandet"],"correct":[2],"multiSelect":false,"explanation":"Övertilldelningsoptionen utnyttjas normalt när efterfrågan är stor och marknadspriset överstiger priset i erbjudandet."},{"question":"Vilka är två av de risker som man bör förstå när man placerar i en så kallad coco-bond?\n\nVälj TVÅ svarsalternativ.","options":["att staten konverterar obligationen till ett konto med en ränta som fastställs av Riksbanken","att företaget som gett ut obligationen slutar att betala ränta på obligationen, vilket får till följd att innehavaren förlorar sin löpande avkastning","att man vid en icke önskad tidpunkt kan få sitt obligationsinnehav omvandlat till aktier","att obligationen vid en bestämd tidpunkt omvandlas till en aktie i företaget med en förutbestämd teckningskurs","att företaget som gett ut obligationen väljer att konvertera den från tidsbestämd till evig"],"correct":[1,2],"multiSelect":true,"explanation":"De två huvudriskerna med coco-bonds är att emittenten kan sluta betala ränta (förlust av löpande avkastning) och att obligationen kan omvandlas till aktier vid en oönskad tidpunkt."},{"question":"Vad visar MSCI Fund ESG Quality Score?\n\nDen visar hur hållbara fondernas innehav är jämfört med:","options":["ett vedertaget hållbarhetsindex","ESG-ratingen för föregående år","alla fonder som finns tillgängliga","andra fonder i en viss kategori"],"correct":[3],"multiSelect":false,"explanation":"MSCI Fund ESG Quality Score jämför fondens hållbarhetsinnehav med andra fonder i en viss kategori."},{"question":"Var hittar man bland annat information om hur hållbarhetsarbetet i en fonds förvaltning bedrivs?","options":["i en rapport från Fondbolagens förening","på Finansinspektionens hemsida","via Hållbarhetsprofilen","på Bankföreningens hemsida"],"correct":[2],"multiSelect":false,"explanation":"Hållbarhetsprofilen är det verktyg där man hittar information om hur hållbarhetsarbetet i en fonds förvaltning bedrivs."},{"question":"Vilket av följande ageranden av bankerna är viktigast från ett samhällsekonomiskt perspektiv?","options":["att bankerna underlättar riskhantering och riskspridning, exempelvis genom att erbjuda bolån med olika löptider","att bankerna är bland de största aktörerna på värdepappersmarknaden och därmed bidrar till prisbildningen rörande aktier och andra värdepapper","att bankerna förvarar panter och andra värdefulla tillgångar på ett säkert sätt, vilket skapar trygghet för marknadens aktörer","att bankerna ger råd om sparande och placeringar, vilket påverkar konsumtionsmönstret och företagens investeringsvilja i samhället"],"correct":[0],"multiSelect":false,"explanation":"Från ett samhällsekonomiskt perspektiv är bankernas viktigaste roll att underlätta riskhantering och riskspridning, t.ex. genom att erbjuda bolån med olika löptider."},{"question":"Ett fondbolag är stor ägare i ett börsnoterat bolag. En kontroversiell fråga ska behandlas på en extra bolagsstämma i bolaget.\n\nVad gäller om röstrrätten för ett fondbolags aktier i en sådan situation?","options":["Endast fondandelsägarna får rösta, men det förutsätter att aktierna tillfälligt registreras om.","Endast fondandelsägarna får rösta, men samtliga av deras röster erhålls av det röstselternativ som företräds av majoriteten av dem.","Endast fondbolaget får rösta, men enligt Fondbolagens Förenings rekommendationer avstår svenska fonder från att rösta.","Endast fondbolaget får rösta och svenska fondbolag bedriver ofta aktiv ägarstyrning."],"correct":[3],"multiSelect":false,"explanation":"Ett fondbolag får rösta och svenska fondbolag bedriver ofta aktiv ägarstyrning."},{"question":"En viktig komponent i en hållbarhetslänkad obligation är Key Performance Indicators, så kallade KPI:er.\n\nVad ska dessa baseras på?","options":["materiella hållbarhetsmål hos emittenten","det emitterande företagets finansiella mål","fördefinierade mått i Sustainability-Linked Bond Principles","måtten som emittenten rapporterar enligt EU:s taxonomi"],"correct":[0],"multiSelect":false,"explanation":"KPI:erna i en hållbarhetslänkad obligation ska baseras på materiella hållbarhetsmål hos emittenten."},{"question":"Vad kännetecknar EU:s hållbarhetsindex Climate Transition Benchmarks (CTB) och Paris-aligned benchmarks (PAB)?\n\nFöretag som ingår i något av dessa index måste:","options":["kontinuerligt sänka sina växthusgasutsläpp.","rapportera sina klimatrisker enligt TCFD:s riktlinjer.","ha antagit en klimatplan som ska vara godkänd av styrelsen.","ha lägre växthusgasutsläpp än genomsnittet i sin sektor."],"correct":[0],"multiSelect":false,"explanation":"Företag som ingår i CTB och PAB-index måste kontinuerligt sänka sina växthusgasutsläpp för att vara i linje med klimatmålen."},{"question":"Ett svenskt bolag emitterar en obligation som är denominerad i amerikanska dollar i den japanska marknaden.\n\nVad kallas en sådan obligation?","options":["Dollaryen-obligation","Sekyen-obligation","Eurodollar-obligation","Dollarsek-obligation"],"correct":[2],"multiSelect":false,"explanation":"En Eurodollar-obligation är en obligation denominerad i dollar som emitteras utanför USA. Prefixet 'Euro' anger att den emitteras utanför hemmamarknaden."},{"question":"Vilka av följande objekt bedömer Moody's och Standard & Poor?\n\nVälj TVÅ svarsalternativ.\n\nKreditbedömning av:","options":["privatpersoner.","kommuner.","finansiella produkter.","kundportföljer.","fastigheter."],"correct":[1,2],"multiSelect":true,"explanation":"Moody's och Standard & Poor's kreditbedömer bland annat kommuner och finansiella produkter (som obligationer och strukturerade produkter)."},{"question":"Vilka av följande exempel är alltid en form av nyemission?\n\nVälj TVÅ svarsalternativ.","options":["Fondemission","Kontantemission","Apportemission","Omvänd splitemission","Tvångsinlösenemission"],"correct":[1,2],"multiSelect":true,"explanation":"Kontantemission och Apportemission är alltid former av nyemission. Fondemission innebär ingen tillförsel av nytt kapital."},{"question":"Brukar ett svenskt noterat publikt bolag vidta en åtgärd efter ett så kallat återköp och i så fall vilken åtgärd?","options":["Nej, ingen särskilt åtgärd förutom att behålla de återköpta aktierna som en tillgång.","Ja, öka antalet aktier genom en riktad ny nyemission.","Ja, minska antalet aktier genom att makulera dessa.","Ja, förbereda en avnotering från marknadsplatsen."],"correct":[2],"multiSelect":false,"explanation":"Efter ett återköp av egna aktier brukar bolaget minska antalet aktier genom att makulera dessa."},{"question":"När blir en aktieägare i ett svenskt noterat bolag skyldig att lägga ett bud på hela aktiebolaget, så kallad budplikt?\n\nNär aktieägarens innehav i bolaget uppgår till:","options":["10 % av aktierna eller rösterna","20 % av aktierna","30 % av rösterna","50 % av aktierna eller rösterna"],"correct":[2],"multiSelect":false,"explanation":"Budplikt inträder när en aktieägares innehav uppgår till 30% av rösterna i ett svenskt noterat bolag."},{"question":"Skiljer sig handeln på warrantmarknaden mot handeln med standardiserade optioner och i så fall på vilket sätt?","options":["Nej, det finns ingen skillnad.","Ja, på warrantmarknaden kan investeraren bara förlora insatt kapital, men på den standardiserade optionsmarknaden kan förlusten bli större.","Ja, på warrantmarknaden kan endast köpoptioner handlas, men på den standardiserade optionsmarknaden kan man handla även säljoptioner.","Ja, på warrantmarknaden säkerställs likviditeten av marknadsgaranter, men på den standardiserade optionsmarknaden finns det inga marknadsgaranter."],"correct":[1],"multiSelect":false,"explanation":"På warrantmarknaden kan investerare bara förlora insatt kapital, men på den standardiserade optionsmarknaden kan förlusten bli större (t.ex. vid utfärdade optioner)."},{"question":"Vad kan du med fördel göra för att ta del av ett sjunkande silverpris?","options":["köpa en future på silver","sälja en future på silver","köpa en köpoption på silver","sälja en säljoption på silver"],"correct":[1],"multiSelect":false,"explanation":"Genom att sälja en future på silver tjänar du pengar om silverpriset sjunker, eftersom du åtagit dig att sälja till ett högre pris."},{"question":"Vilka av följande finansiella instrument omfattas av Svensk Värdepappersmarknads Rekommendation om transparens på obligationsmarknaden?","options":["alla obligationer utgivna inom EES","alla obligationer utgivna av svenska företag och kommuner","alla obligationer i svenska kronor upptagna till handel på en reglerad marknad i Sverige eller som handlas på en handelsplats i Sverige","alla obligationer i svenska kronor upptagna till handel på en reglerad marknad inom EES eller som handlas på en handelsplats inom EES"],"correct":[2],"multiSelect":false,"explanation":"Rekommendationen omfattar alla obligationer i svenska kronor upptagna till handel på en reglerad marknad i Sverige eller som handlas på en handelsplats i Sverige."},{"question":"Vilka obligationstransaktioner omfattas av Svensk Värdepappersmarknads Rekommendation om transparens på obligationsmarknaden?","options":["endast transaktioner som utförs utanför en handelsplats","endast transaktioner som utförs på en handelsplats","både transaktioner som utförs på och utanför en handelsplats","både transaktioner som utförs på en reglerad marknad och på en MTF"],"correct":[2],"multiSelect":false,"explanation":"Rekommendationen omfattar både transaktioner som utförs på och utanför en handelsplats."},{"question":"Du jämför ett FRN-lån och en fastränteobligation utgivna av samma emittent. Bägge har löptid på 5 år.\n\nOm du väljer att investera i FRN-lånet, hur är då risken jämfört med om du hade valt fastränteobligationen?","options":["kreditrisken är lägre","kreditrisken är högre","ränterisken är lägre","ränterisken är högre"],"correct":[2],"multiSelect":false,"explanation":"FRN-lån (rörlig ränta) har lägre ränterisk än en fastränteobligation eftersom räntan justeras löpande efter marknadsräntan."},{"question":"Vad beror avkastningen på en realränteobligation på?","options":["nominella och reala räntan","reala räntan","reala räntan och inflationen","inflationen"],"correct":[2],"multiSelect":false,"explanation":"Avkastningen på en realränteobligation beror på den reala räntan och inflationen. Den nominella avkastningen kompenserar för båda."},{"question":"Vad menas med begreppet kreditspread?","options":["skillnad i kupongränta mellan stats- och kreditobligationer med samma löptid","skillnad i yield mellan stats- och kreditobligationer med samma löptid","skillnad i avkastning mellan kreditobligationer med olika löptid","skillnad i ratingbetyg mellan kreditobligationer med olika löptid"],"correct":[1],"multiSelect":false,"explanation":"Kreditspread är skillnaden i yield (effektiv ränta) mellan stats- och kreditobligationer med samma löptid. Den speglar kreditrisken."},{"question":"Vad medför ett tecknande av ett konvertibelt skuldebrev?\n\nVälj TVÅ svarsalternativ.","options":["rätt till utdelning i bolaget","rätt till utbyte mot nya aktier i ett bolag","ett penninglån till bolaget","en pantförskrivning","rösträtt på bolagsstämman","rätt att få nya aktier i fondemission"],"correct":[1,2],"multiSelect":true,"explanation":"En konvertibel är ett skuldebrev (penninglån till bolaget) som ger rätt att konvertera (byta ut) till nya aktier. Det ger inte rösträtt, utdelning eller teckningsrätter förrän konvertering skett."},{"question":"Fondbolag ska i årsberättelsen presentera fondens totalavkastning för de senaste fem åren (eller från starten).\n\nPå vilken grund ska totalavkastningen i en aktiefond som lämnar utdelning baseras enligt Fondbolagens Förenings rekommendation för redovisning av nyckeltal avseende investeringsfonder?\n\nPå utvecklingen av:","options":["fondförmögenheten plus återinvesterade utdelningar.","fondförmögenheten utan hänsyn till lämnade utdelningar.","andelsvärdet plus återinvesterade utdelningar.","andelsvärdet utan hänsyn till lämnade utdelningar."],"correct":[2],"multiSelect":false,"explanation":"Totalavkastningen baseras på andelsvärdet plus återinvesterade utdelningar. Det ger en rättvisande bild av den faktiska avkastningen en andelsägare fått."},{"question":"Vilket av följande placeringsalternativ har vanligtvis en prestationsrelaterad förvaltningsavgift?","options":["en fastighetsportfölj","en indexfond","en blandfond","en hedgefond"],"correct":[3],"multiSelect":false,"explanation":"Hedgefonder har typiskt en prestationsrelaterad avgift (ofta 20% av avkastning över en viss nivå), utöver en fast förvaltningsavgift."},{"question":"Vad innebär det att en portfölj har ett så kallat blandmandat?","options":["att placeringar kan ske i obligationer, fastigheter och valuta","att placeringar kan ske i obligationer och räntebärande placeringar","att placeringar kan ske i aktier och räntebärande placeringar","att placeringar kan ske i aktier, obligationer och råvaror"],"correct":[2],"multiSelect":false,"explanation":"Ett blandmandat innebär att portföljen kan placera i både aktier och räntebärande instrument. Det ger flexibilitet att anpassa fördelningen efter marknadsförhållanden."},{"question":"Vilket av följande alternativ om optioner är korrekt?","options":["Innehavare av en säljoption är skyldig att köpa underliggande tillgång om utfärdaren begär det.","Innehavaren av en köpoption är skyldig att köpa underliggande tillgång om utfärdaren begär det.","Utfärdaren av en säljoption är skyldig att sälja underliggande tillgång om innehavaren begär det.","Utfärdaren av en köpoption är skyldig att sälja underliggande tillgång om innehavaren begär det."],"correct":[3],"multiSelect":false,"explanation":"Utfärdaren av en köpoption har skyldigheten att sälja underliggande tillgång till lösenpriset om innehavaren begär det (löser optionen). Innehavaren har rätten, utfärdaren har skyldigheten."},{"question":"Vad är skillnaden mellan en amerikansk option och en europeisk option?","options":["Innehavaren av en amerikansk option kan påkalla lösen när som helst men det kan inte innehavaren av den europeiska optionen.","Innehavaren av en europeisk option kan påkalla lösen när som helst men det kan inte innehavaren av den amerikanska optionen.","Det finns ingen annan skillnad mellan en amerikansk och europeisk option än att de handlas på respektive länders börser.","En europeisk option är alltid standardiserad medan den amerikan optionen kan vara både standardiserad och icke standardiserad."],"correct":[0],"multiSelect":false,"explanation":"En amerikansk option kan lösas in när som helst under löptiden, medan en europeisk option bara kan lösas på slutdagen. Namnen har inget med geografisk marknad att göra."},{"question":"Värdet av en indexoption är lika med dess marknadspris (premie). Marknadspriset består av två delar; realvärde och tidsvärde.\n\nVilket av följande påståenden är riktigt?","options":["Köpoptionen har ett realvärde om aktiekursen understiger lösenkursen.","Köpoptionen har ett realvärde om aktiekursen överstiger lösenkursen.","Realvärdet kan vara negativt.","Tidsvärdet ökar under löptiden och är på slutdagen alltid 100."],"correct":[1],"multiSelect":false,"explanation":"En köpoption har realvärde när aktiekursen överstiger lösenkursen
