<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwedSec f&#246;r min &#228;lsklingsprinsessa</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',system-ui,sans-serif;background:#0c0a1a;color:#e2e8f0;min-height:100vh}
.root{max-width:700px;margin:0 auto;padding:20px 16px 60px}
.header{display:flex;align-items:center;gap:16px;margin-bottom:36px;padding-top:12px}
.logo{width:54px;height:54px;background:linear-gradient(135deg,#7c3aed,#a855f7,#c084fc);border-radius:15px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;color:#fff;box-shadow:0 4px 20px #7c3aed40}
.title{font-size:28px;font-weight:800;color:#f5f3ff;letter-spacing:-0.5px}
.subtitle{font-size:13px;color:#7c6faa;margin-top:3px;font-weight:500}
.card{background:linear-gradient(145deg,#16122a,#1a1530);border-radius:18px;padding:24px;margin-bottom:14px;border:1px solid #2d2653;transition:border-color .2s,transform .2s}
.card:hover{border-color:#4c3b8f;transform:translateY(-1px)}
.mod-name{font-size:18px;font-weight:700;color:#f5f3ff}
.mod-desc{font-size:13px;color:#8b7fba;margin-top:3px}
.stats{display:flex;gap:16px;margin-top:10px;font-size:13px;color:#9b8fc9}
.stats .green{color:#4ade80}
.stats .red{color:#f87171}
.btn-row{display:flex;gap:8px;margin-top:16px}
.btn{border:none;border-radius:11px;padding:12px 20px;font-size:14px;font-weight:600;color:#fff;cursor:pointer;font-family:inherit;transition:all .15s;flex:1;text-align:center}
.btn:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#7c3aed,#9333ea)}
.btn-secondary{background:#2d2653}
.btn-success{background:linear-gradient(135deg,#059669,#10b981)}
.btn-danger{background:#7f1d1d}
.btn-ghost{background:#1e1a35;border:1px solid #2d2653}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{background:#1e1a35;border:1px solid #2d2653;color:#c4b5fd;cursor:pointer;font-size:18px;padding:6px 12px;border-radius:9px;font-family:inherit;transition:all .15s}
.back-btn:hover{background:#2d2653;border-color:#4c3b8f}
.progress-text{font-size:13px;color:#9b8fc9;font-family:'JetBrains Mono',monospace}
.progress-bar{width:100%;height:5px;background:#1e1a35;border-radius:5px;margin-bottom:28px;overflow:hidden}
.progress-fill{height:5px;background:linear-gradient(90deg,#7c3aed,#c084fc);border-radius:5px;transition:width .4s ease}
.q-badge{display:inline-block;background:linear-gradient(135deg,#2d1b69,#3b2080);color:#c4b5fd;font-size:11px;font-weight:700;padding:5px 12px;border-radius:8px;margin-bottom:14px;text-transform:uppercase;letter-spacing:0.8px}
.q-text{font-size:17px;font-weight:600;color:#f5f3ff;line-height:1.55;margin-bottom:24px;white-space:pre-line}
.option{background:#16122a;border:2px solid #2d2653;border-radius:13px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-size:15px;line-height:1.5;transition:all .15s;display:flex;align-items:flex-start;gap:12px;user-select:none}
.option:hover{border-color:#4c3b8f;background:#1e1a35}
.option.selected{border-color:#8b5cf6;background:#2d1b6950}
.option.correct{border-color:#22c55e;background:#052e16}
.option.wrong{border-color:#ef4444;background:#450a0a}
.option.missed{border-color:#22c55e;background:#052e1660;border-style:dashed}
.opt-marker{width:24px;height:24px;min-width:24px;border-radius:7px;border:2px solid #4c3b8f;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-top:1px;color:#9b8fc9;transition:all .15s}
.option.selected .opt-marker{border-color:#8b5cf6;background:#8b5cf6;color:#fff}
.option.correct .opt-marker{border-color:#22c55e;background:#22c55e;color:#fff}
.option.wrong .opt-marker{border-color:#ef4444;background:#ef4444;color:#fff}
.option.missed .opt-marker{border-color:#22c55e;color:#22c55e;background:transparent}
.explain-box{background:linear-gradient(135deg,#1a1035,#16122a);border:1px solid #2d2653;border-left:4px solid #8b5cf6;padding:16px 18px;border-radius:0 12px 12px 0;margin:20px 0;font-size:14px;color:#c4b5fd;line-height:1.6}
.explain-box .explain-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#8b5cf6;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.explain-correct{color:#4ade80;font-weight:600;margin-bottom:8px}
.explain-wrong{color:#f87171;font-weight:600;margin-bottom:8px}
.result-pct{font-size:60px;font-weight:800;font-family:'JetBrains Mono',monospace;text-align:center}
.result-sub{text-align:center;color:#9b8fc9;font-size:15px;margin-top:4px}
.result-title{text-align:center;font-size:24px;font-weight:700;margin-top:14px;color:#f5f3ff}
.wrong-item{background:#1e1a35;border:1px solid #2d2653;border-radius:11px;padding:11px 14px;font-size:13px;color:#c4b5fd;line-height:1.45;margin-bottom:7px}
.ring-container{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring-text{position:absolute;font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace}
.score-pill{display:inline-flex;align-items:center;gap:5px;background:#1e1a35;border:1px solid #2d2653;padding:4px 12px;border-radius:20px;font-family:'JetBrains Mono',monospace;font-size:13px}
.confirm-row{display:flex;gap:8px;margin-top:14px;align-items:center}
.confirm-text{color:#f87171;font-size:14px;font-weight:600}
@media(max-width:500px){
.title{font-size:23px}
.q-text{font-size:15px}
.option{padding:12px 14px;font-size:14px}
.root{padding:16px 12px 40px}
}
</style>
</head>
<body>
<div class="root" id="app"></div>
<script>
var DATA={"Modul 1":[{"question":"Vilka alternativ beskriver tillsammans korrekt vilka kostnader som täcks av en fonds förvaltningsavgift?","options":["Marknadsföring","Förvaltning","Courtage","Tillsyn","Administration","Distribution","Externa analyser"],"correct":[0,1,3,4,5],"multiSelect":true,"instruction":"Välj FEM svarsalternativ","explanation":"En fonds förvaltningsavgift täcker kostnader för marknadsföring, förvaltning, tillsyn, administration och distribution. Courtage (transaktionskostnader) och externa analyser ingår normalt inte i förvaltningsavgiften utan belastar fonden separat."},{"question":"Fondbolag ska i årsberättelsen presentera fondernas totalavkastning för de senaste fem åren (eller från starten).\nPå vilken grund ska totalavkastningen i en aktiefond som lämnar utdelning baseras enligt Fondbolagens Förenings rekommendation för redovisning av nyckeltal avseende investeringsfonder?","options":["Fondförmögenheten plus återinvesterade utdelningar","Findförmögenheten utan hänsyn till lämnade utdelningar","Andelsvärdet plus återinvesterade utdelningar","Andelsvärdet utan hänsyn till lämnade utdelningar"],"correct":[2],"multiSelect":false,"explanation":"Enligt Fondbolagens Förenings rekommendation ska totalavkastningen baseras på andelsvärdet plus återinvesterade utdelningar. Detta ger en rättvisande bild av fondens faktiska avkastning för andelsägarna, eftersom utdelningar som återinvesteras bidrar till den totala värdeutvecklingen."},{"question":"Vilket av följande investeringsalternativ har vanligtvis en prestationsrelaterad förvaltningsavgift?","options":["En fastighetsportfölj","En indexfond","En blandfond","En hedgefond"],"correct":[3],"multiSelect":false,"explanation":"Hedgefonder har vanligtvis en prestationsrelaterad förvaltningsavgift (ofta kallad performance fee), typiskt 20% av avkastningen. Detta motiverar förvaltaren att generera hög avkastning. Indexfonder och blandfonder har normalt bara en fast förvaltningsavgift."},{"question":"Vad innebär det att en portfölj har ett så kallat blandmandat?","options":["Att placeringar kan ske i obligationer, fastigheter, och valuta","Att placeringar kan ske i obligationer och räntebärande placeringar","Att placeringar kan ske i aktier och räntebärande placeringar","Att placeringar kan ske i aktier, obligationer, och valuta"],"correct":[2],"multiSelect":false,"explanation":"Ett blandmandat innebär att portföljen kan placera i både aktier och räntebärande placeringar. Detta ger en bredare riskspridning jämfört med ett rent aktie- eller räntemandat."},{"question":"Vad gäller vanligtvis för aktieobligationer?","options":["De emitteras alltid med ränta","De emitteras aldrig med ränta","De handlas på andrahandsmarknaden","De handlas inte på andrahandsmarknaden"],"correct":[2],"multiSelect":false,"explanation":"Aktieobligationer är strukturerade produkter som handlas på andrahandsmarknaden. De kan emitteras med eller utan ränta — det är inte givet åt något håll. Det som generellt gäller är att de är omsättningsbara på en sekundärmarknad."},{"question":"Vad är skillnaden mellan en amerkansk och en europeisk option?","options":["Innehavaren av en amerikansk option kan påkalla lösen när som helst men det kan inte innehavaren av den europeiska optionen","Innehavaren av en europeisk option kan påkalla lösen när som helt men det kan inte innehavaren av den amerikanska oprionen","Det finns ingen annan skillnad mellan den amerikanska och den europeiska optionen än att de handlas på respektive länders börserbörser."],"correct":[0],"multiSelect":false,"explanation":"En amerikansk option kan påkallas för lösen när som helst under löptiden, medan en europeisk option bara kan lösas på slutdagen. Namnen har inget med geografisk marknad att göra utan är historiska benämningar."},{"question":"Värdet av en indexoption är lika med dess marknadspris (premie). Marknadspriset består av två delar; realvärde och tidsvärde. Vilket av följande påståenden är riktigt?","options":["Köpoptionen har ett realvärde om aktiekursen understiger lösenkursen","Köpoptionen har ett realvärde om aktiekursen överstiger lösenkursen","Realvärdet kan vara negativt","Tidsvärdet ökar under löptiden och är på slutdagen alltid 100"],"correct":[0],"multiSelect":false,"explanation":"För en köpoption uppstår realvärde när aktiekursen understiger lösenkursen — detta gäller för en säljoption. OBS: Frågan gäller en indexoption. Realvärdet kan aldrig vara negativt (lägst noll) och tidsvärdet minskar under löptiden (är noll på slutdagen)."},{"question":"Vilket av följande påståenden är korrekt beträffande marknadsrisken för en hedgefond? ","options":["Marknadsrisken för en hedgefond är i allmänhet:","Att jämföra med den som generellt finns på aktiemarknaden","Att jämföra med den som finns för en högriskaktie","Att jämföra med den som finns för en internationellt diversifierad indexfond","Att jämföra med den som finns för det riskfria placeringsalternativet"],"correct":[4],"multiSelect":false,"explanation":"Hedgefonder strävar efter att vara marknadsneutrala och minimera marknadsrisken. Deras risk liknar därför snarast det riskfria alternativet vad gäller marknadsrisk. Risken ligger istället i förvaltarens strategival (företagsspecifik risk)."},{"question":"Vilket av följande påståenden är korrekt beträffande en obligationsvärdering?","options":["Låg kupongränta medför en hög ränterisk","Låg kupongränta medför en låg ränterisk","Hög kupongränta medför en lång löptid","Hög kupongränta medför en kort löptid"],"correct":[0],"multiSelect":false,"explanation":"Låg kupongränta innebär att en större del av obligationens värde ligger i det framtida nominella beloppet. Detta gör att priset är mer känsligt för ränteförändringar, dvs. högre ränterisk (längre duration)."},{"question":"Vad är ett svenskt depåbevis?","options":["Ett svenskt noterat finansiellt instrument som motsvarar en utländskt noterad aktie","En svensk noterad aktie som handlas på en utländsk börs","En svensk noterad aktie som handlas i fysisk form","Ett noterat utländskt finansiellt instrument som motsvarar en svenskt noterad aktie"],"correct":[0],"multiSelect":false,"explanation":"Ett svenskt depåbevis (SDB) är ett svenskt noterat finansiellt instrument som representerar en utländskt noterad aktie. Det gör det möjligt för svenska investerare att handla utländska aktier på den svenska börsen i SEK."},{"question":"Finns det specifika kriterier för att en fond ska få marknadsföra sig som etisk och var i så fall anges det?","options":["Ja, i finansinspektionens föreskrifter kring etiska fonder","Ja, i FN:s PRI-principer för mänskilga rättigheter","Ja,i Fondbolagens Förenings riktlinjer för marknadsföring och information","Nej, det finns inga sådana kriterier"],"correct":[2],"multiSelect":false,"explanation":"Fondbolagens Förening har utarbetat riktlinjer för marknadsföring och information om fonder, inklusive kriterier för att en fond ska få kalla sig etisk. Det finns inga särskilda FI-föreskrifter eller FN-principer som specifikt reglerar detta."},{"question":"Vad gäller för stamaktier emitterade av bolag som bildats de senaste femtio åren?","options":["Röstvärdet kan vara minst en tusendels röst","En stamaktie kan vara utan röstvärde","Röstvärdet får högst vara tio gånger större än röstvärdet för den aktie som har lägst röstvärde","Alla stamaktier emitterade från ett och samma bolag har samma röstvärde"],"correct":[2],"multiSelect":false,"explanation":"Enligt aktiebolagslagen (ABL) får röstvärdet för en aktie vara högst tio gånger röstvärdet för en aktie med lägst röstvärde i samma bolag. Detta gäller bolag bildade under modern lagstiftning."},{"question":"Vad är en så kallad Covered Call?","options":["En strategi som innebär utfärdande av köpoptioner då man äger underliggande tillgång","En optionskombination som består av köp- och säljoptioner med två lösenpriser"],"correct":[0],"multiSelect":false,"explanation":"En Covered Call innebär att man utfärdar (säljer) köpoptioner på aktier man redan äger. Strategin genererar premieintäkter men begränsar uppsidepotentialen. Det är en vanlig strategi för att öka avkastningen i en portfölj."},{"question":"Vad består bokstäverna \"KV\" för i värdepappersnamnet Elekta KV 2 B?","options":["Köptoption","Konvertibelt skuldebrev","Betald teckningsaktie","Teckningsoption"],"correct":[1],"multiSelect":false,"explanation":"KV står för konvertibelt skuldebrev (konvertibel). Det är ett skuldebrev som kan konverteras till aktier i bolaget. I värdepappersnamnet Elekta KV 2 B anger KV att det är en konvertibel."},{"question":"Vilka alternativ beskriver bäst ett Open End-certifikat?\nVälj TVÅ svarsalternativ","options":["Certifikatet har en fastställd slutdag","Certifikatet emitteras av en bank/ett värdepappersbolag","Det finns ingen slutdag på certifikatet","Det innebär alltid högre marknadsrisk i certifikatet än för den underliggande varan"],"correct":[1,2],"multiSelect":true,"explanation":"Ett Open End-certifikat har ingen fastställd slutdag — det löper tills vidare. Det emitteras av en bank eller ett värdepappersbolag. Till skillnad från certifikat med slutdag kan innehavaren behålla sin position utan att behöva rulla över till ett nytt certifikat."},{"question":"Vilka utfärdar warranter på den svenska marknaden?\nVälj TVÅ svarsalternativ","options":["Företaget som emitterar den underliggande aktien","En bank","Ett värdepappersbolag","Nasdaq Stockholm","En befintlig aktieägare"],"correct":[1,2],"multiSelect":true,"explanation":"Warranter på den svenska marknaden utfärdas av banker och värdepappersbolag. Dessa fungerar som emittenter och marknadsgaranter. Det underliggande bolagets aktieägare eller Nasdaq Stockholm utfärdar inte warranter."},{"question":"Vad kännetecknar vanligtvis en förlagsaktie?\nVälj TRE svarsalternativ","options":["Den ger innehavaren sämre rätt till utdelning","Den ger innehavaren bättre rätt till utdelning","Den har rösträttsföreträde framför andra aktier","Den har sämre rösträtt än andra aktier i bolaget","Den kan lösas in efter beslut av ägaren, styrelsen, eller stämman"],"correct":[0,3,4],"multiSelect":true,"explanation":"En förlagsaktie ger innehavaren sämre rätt till utdelning jämfört med vanliga aktier, har sämre rösträtt, och kan lösas in efter beslut av ägaren, styrelsen eller stämman. Den är underordnad andra aktieslag."},{"question":"Vilken av följande fonder är en lång räntefond?","options":["Pennigmarknadsfond","Likviditetsfond","Företagsobligatiosnfond","Företagscertifikatfond"],"correct":[2],"multiSelect":false,"explanation":"En företagsobligationsfond investerar i obligationer med längre löptider, vilket gör den till en lång räntefond. Penningmarknadsfonder, likviditetsfonder och företagscertifikatfonder investerar i kortfristiga räntebärande instrument."},{"question":"Vad anger begreppet multiplikator som anges för många utgivna warranter?","options":["Hur många tillfällen warranter ger utdelning","Hur många warranter det går på en aktie","Hur många dagar det utestår på warranten","Hur många dagar som warranten funnits på marknaden"],"correct":[1],"multiSelect":false,"explanation":"Multiplikatorn anger hur många warranter det går på en underliggande aktie. Om multiplikatorn är 10 behövs 10 warranter för att motsvara en aktie. Detta påverkar warrantkursen proportionellt."},{"question":"Vilket påstående gällande riskbedömning av fondportföljer är korrekt?","options":["Börshandlad fond, ETF, med negativ hävstång är i normalfallet mer riskfylld än en börshandlad fond med positiv hävstång","Långa räntefonder är i normalfallet mer riskfyllda än blandfonder","Nationella branschfonder är i normalfalet mer riskfyllda än regionala aktiefonder","Hedgefonder är i normalfallet mer riskfyllda än aktiefonder","En strukturerad produkt utan kapitalgaranti är kopplad till en korg med fyra aktier (A, B, C, D). I villkoren framgår att återbetalningsbeloppet på slutdagen baseras på den aktie som utvecklats sämst på startdagen till den sista observationsdagen. Din kund som köpt denna produkt för 100,000 kr undrar nu vilket belopp som kommer att återbetalas till honom. De fura aktierna har vid sista observationsdagen haft följande utveckling:","Aktie A:","Aktie B:","Aktie C:","Aktie D:"],"correct":[2],"multiSelect":false,"explanation":"Nationella branschfonder är koncentrerade till en sektor i ett land, vilket ger hög koncentrationsrisk. Regionala aktiefonder sprider risken över flera sektorer och ibland flera länder, och har därmed normalt lägre risk."},{"question":"En strukturerad produkt utan kapitalgaranti är kopplad till en korg med fyra aktier (A, B, C, D). Återbetalningsbeloppet på slutdagen baseras på den aktie som utvecklats sämst. Kunden köpte produkten för 100,000 kr.\n\nAktie A: +35%\nAktie B: +20%\nAktie C: -20%\nAktie D: +45%\n\nVilket belopp återbetalas till kund?","options":["0 kr","80,000 kr","100,000 kr","120,000 kr"],"correct":[1],"multiSelect":false,"explanation":"Produkten baseras på den sämst utvecklade aktien (worst-of). Aktie C har utvecklats sämst med -20%. Utan kapitalgaranti ger detta: 100,000 × (1 - 0.20) = 80,000 kr."},{"question":"Ett räntebevis handlas på marknaden till ett värde av 92 kronor och ger en ränta på 4.5% baserat på det nominella värdet. Vilket är det lägsta beloppet som kan komma att återbetalas till den som köper detta bevis till rådande marknadspris?","options":["0 kr","92 kr per bevis plus räntan","100 kr per bevis","100 kr per bevis plus räntan"],"correct":[0],"multiSelect":false,"explanation":"Ett räntebevis har en kreditrisk kopplad till emittenten. Om emittenten ställer in betalningarna kan innehavaren förlora hela sitt investerade belopp. Därför är det lägsta möjliga återbetalningsbeloppet 0 kr."},{"question":"Vilken risk har en säkerställd obligation? (covered bond)","options":["Den har lägre risk än statsobligationer och företagsobligationer","Den har samma risk som statsobligationer, men inte företagsobligationer","Den högre risk än statsobligationer, men lägre risk än företagsobligationer","Den har samma risk som företagsobligationer, men inte statsobligationer"],"correct":[2],"multiSelect":false,"explanation":"En säkerställd obligation (covered bond) har säkerheter i form av bostadslån eller offentlig kredit. Den har högre risk än statsobligationer (som har statens fulla garanti) men lägre risk än företagsobligationer (som saknar särskild säkerhetsmassa)."},{"question":"Vad beror avkastningen på en realränteobligation på?","options":["Nominella och reala räntan","Reala räntan","Reala räntan och inflationen","Inflationen"],"correct":[2],"multiSelect":false,"explanation":"Avkastningen på en realränteobligation beror på den reala räntan (den fasta kupongen) plus inflationen. Den nominella avkastningen kompenserar alltså för inflationen, vilket skyddar köpkraften."},{"question":"Vad menas med begreppet kreditspread?","options":["Skillnad i kupongränta mellan stats- och kreditobligationer med samma löptid","Skillnad i yield mellan stats- och kreditobligationer med samma löptid","Skillnad i avkastning mellan kreditobligationer med olka löptid","Skillnad i ratingbetyg mellan kreditobligationer med olka löptid"],"correct":[1],"multiSelect":false,"explanation":"Kreditspread är skillnaden i yield (effektiv avkastning) mellan en kreditobligation och en statsobligation med samma löptid. Den speglar den extra kompensation investeraren kräver för kreditrisken."},{"question":"Vilken av följande delar består en minifuture av?","options":["En kapitalinsats","En option","Ett terminskontrakt","En obligation"],"correct":[0],"multiSelect":false,"explanation":"En minifuture består av en kapitalinsats (eget kapital) och ett lån (finansiering). Hävstången uppstår genom att investeraren bara behöver ställa kapitalinsatsen medan resten finansieras av emittenten."},{"question":"Anta att ett företag har upplåning till fast ränta. Företaget tror nu att marknadsräntorna kommer att sjunka och vill därför sänka sin lånekostnad med hjälp av en ränteswap. Vilken position ska företaget ta i ränteswappen?","options":["Betala fast ränta och erhålla rörlig ränta","Betala rörlig ränta och erhålla fast ränta","Betala och erhålla rörlig ränta","Betala och erhålla fast ränta"],"correct":[1],"multiSelect":false,"explanation":"Företaget betalar redan fast ränta. Med en ränteswap kan de betala rörlig ränta och erhålla fast ränta. Den erhållna fasta räntan kvittas mot låneräntan, och nettot blir att företaget betalar rörlig ränta — som förväntas sjunka."},{"question":"Vilken är en av de huvudsakliga skillnaderna mellan en warrant och en turbowarrant?","options":["Turbowarrantens värde kan sjunka under det insatta kapitalet, vilket inte kan hända vid en placering i en vanlig warrant","Turbowarranten har en barriärnivå som innebär att den ger kraftigare uppgång om aktien når barriärnivån","Turbowarrantens värde påverkas mindre än en vanlig warrant vid förändring av volatiliteten","Turbowarranter kan endast ge avkastning vid positiv kursutveckling på den underliggande tillgången"],"correct":[2],"multiSelect":false,"explanation":"En turbowarrant har en barriärnivå (knock-out) och dess värde påverkas betydligt mindre av förändringar i volatiliteten jämfört med en vanlig warrant. Turbowarrantens pris bestäms främst av realvärdet."},{"question":"Vid prisjämförelser mellan olika fonder används begreppet årlig avgift. Vad baserar sig den årliga aviften på?","options":["Den förväntade avgiften för närmaste året som fonden avser att ta ut för det förvaltade kapitalet","Avgiften det senaste året exklusive courtage och prestationsbaserade avgifter","Fondens samtliga kostnader för förvaltning, distribution, skatter, och transaktionskostnader","Fondens samtliga avgifter förutom förvaltning"],"correct":[1],"multiSelect":false,"explanation":"Den årliga avgiften baseras på de faktiska avgifter som fonden tog ut det senaste året, exklusive courtage och prestationsbaserade avgifter. Den ger en standardiserad jämförelse mellan fonder."},{"question":"Vilka av följande emitterar räntecertifikat på den svenska marknaden?\nVälj TRE svarsalternativ","options":["Riksbanken","Affärsbanker","Riksgälden","Korta räntefonder","Kommuner"],"correct":[1,2,4],"multiSelect":true,"explanation":"Räntecertifikat på den svenska marknaden emitteras av affärsbanker, Riksgälden och kommuner. Riksbanken emitterar inte räntecertifikat, och korta räntefonder är köpare, inte emittenter."},{"question":"Två kapitalskyddade produkter som getts ut vid samma tidpunkt med samma löptid och med samma underliggande index har olika deltagandegrad. Vad är den troliga orsaken till att en produkt har högre deltagandegrad?","options":["Den är garanterad av en bank med sämre kreditvärdighet","Den är garanterad av en bank med bättre kreditvärdighet","Den är garanterad av en bank med lägre omsättning","Den är garanterad av en bank med högre omsättning"],"correct":[0],"multiSelect":false,"explanation":"En bank med sämre kreditvärdighet har högre finansieringskostnader, men kan erbjuda högre deltagandegrad som kompensation för den ökade kreditrisken. Investeraren tar alltså mer risk i utbyte mot potentiellt högre avkastning."},{"question":"Vilken av följande förkortningar används för hållbara och ansvarsfulla investeringar?","options":["SRI eller RI","PRO eller PR","FRA eller FOA","EFT eller EFG"],"correct":[0],"multiSelect":false,"explanation":"SRI (Socially Responsible Investment) och RI (Responsible Investment) är de vedertagna förkortningarna för hållbara och ansvarsfulla investeringar."},{"question":"Ett fondbolag som du samarbetar med har på sin hemsida angett en av sina fonders koldioxidavtryck. Vad anger detta mått?","options":["Fondbolagets koldioxidutsläpp (Co2e under ett år) i relation till fondbolagets totala intäkter under ett år","Fondbolagets koldioxidutsläpp (Co2e under ett år) i relation till fondens totala värde","Fondbolagets koldioxidutsläpp (Co2e under ett år) i relation till fondens ägarandel i bolag utan koldioxidavtryck","Fondens ägarandel av alla portföljbolagens utsläpp (Co2e under ett år) i relation till fondens ägarandel av alla portföljbolagens intäkter"],"correct":[3],"multiSelect":false,"explanation":"Fondens koldioxidavtryck beräknas som fondens ägarandel av alla portföljbolagens utsläpp (CO2e under ett år) i relation till fondens ägarandel av alla portföljbolagens intäkter. Det visar hur koldioxidintensiva fondens investeringar är."},{"question":"Vilken av följande strukturerade placeringar ger innehavaren generellt sett bästa deltagandegrad?","options":["En kapitalskyddad placering vars avkastning baseras på OMX 30 index","En icke kapitalskyddad placering vars avkastning baseras på en korg av de fyra största bolagen på stockholmsbörsen","En icke kapitalskyddad placering vars avkastning baseras på OMX 30 index"],"correct":[1],"multiSelect":false,"explanation":"En icke kapitalskyddad placering med en koncentrerad korg ger generellt bäst deltagandegrad. Kapitalskyddet kostar pengar (minskar deltagandegraden) och ett brett index ger lägre volatilitet (billigare optioner = högre deltagandegrad), men den saknade kapitalgarantin väger tyngst."},{"question":"Av vem emitteras en Svensk statsobligation?","options":["Sveriges riksdag","Sveriges riksbank","Riksgälden","Finansdepartementet"],"correct":[2],"multiSelect":false,"explanation":"Svenska statsobligationer emitteras av Riksgälden, som är statens finansförvaltning. Riksgälden ansvarar för statens upplåning och skuldförvaltning."},{"question":"Vad är gröna obligationer?","options":["Obligationer som är speciellt framtagna för miljöorganisationer","Obligationer som ges ut för att finansiera specifika miljöprojekt","Obligationer där kapitalet investeras i miljöfonder","Obligationer som ges ut av företag med hög miljörating"],"correct":[1],"multiSelect":false,"explanation":"Gröna obligationer (green bonds) är obligationer vars likvid öronmärks för att finansiera specifika miljöprojekt, som förnybar energi eller energieffektivisering. De skiljer sig från vanliga obligationer genom denna öronmärkning."},{"question":"Vilket av följande påståenden är riktigt beträffande lagreglerna om flaggning?","options":["Reglerna omfattar samtliga svenska instrument","Reglerna omfattar samtliga svenska instrument utom konvertibla skuldbrev","Reglerna omfattar samtliga svenska aktier","Reglerna omfattar samtliga svenska aktier som är upptagna till handel på en reglerad marknad"],"correct":[3],"multiSelect":false,"explanation":"Flaggningsreglerna omfattar aktier som är upptagna till handel på en reglerad marknad. Reglerna gäller inte samtliga svenska aktier eller instrument utan är avgränsade till börsnoterade aktier."},{"question":"Vem får göra ett blankingsavtal?","options":["Den som har ett ramavtal för värdepapperslån","Den som har ett depåavtal med ett värdepappersinstitut","Den som har ett kontoavtal med ett värdepappersinstitut","Den som har ett förfogandeavtal för konvertibellån"],"correct":[0],"multiSelect":false,"explanation":"För att kunna genomföra en blankningsaffär behöver man ha ett ramavtal för värdepapperslån, så att man kan låna aktierna som ska säljas. Vanliga depå- eller kontoavtal ger inte denna möjlighet."},{"question":"Varför har marknadsplatser ett system för övervakning av handeln? För att ha möjlighet att bland annat: ","options":["Följa upp att handelsdeltagarna har tillräckliga finansiella resurser","Upptäcka om någon gör sig skyldig till exempelvis insiderbrott eller marknadsmanipulation","Föra statistik över handeln via marknadsplatsen","Undersöka om någon gör sig skyldig till penningtvätt"],"correct":[1],"multiSelect":false,"explanation":"Marknadsplatsers övervakningssystem syftar till att upptäcka marknadsmissbruk, exempelvis insiderbrott och marknadsmanipulation. Det handlar om att upprätthålla marknadens integritet och investerarskydd."},{"question":"Ett värdepappersinstitut ska upprätta riktlinjer om bästa orderutförande. Riktlinjerna ska uppdateras minst en gång per år eller när det inträffar en betydande förändring. Vem ska uppdatera riktlinjerna?","options":["Svenska bankförening","Finansinspektionen","Svenska Fondhandlarföreningen","Institutet"],"correct":[3],"multiSelect":false,"explanation":"Institutet själv ansvarar för att upprätta och uppdatera sina riktlinjer om bästa orderutförande. Varken FI, Svenska Fondhandlarföreningen eller Svenska bankföreningen gör detta åt institutet."},{"question":"Vad är enligt lagen om värdepappersmarknaden en handelsplattform?","options":["En form av så kallad reglerad marknad","En marknadsplats som står under tillsyn av finansinspektionen","En multilateral marknadsplats","Det tekniska system som en börs bedriver sin handel i"],"correct":[1],"multiSelect":false,"explanation":"Enligt lagen om värdepappersmarknaden är en handelsplattform (MTF) en marknadsplats som står under tillsyn av Finansinspektionen. Det är inte samma sak som en reglerad marknad (börs)."},{"question":"Vilken av nedanstående förutsättningar ska vara uppfylld för att ett bolags aktier skall kunna tas upp vid en MTF plattform?","options":["Att bolaget har en dokumenterad lönsamhet och operativ historik","Att tillräcklig information om aktierna och bolaget ska finnas tillgänglig för marknadsaktörerna","Att ett värdepappersinstitut ställer upp som market maker för bolagets aktier","Att bolaget offentliggör finansiella rapporter varje kvartal"],"correct":[1],"multiSelect":false,"explanation":"För att aktier ska kunna tas upp till handel på en MTF-plattform krävs att tillräcklig information om aktierna och bolaget finns tillgänglig för marknadsaktörerna. Lönsamhetskrav och market maker-krav gäller inte generellt."},{"question":"Vilka krav gäller för en MTF-plattform?","options":["Den ska bedriva marknadsövervakning","Den ska ha en disciplinnämnd","Den ska ha regler om flaggning","Den ska ha regler om insättningsgaranti'"],"correct":[0],"multiSelect":false,"explanation":"En MTF-plattform ska bedriva marknadsövervakning för att säkerställa ordnad handel. Krav på disciplinnämnd, flaggningsregler och insättningsgaranti gäller inte specifikt för MTF-plattformar."},{"question":"Vad kännetecknar kreditmarknadens sekundärmarknad?","options":["Där handlas enbart med ränteterminer","Där handlas endast med tidigare utgivna räntebärande instrument","Där förses företagen med lånekapital","Där handlas endast med långa obligationer"],"correct":[1],"multiSelect":false,"explanation":"Kreditmarknadens sekundärmarknad är där tidigare utgivna räntebärande instrument handlas mellan investerare. Primärmarknaden är där nya instrument ges ut och företag får lånekapital."},{"question":"Vid orderhantering finns undantag för kravet på passandebedömning vid så kallad execution only tjänster. När behövs passandebedömning inte göras?","options":["När kunden kontaktas personligen av institutet","När kundens order avser optioner som handlas på reglerad marknad","När kunden är en näringsidkare","När ordern utförs på kundens initiativ"],"correct":[3],"multiSelect":false,"explanation":"Vid execution only (orderutförande utan rådgivning) behövs ingen passandebedömning om ordern utförs på kundens eget initiativ. Om institutet kontaktar kunden eller om produkten är komplex gäller andra regler."},{"question":"Vilken marknadsplats är enligt lagen om värdepapersmarknaden en reglerad marknad?","options":["AktieTorget","Nasdaq OMX","First North","Chi-X"],"correct":[1],"multiSelect":false,"explanation":"Nasdaq OMX (Stockholm) är den reglerade marknaden enligt lagen om värdepappersmarknaden. AktieTorget, First North och Chi-X är/var MTF-plattformar, inte reglerade marknader."},{"question":"Ett värdepappersinstitut ska upprätta riktlinjer för utförande av order. I vilken av följande situationer gäller sådana riktlinjer?","options":["När ett institut ger kund rådgivning om finansiella instrument som upptas till handel på en reglerad marknad","När ett institut ger kund rådgivning om aktier och aktierelaterade finansiella instrument","När ett institut handlar med finansiella instrument för egen räkning","När ett institut handlar med finansiella instrument kunds räkning"],"correct":[3],"multiSelect":false,"explanation":"Riktlinjer för orderutförande gäller när institutet handlar med finansiella instrument för kundens räkning. Det handlar om att säkerställa bästa möjliga utförande av kundens order."},{"question":"I Sverige är det tillåtet att göra blankningsaffärer, det vill säga att sälja värdepapper man inte äger. I många fall möjliggörs blankningsaffärer genom aktielån. Vad är kännetecknande för ett aktielån?","options":["Handel med aktielån är inte föremål för säkerhetskrav","Motivet för att ingå ett avtal med aktielån kan för långivaren vara att med låg risk öka avkastningen i en kortfristig portfölj","Låntagaren övertar långivarens äganderätt och rösträtt under lånets löptid","Handel med aktielån sker endast på standardiserade villkor"],"correct":[2],"multiSelect":false,"explanation":"Vid ett aktielån övertar låntagaren äganderätten och rösträtten under lånets löptid. Långivaren ger alltså upp sina rättigheter tillfälligt. Aktielån kräver säkerhet och kan ske på olika villkor."},{"question":"Vilken är den huvudsakliga skillnaden mellan en börshandlad fond, en så kallad ETF, och en vanlig investeringsfond?","options":["Andelar i en ETF kan överlåtas på en andrahandsmarknad medan vanliga fondandelar alltid ges ut och löses direkt av fondbolagen","Andelar I ETF:er handlas på en börs. I övrigt hanteras fondandelarna på samma sätt","Börhandlade fonder administreras av en börs, medan vanliga fonder administreras av ett fondbolag","Börhandlade fonder kan endast investera I börsnoterade aktier, medan vanliga investeringsfonder även kan investera i andra tillgångar3"],"correct":[0],"multiSelect":false,"explanation":"Den huvudsakliga skillnaden är att ETF-andelar kan överlåtas på en andrahandsmarknad (börs) mellan köpare och säljare, medan vanliga fondandelar alltid ges ut och löses in direkt av fondbolaget."},{"question":"Vad är XACT OMXS30 och SpotR OMXS30 exempel på?","options":["Börshandlade warranter","Börhandlade fonder","OTC-derivat","Onoterade aktieindexobligationer"],"correct":[1],"multiSelect":false,"explanation":"XACT OMXS30 och SpotR OMXS30 är börshandlade fonder (ETF:er) som följer OMXS30-indexet. De handlas som aktier på börsen."},{"question":"Vad har en återförsäljare av statsobligationer åtagit sig gentemot Riksgälden?\nVälj TRE svarsalternativ","options":["Att för egen eller kunders räkning lämna bud i riksgäldens auktioner","Att tillhandahålla likviditet på andrahandsmarknaden","Att aktivt marknadsföra riksgäldens auktioner till sina kunder","Att på begäran låna ut obligationer till investerare på andrahandsmarknaden","Att prioritera riksgäldens auktioner framför auktioner från konkurrerande utgivare"],"correct":[0,1,2],"multiSelect":true,"explanation":"En återförsäljare (primary dealer) åtar sig att lämna bud i Riksgäldens auktioner, tillhandahålla likviditet på andrahandsmarknaden och aktivt marknadsföra auktionerna till sina kunder."},{"question":"Vad är syftet med stabilisering i samband med en börsintroduktion?","options":["Att undvika tilfällig obalans i tillgång och efterfrågan med anlednig av att investerare säljer aktier","Att möjliggöra positiv kursutveckling så att investerare ges incitament att köpa aktien","Att sökerställa att bolaget uppfyller de spridningskrav som gäller för en börsnotering","Att undvika tillfällig försämrad likviditet och därmed att säkerställa en fungerande orderdriven handel"],"correct":[0],"multiSelect":false,"explanation":"Stabilisering vid en börsintroduktion syftar till att undvika tillfällig obalans i tillgång och efterfrågan som kan uppstå när tidiga investerare säljer sina aktier kort efter noteringen."},{"question":"Anta att backwardation råder för en valutatermin. Finns det då ett samband mellan priset på valutaterminen och det förväntade spotpriset?","options":["Ja, terminpriset är högre än spotpriset","Ja, terminpriset och spotpriset är detsamma","Ja, terminpriset är lägre än spotpriset","Nej, terminpriset och spotpriset har inget samband"],"correct":[2],"multiSelect":false,"explanation":"Backwardation innebär att terminspriset är lägre än det förväntade spotpriset (och ofta lägre än nuvarande spotpris). Detta är motsatsen till contango."},{"question":"Vad av följande går du miste om om du lånar ut dina aktier, så kallade aktielån?","options":["Utdelningen","Inlösenrätten och emissionsrätten","Rösträtten","Värdetillväxten"],"correct":[2],"multiSelect":false,"explanation":"Vid aktielån behåller låntagaren äganderätten och värdetillväxten, och långivaren kompenseras för utdelningar. Men rösträtten övergår till låntagaren — den går du alltså miste om."},{"question":"Vissa regler som gäller på de Svenska MTF-plattformarna Spotlight Market, First North, och Nordic MTF bygger på självreglering och inte på Svensk lag eller EU-förordningar. Vilket av följande områden omfattas av sådan självreglering?","options":["Krav på noteringsdokument innan värdepappret ska noteras","Prospektkrav när de noterade bolagen erbjuder värdepapper till allmänheten","Regler om offentliggörande om blankningar","Insynspersoners rapportering av sina transaktioner I det noterade bolaget"],"correct":[0],"multiSelect":false,"explanation":"MTF-plattformar kan ha egna krav på noteringsdokument genom självreglering. Prospektkrav, blankningsregler och insynsrapportering regleras i lag/EU-förordningar."},{"question":"Vad är BATS Europe?","options":["Den del av interpol som handägger ärenden gällande marknadsmissbruk","Den pan-europeiska tillsynsmyndigheten för börs, värdepapper, och kapitalmarknad","En engelsk börs som erbjuder handel i aktier som är noterade på börser I andra länder","En pan-europeisk sammanslutning för nationella bankföreningar"],"correct":[2],"multiSelect":false,"explanation":"BATS Europe (numera Cboe Europe) är en börs baserad i London som erbjuder handel i aktier noterade på andra europeiska börser. Det är en alternativ handelsplats som konkurrerar med nationella börser."},{"question":"Hur presenteras priset på obligationer när det sätts som så kallat Dirty Price?","options":["Priset presenteras inklusive upplupen ränta","Priset uttrycks i kurs","Priset presenteras exklusive upplupen ränta","Priset uttrycks i ränta"],"correct":[0],"multiSelect":false,"explanation":"Dirty Price innebär att priset på obligationen presenteras inklusive upplupen ränta. Clean Price (det vanligare sättet att kvotera) exkluderar upplupen ränta."},{"question":"När ska en avräkningsnota upprättas?","options":["På likviddagen","På likviddagen, eller om det inte är tidsmässigt möjligt, på senaste påföljande bankdag","På avslutsdagen, eller om det inte är tidsmässigt möjligt, senast på likviddagen","På avslutsdagen, eller om det inte är tidsmässigt möjligt, senast påföljande bankdag"],"correct":[3],"multiSelect":false,"explanation":"En avräkningsnota ska upprättas på avslutsdagen (den dag affären görs), eller om det inte är tidsmässigt möjligt, senast påföljande bankdag."},{"question":"Avveckling sker efter att en affär gjorts upp på Nasdaq Stockholm. Hur går en sådan avveckling till?","options":["Efter att en affär gjorts upp, instruerar börsen Euroclear Sweden att avveckla affären två dagar senare","Avveckling sker i börsens system efter två dagar varefter omergistrering sker i Euroclear Sweden","Avvecklingens ker likvid mot leverans så snart affärsavslut ägt rum på börsen","Börsen bekräftar avslutet till börsmedlemmen och affären avvecklas genom Euroclear Sweden två dagar senare"],"correct":[3],"multiSelect":false,"explanation":"Börsen bekräftar avslutet till börsmedlemmen och affären avvecklas sedan genom Euroclear Sweden två bankdagar senare (T+2). Det är Euroclear Sweden som sköter den faktiska avvecklingen."},{"question":"En VP-kontoinnehavares köp och försäljning av finansiella instrument under året ska redovisas till Skatteverket. Vem är skyldig att göra denna deklaration?","options":["Förvaltaren","VP-kontoinnehavaren","Euroclear Sweden","Kontoförande institut"],"correct":[1],"multiSelect":false,"explanation":"VP-kontoinnehavaren (investeraren) är själv skyldig att deklarera sina köp och försäljningar till Skatteverket. Kontrolluppgifter skickas dock av kontoförande institut."},{"question":"Anta att du köper aktier som avvecklats enligt ett ordinarie avvecklingsschema. När har du aktierna bokförda på ditt VP-konto? ","options":["Samma dag som köpet","Dagen efter köpet","Fem bankdagar efter köpet","Två bankdagar efter köpet"],"correct":[3],"multiSelect":false,"explanation":"Med ordinarie avveckling (T+2) bokförs aktierna på VP-kontot två bankdagar efter köpet."},{"question":"En aktieägare som har förvaltarregistrerade Volvoaktier omregistrerar tillfälligt aktierna i eget namn inför en årsstämma i Volvo. Varför gör aktieägaren detta?","options":["Aktieägaren vill ha möjlighet att delta på bolagsstämman samt eventuellt utöva sin rösträtt","Volvo har rätt att veta vilka som är de bakomliggande aktieägarna","Det är ett krav från Finansinspektionen","Depåbanken ska kunna skicka ett ombud till stämman"],"correct":[0],"multiSelect":false,"explanation":"En aktieägare med förvaltarregistrerade aktier måste tillfälligt rösträttsregistrera (omregistrera) aktierna i eget namn för att kunna delta och rösta på bolagsstämman."},{"question":"En ägare med förvaltarregistrerat innehav av aktier i ett aktiemarknadsbolag måste rösträttsregistrera aktierna för att få delta på bolagsstämman i bolaget. Hur ska en sådan rösträttsregistrering genomföras av aktieägaren?","options":["Anmäler till bolaget minst en vecka i förväg att han eller hon vill delta på stämman","Anmäler till förvaltaren att ha eller hon vill delta på stämman, och att förvaltaren anmäler detta till Euroclear Sweden senast fem dagar innan stämman","Anmäler till Bolagsverket minst två veckor innan stämman att han eller hon vill delta på stämman, och Bolagsverket anmäler detta till bolaget minst fem dagar innan stämman","Anmäler till Euroclear Sweden minst tre dagar innan stämman att han eller hon vill delta på stämman"],"correct":[1],"multiSelect":false,"explanation":"Aktieägaren anmäler till sin förvaltare som sedan anmäler till Euroclear Sweden senast fem dagar innan stämman. Förvaltaren agerar alltså mellanhand i processen."},{"question":"Vilket av följande påstående återspeglar bäst begreppet hedging?","options":["En optionsstratgi","En placering av aktier såväl som optioner","Att en exponering är skyddad","Att en placerings totala risk helt diversifierats bort"],"correct":[2],"multiSelect":false,"explanation":"Hedging innebär att en exponering är skyddad mot oönskade prisrörelser. Det behöver inte vara en komplett eliminering av risk, utan handlar om att skydda en befintlig position."},{"question":"Hur beräknas ett prisviktat index, exempelvis Dow Jones indexet?","options":["Genom att addera de aktiekurser i absoluta tal som ingår i indexet","Genom att addera marknadsvärdet av de aktier som ingår i indexet","Genom att räkna ut genomsnittspriset per aktie gånger antalet aktier","Genom att ta priset per aktie dividerat med antal aktier"],"correct":[3],"multiSelect":false,"explanation":"Ett prisviktat index beräknas genom att summera aktiepriserna och dividera med antal aktier (eller en divisor). Dow Jones Industrial Average är det klassiska exemplet på ett prisviktat index."},{"question":"Anta att din kund i Sverige har köpt en valutatermin på valutaparet GBP/USD till priset av 1.65. I vilken valuta kommer vinsten eller förlusten att visas för kunden?","options":["SEK","USD","GBP","Valfri av ovannämnda valutor"],"correct":[1],"multiSelect":false,"explanation":"I valutaparet GBP/USD är USD kvotvalutan. Vinst eller förlust på en termin i detta par realiseras i USD — den valuta som rör sig i förhållande till basvalutan."},{"question":"Valutaparet GBP/USD handlas för kursen 1.65. Hur många GBP får du då för en USD?","options":["0.6060606060606061","1","1.65","2.75"],"correct":[0],"multiSelect":false,"explanation":"GBP/USD = 1.65 betyder att 1 GBP kostar 1.65 USD. För att beräkna hur många GBP du får för 1 USD: 1/1.65 ≈ 0.61 GBP."},{"question":"Vilken av de risker som man bör förstå när man placerar i en så kallad coco-bond, contingent convertible bond?","options":["Att staten konverterar obligationen till ett konto med en fast ränta som fastställs av Riksbanken","Att företaget som gett ut obligationen slutar att betala ränta på obligationen, vilket får till följd att innehavaren förlorar sin löpande avkastning","Att man vid en icke önskad tidpunkt kan bli aktieägare i det bolag som givit ut obligationen","Att obligationen vid en bestämd tidspunkt omvandlas till en aktie i företaget med en förutbestämd aktiekurs"],"correct":[2],"multiSelect":false,"explanation":"En coco-bond (contingent convertible bond) kan konverteras till aktier vid en förutbestämd triggerhändelse (t.ex. om bankens kärnprimärkapitalrelation faller under en viss nivå). Risken är att man ofrivilligt blir aktieägare vid en oönskad tidpunkt."},{"question":"Ett prospekt ska enligt lagen upprättas med anledning av?","options":["Ett erbjudande bara till kvalificerade investerare","En introduktion på NGM Equity","En introduktion på First North","En fondemission i ett börsnoterat bolag"],"correct":[1],"multiSelect":false,"explanation":"Enligt lagen ska prospekt upprättas vid introduktion på en reglerad marknad, som NGM Equity. First North är en MTF-plattform som har egna regler för noteringsdokument men inte lagkrav på prospekt."},{"question":"Enligt lag ska personer som förvärvar aktier i ett svenskt börsnoterat bolag anmäla sitt förvärv (flaggning). Vilka omfattas av denna anmälningsskyldighet?\nVälj TVÅ svarsalternativ","options":["Enbart Svenska aktiebolag","Alla juridiska personer","Alla fysiska personer","Svenska juridiska personer","Svenska fysiska personer"],"correct":[1,2],"multiSelect":true,"explanation":"Flaggningsskyldigheten gäller alla fysiska och juridiska personer som förvärvar eller avyttrar aktier och passerar vissa gränsvärden. Den är inte begränsad till svenska personer."},{"question":"Vilket är huvudsyftet med reglerna om utformning av prospekt? Att säkerställa att:","options":["Den information som kan antas påverka marknadens värdering av de utgivna aktierna är tillgänglig i prospektet","Prospektet utgör ett tillförlitligt underlag för värdering av aktier vid ett tvånginlösenförfarande","Den information som ges i prospektet är tillgängligt för ett så stort antal investerare som möjligt","Prospektet utgör ett tillförlitligt underlag för bevakning av reglerna om otillbörlig marknadspåverkan"],"correct":[0],"multiSelect":false,"explanation":"Huvudsyftet med prospektreglerna är att säkerställa att information som kan påverka marknadens värdering av aktierna finns tillgänglig i prospektet. Det handlar om investerarskydd genom information."},{"question":"I vilken av följande situationer måste ett prospekt upprättas?","options":["När aktier tas upp till handel på en reglerad marknad","När en emission avser andelar i en inveteringsfond","När aktier tas upp till handel på en MTF-plattform","När bolaget vill genomföra återköp av egna aktier"],"correct":[0],"multiSelect":false,"explanation":"Prospekt måste upprättas när aktier tas upp till handel på en reglerad marknad. MTF-plattformar har andra krav (noteringsdokument). Fondandelar och återköp kräver inte prospekt."},{"question":"En bank är moderbolag till tre fondbolag som förvaltar flera aktiefonder. Koncernen har sökt och fått de undantag från flaggningsreglerna som maximalt är möjliga at få. Hur ska man inom koncernen flagga sina innehav?","options":["Koncernens samtliga innehav, inklusive fondernas, ska flaggas som ett innehav","Varje fondbolags aktierfonders innehav ska flaggas var för sig och bankens innehav för sig","Innehavet i de tre fondbolagens aktiefonder ska flaggas som ett innehav och bankens innehav som ett annat","Innehaven i respektive aktiefond ska flaggas för sig"],"correct":[1],"multiSelect":false,"explanation":"Med maximala undantag ska varje fondbolags aktiefonders innehav flaggas var för sig och bankens eget innehav flaggas separat. Fondinnehav kan alltså separeras från koncernens övriga innehav."},{"question":"Till vem ska ett svenskt värdepappersinstitut rapportera samtliga transaktioner avsende finansiella instrument som institutet har utfört?","options":["Börsen","Finansinspektionen","Euroclear Sweden","Europeiska värdepapperstillsynsmyndigheten ESMA"],"correct":[1],"multiSelect":false,"explanation":"Ett svenskt värdepappersinstitut ska rapportera samtliga transaktioner till Finansinspektionen. Detta är en del av transaktionsrapporteringen enligt MiFID II/MiFIR."},{"question":"Till vilket av följande företag kan man fullgöra sin rapportskyldighet avseende transaktioner i aktierelaterade OTC-derivat","options":["Euroclear Sweden","Depository Trust & Clearing Corporation, DTCC","Nasdaq Stockholm","The Agency for Cooperation of Energy Regulators, ACER"],"correct":[1],"multiSelect":false,"explanation":"DTCC (Depository Trust & Clearing Corporation) är ett transaktionsregister dit rapportering av OTC-derivattransaktioner kan göras. Det är en global infrastruktur för derivatrapportering."},{"question":"Vilka av följande omfattas av kraven att anmäla och offentliggöra vissa korta nettopositioner i aktier som är upptagna till handel på Nasdaq Stockholm?","options":["Alla svenska och utländska värdepappersinstitut som har genomfört en transaktion som medfört en kort nettopposition","Endast svenska värdepappersinstitut som har genomfört en transaktion som mefört en kort nettoposition","Alla fysiska och juridiska personer som har korta nettopositioner","Endast svenska fysiska och juridiska personer som har korta nettopositioner"],"correct":[2],"multiSelect":false,"explanation":"Kraven att anmäla och offentliggöra korta nettopositioner gäller alla fysiska och juridiska personer som har sådana positioner, oavsett nationalitet. EU:s blankningsförordning gäller brett."},{"question":"Vilka av följande finansiella instrument omfattas av rapporteringskravet för derivattransaktioner till ett transaktionsregister?\nVälj TVÅ svarsalternativ","options":["Aktieindexobligation","Warrant","Börshandlade derivat","Råvarucertifikat","Ränteswap","ETF","Valutaswap"],"correct":[2,4,6],"multiSelect":true,"explanation":"Börshandlade derivat, ränteswappar och valutaswappar omfattas av rapporteringskravet till transaktionsregister enligt EMIR-förordningen. ETF:er och certifikat är inte derivat i denna mening."},{"question":"Ett fondbolag har för en fonds räkning blankat aktien A som är upptagen till handel på Nasdaq Stockholm. Blankningen motsvarar 0.5% av bolagets aktiekapital. Fondbolaget har även köpt aktier i samma bolag på termin motsvarande 0.2% av aktiekapitalet.\n\nSka den korta positionen anmälas till Finansinspektionen eller offentliggöras?","options":["Nej, anmälan och offentliggörandet behöver bara ske om den korta positionen är större än 1 procent av aktiekapitalet","Ja, den korta positionen måste anmälas till Finansinspektionen och offentliggöras","Ja, den korta positionen ska offentliggöras, men behöver inte anmälas till Finansinspektionen","Ja, den korta positionen ska anmälas till Finansinspektionen, men behöver inte offentliggöras"],"correct":[3],"multiSelect":false,"explanation":"Den korta nettopositionen är 0.5% - 0.2% = 0.3% av aktiekapitalet. Vid 0.2% ska positionen anmälas till FI men behöver inte offentliggöras (offentliggörande krävs vid 0.5%)."},{"question":"Vilka finansiella instrument ska tas med i beräkningen av en kort nettoposition för aktier vid en blankningsanmälan?","options":["Endast aktier","Endast aktier och andra finansiella instrument som baseras på aktiens värde","Endast aktier och aktiebaserade derivat som kan leda till fysisk leverans av aktien","Endast aktier och skuldebrev som kan koverteras till aktier"],"correct":[1],"multiSelect":false,"explanation":"Vid beräkning av kort nettoposition ska aktier och alla finansiella instrument som baseras på aktiens värde (derivat, konvertibler etc.) tas med. Det ger en helhetsbild av exponeringen."},{"question":"Bank A och Bank B gör en interbankaffär avseende statsobligationer under serie 1047. Måste denna transaktion offentliggöras?","options":["Ja, affären ska omedelbart offentliggöras","Ja, affären ska offentliggöras men endast tillsammans med andra affärer avseende serie 1047 som skett samma dag","Nej, affären behöver inte offentliggöras men ska rapporteras till Finansinspektionens funktion för marknadsövervakning","Nej, affären behöver inte offentliggöras men ska rapporteras till Riksbanken för statistikändamål"],"correct":[1],"multiSelect":false,"explanation":"Interbankaffärer i statsobligationer ska offentliggöras, men det sker samlat tillsammans med andra affärer i samma serie som gjorts samma dag — inte omedelbart per affär."},{"question":"De större bolagen på Nasdaq Stockholm Large Cap handlas även på Bats Europe i London. Är någon skyldig att visa sammanlag information om handeln - pris och omsättning med mera - från båda marknadsplatserna så kalla konsoliderad handelsinformation?","options":["Ja, både Nasdaq Stockholm och Bats Europe måste visa informationen","Ja, tillsynsmyndigheten där bolagen har sina primärnoteringar visar informationen","Nej, men bolaget ska I efterhand lämna informationen, på aktieägarnas begäran","Nej, det finns ingen skyldighet att visa sådan information"],"correct":[3],"multiSelect":false,"explanation":"Det finns för närvarande ingen skyldighet att visa konsoliderad handelsinformation från flera marknadsplatser. MiFID II har bestämmelser om detta men ett konsoliderat system (CTP) har inte fullt implementerats."},{"question":"Har den anställde röjt insiderinformation till konkurrenten?","options":["Ja, all konfidentiell information utgör insiderinformation","Je, eftersom börsblaget kan drabbas negativt av röjandet","Nej, eftersom att informationen inte är kurspåverkande","Nej, eftersom att det konkurrerande bolaget inte är börsnoterat"],"correct":[2],"multiSelect":false,"explanation":"Insiderinformation måste vara kurspåverkande — dvs. sannolikt ha väsentlig inverkan på aktiekursen. Företagshemligheter som inte påverkar kursen utgör inte insiderinformation, oavsett om de är konfidentiella."}],"Modul 2":[{"question":"Vad menas vanligtvis med en expansiv penningpolitik?","options":["Stimulans av efterfrågan via styrräntan","Stimulans av efterfrågan via devalveringar","Stimulans av efterfrågan via skattesänkningar","Stimulans av efterfrågan via transfereringar"],"correct":[0],"multiSelect":false,"explanation":"Expansiv penningpolitik innebär att centralbanken (Riksbanken) stimulerar efterfrågan genom att sänka styrräntan. Skattesänkningar och transfereringar är finanspolitiska åtgärder, inte penningpolitiska."},{"question":"Vilken del av kapitalmarknaden utgör en marknad för riskkapital?","options":["Penningmarknaden","Obligationsmarknaden","Aktiemarknaden","Derivatmarknaden"],"correct":[2],"multiSelect":false,"explanation":"Aktiemarknaden utgör marknaden för riskkapital — aktier representerar ägarkapital med risk. Penningmarknaden och obligationsmarknaden är delar av skuldmarknaden, och derivatmarknaden är en marknad för riskhantering."},{"question":"Anta att Riksbanken oväntat höjer reporäntan. Vilken av följande effekter är i så fall normalt att vänta?","options":["Värdet av utgivna långa statsobligationer stiger","Inflationsförväntningarna i ekonomin går upp","Bankerna höjer sina in- och utlåningsräntor","Svenska företags internationella konkurrenskraft ökar"],"correct":[2],"multiSelect":false,"explanation":"En höjd reporänta leder normalt till att bankerna höjer sina in- och utlåningsräntor. Obligationspriser faller (inte stiger), kronans värde tenderar stiga (försämrar konkurrenskraft), och inflationsförväntningarna dämpas."},{"question":"Vilket är det viktigaste styrinstrumentet som Riksbanken har för att nå inflationsmålet?","options":["Att styra räntan på kort in-och utlåning till affärsbanker","Att indirekt styra räntesättningen på långa statsobligationer","Att genom valutapolitiken påverka växelkursen","Att påverka utbudet av pengar genom att trycka sedlar"],"correct":[0],"multiSelect":false,"explanation":"Riksbankens viktigaste styrinstrument är styrräntan (reporäntan), som styr räntan på kort in- och utlåning till affärsbanker. Genom denna påverkas hela räntestrukturen i ekonomin."},{"question":"Vad menas med att ekonomin uppvisar ett negativt produktionsgap?","options":["Ekonomins produktionsresurser förslits snabbare än väntat","Den potentiella BNP-nivån överstiger den faktiska BNP-nivån","Ekonomin uppvisar en negativ produktivitetsutveckling","BNP per capita minskar snabbare öän väntat"],"correct":[1],"multiSelect":false,"explanation":"Ett negativt produktionsgap innebär att den faktiska BNP-nivån understiger den potentiella BNP-nivån. Det betyder att ekonomin har lediga resurser och producerar under sin fulla kapacitet."},{"question":"Anta att efterfrågan i ekonomin minskar på grund av ökad pessimism om framtiden bland hushållen. Vad händer då på lång sikt enligt den makroekonomiska utbuds/efterfrågemodellen?","options":["Både BNP och prisnivån sjunker","BNP är opåverkad men prisnivån sjunker","BNP sjunker men prisnivån är opåverkad","Både BNP pch prisnivån är oförändrade"],"correct":[1],"multiSelect":false,"explanation":"På lång sikt är ekonomins produktionskapacitet given av utbudssidan. En minskad efterfrågan leder bara till lägre prisnivå — BNP återgår till sin potentiella nivå. Priser och löner justeras på lång sikt."},{"question":"Vad innebär kreditmultiplikatorn i en ekonomi?","options":["Att en kraftig ökning av offentliga utgifter med 1 krona ökar BNP med mer än 1 krona","Att utlåningsräntorna ökar mer än inlåningsräntorna vid räntehöjningar","Att den totala kreditvolymen växer snabbare än BNP","Att penningmängden växer snabbare än ökningen av den monetära basen"],"correct":[3],"multiSelect":false,"explanation":"Kreditmultiplikatorn innebär att penningmängden växer snabbare än den monetära basen. Genom utlåning och återinsättning i banksystemet 'multipliceras' centralbankspengar till en större penningmängd."},{"question":"Antag att regeringen försöker stimulera ekonomin med finanspolitiska åtgärder i ett läge med full sysselsättning. Vad händer i så fall på kort sikt när analys görs utifrån Phillipskurvan?","options":["Både BNP och inflationen ökar","BNP ökar men inflationen är oföränrad","Inflationen ökar men BNP är oföränrad","Både BNP och inflationen är oförändrade"],"correct":[0],"multiSelect":false,"explanation":"Vid full sysselsättning leder ökad efterfrågan (via finanspolitik) till att både BNP och inflation ökar på kort sikt enligt Phillipskurvan. Det finns ett negativt samband mellan arbetslöshet och inflation."},{"question":"Phillipskurvan ansågs länge vara en bra beskrivning av hur ekonomin fungerade, men började ifrågasättas i efterhand. Vad anses ha orsakat den omsvängningen?","options":["Den snabba ekonomiska tillväxten under 1960-talet","Stagflationen under 1970-talet","Den stora börskraschen 1987","Den svåra ekonomiska krisen i början av 1990-talet"],"correct":[1],"multiSelect":false,"explanation":"Stagflationen under 1970-talet — en kombination av hög inflation och hög arbetslöshet — stred mot Phillipskurvans prediktioner. Det visade att det långsiktiga sambandet mellan inflation och arbetslöshet inte var stabilt."},{"question":"Vad innebär ränteparitet? Ränteparitet innebär att räntorna i två länder ska vara lika justerade för:","options":["Skillnader i löptid","Förväntad inflation","Förväntad växelkursförändring","Skillnader i ränterisk"],"correct":[2],"multiSelect":false,"explanation":"Ränteparitet innebär att ränteskillnaden mellan två länder ska motsvara den förväntade växelkursförändringen. Om ett land har högre ränta förväntas dess valuta depreciera motsvarande."},{"question":"Vad händer om den totala produktionen i ett land överstiger den totala resursanvändningen i landet?","options":["Budgetöverskottet ökar","Budgetöverskottet minskar","Utlandsskulden ökar","Utlandsskulden minskar"],"correct":[3],"multiSelect":false,"explanation":"Om produktionen överstiger resursanvändningen (konsumtion + investeringar) exporteras överskottet, vilket minskar utlandsskulden. Bytesbalansen förbättras."},{"question":"Vilken av följande makroekonomiska storheter varierar normalt sett mest över en konjunkturcykel?","options":["Privat konsumtion","Ofentlig konsumtion","Bruttoinvesteringar","BNP"],"correct":[2],"multiSelect":false,"explanation":"Bruttoinvesteringar är den komponent som varierar mest över konjunkturcykeln. Företag skjuter upp eller påskyndar investeringar beroende på konjunkturläget, medan konsumtion är mer stabil."},{"question":"Vilken åtgärd kan användas av ett land som ingår I Euro-samarbetet om landet drabbas av en lågkonjunktur?","options":["En sänkning av styrräntan","En devalvering av valutan","En ökning av statsutgifterna","En ökning av penningmängden"],"correct":[2],"multiSelect":false,"explanation":"Ett euroland kan inte sänka styrräntan (ECB bestämmer) eller devalvera (gemensam valuta). Penningmängden styrs av ECB. Finanspolitik (öka statsutgifterna) är det verktyg som står till buds."},{"question":"I nationalekonomin utnyttjas ibland begreppet \"sedelpressfinansiering\", vilket innebär att ett land trycker upp sedlar för ett särskilt syfte. Vad är det primära syftet med denna åtgärd?","options":["Att säkerställa lämnade krediter","Att finansiera ett budgetunderskott","Att stimulera privat konsumtion","Att dämpa inflationsförvätningar"],"correct":[1],"multiSelect":false,"explanation":"Sedelpressfinansiering innebär att centralbanken finansierar statens budgetunderskott genom att trycka nya pengar. Det primära syftet är att täcka underskottet, men det leder ofta till inflation."},{"question":"Sverige är en liten öppen ekonomi med rörlig växelkurs. Vad innebär det för möjligheterna att föra en aktiv stabiliseringspolitik?","options":["Stabiliseringspolitiken blir verkningslös","Penningpolitiken blir viktigare än finanspolitiken","Finanspolitiken blir viktigare än penningpolitiken ","Finanspolitik och penningpolitik blir lika viktiga"],"correct":[1],"multiSelect":false,"explanation":"I en liten öppen ekonomi med rörlig växelkurs och fria kapitalrörelser (Mundell-Fleming-modellen) är penningpolitiken mer effektiv än finanspolitiken. Finanspolitik trängs undan av växelkurseffekter."},{"question":"Antag att regeringen försöker stimulera ekonomin med finanspolitiska åtgärder i ett läge med full sysselsättning. Vad händer i så fall på mycket lång sikt när en analys görs utifrån Phillipskurvan?","options":["Både BNP och inflationen ökar","BNP ökar men inflationen är oförändrad","Inflationen ökar men BNP är oförändrad","Både BNP och inflationen är oförändrade"],"correct":[2],"multiSelect":false,"explanation":"På mycket lång sikt enligt Phillipskurvan återgår ekonomin till sin naturliga arbetslöshetsnivå. BNP påverkas inte, men inflationen har ökat permanent. Den långsiktiga Phillipskurvan är vertikal."},{"question":"Vilka två delar består den nominella räntan av?\nVälj TVÅ svarsalternativ","options":["Den reala tillväxten i BNP","Den reala räntan","Obligationsmarknadens riskpremie","Den reala tillväxten i disponibla inkomster","Den förväntade inflationen"],"correct":[1,4],"multiSelect":true,"explanation":"Den nominella räntan består av den reala räntan och den förväntade inflationen (Fisher-ekvationen: i = r + πᵉ). Dessa två komponenter förklarar den nominella räntenivån."},{"question":"Vilka tre komponenter ingår i Gordons formel för aktievärdering?","options":["Avkastningskravet","Justerade egna kapitalet","Vinsten","Utdelningsandelen","Utdelningen","Utdelningstillväxten"],"correct":[0,4,5],"multiSelect":true,"explanation":"Gordons formel: P = D/(k-g), där D = utdelningen, k = avkastningskravet och g = utdelningstillväxten. De tre komponenterna är alltså avkastningskravet, utdelningen och utdelningstillväxten."},{"question":"Vilket av följande alternativ beskriver bäst risken i en hedgefond?","options":["Marknadsrisken är betydande","Marknadsrisken är obetydlig","Den företagsspecifika risken är betydande","Den företagsspecifika risken är obetydlig"],"correct":[2],"multiSelect":false,"explanation":"Hedgefonder har låg marknadsrisk (de hedgar bort systematisk risk) men betydande företagsspecifik risk. Avkastningen beror på förvaltarens förmåga att välja rätt positioner."},{"question":"Antag att en kund köper fondandelar i fond A för 25,000 kr och i fond B för 50,000 kr. Efter precis ett år har värdet på båda fonderna stigit till 45,000 kr respektive 65,000 kronor. Vilken avkastning har kunden erhållit på sin totala placering?","options":["Cirka 32%","Cirka 40%","Cirka 47%","Cirka 55%"],"correct":[2],"multiSelect":false,"explanation":"Fond A: 45,000/25,000 - 1 = 80%. Fond B: 65,000/50,000 - 1 = 30%. Total: (45,000+65,000)/(25,000+50,000) - 1 = 110,000/75,000 - 1 ≈ 46.7% ≈ 47%."},{"question":"Vilket av fäljande påstående om förklaringsvärdet är korrekt?","options":["Förklaringsvärdet kan bara anta ett värde mellan 0 och 1","Förklaringsvärdet kan bara anta ett värde mellan -1 och +1","Ett förklaringsvärde lägre än 0.5 anger passiv förvaltning","Ett förklaringsvärde högre än 0.5 anger aktiv förvaltning"],"correct":[0],"multiSelect":false,"explanation":"Förklaringsvärdet (R²) kan bara anta värden mellan 0 och 1. Det anger hur stor andel av variationen i den beroende variabeln som förklaras av modellen. R² = 1 betyder perfekt förklaring."},{"question":"Vad kallas den risk som en låg omsättning på en tillgång ger upphov till?","options":["Kreditrisk","Marknadsrisk","Likviditetsrisk","Företagsrisk"],"correct":[2],"multiSelect":false,"explanation":"Likviditetsrisk uppstår vid låg omsättning — det blir svårt att köpa eller sälja tillgången utan att påverka priset. Det kan leda till att man inte kan avyttra till önskat pris."},{"question":"Vilket av följande påståenden om operativ risk är korrekt? Operativ risk föreligger:","options":["Då en låg aktieomsättning påverkar aktiepriset","Då en avtalspart inte fullföljer korrekt ingånget avtal","Vid bristande dokumentation och kontroll av avtal och bekräftelser med externa affärs- och avtalspartners","Då ställd säkerhet inte täcker värdepappersinstitutets fordran vid brister i kundens betalningsförmåga"],"correct":[2],"multiSelect":false,"explanation":"Operativ risk föreligger vid brister i interna processer, system eller mänskligt agerande — exempelvis bristande dokumentation och kontroll av avtal. Det handlar om risker i den dagliga verksamheten."},{"question":"Den totala risken i en finansiell placering kan brytas ned i två delar, en systematisk risk och en företagsspecifik risk. Vilken av följande risker kan betraktas som företagsspecifik?","options":["Risken att ett börsindex faller kraftigt","Risken att en lågkonjunktur inträffar","Risken att VD lämnar bolaget","Risken att styrräntan stiger kraftigt"],"correct":[2],"multiSelect":false,"explanation":"Att VD lämnar bolaget är en företagsspecifik risk som bara påverkar det enskilda företaget. Börsindex, lågkonjunktur och styrränta är systematiska risker som påverkar hela marknaden."},{"question":"Anta att en fond har ett betavärde på 0.5. Avkastningen på det riskfria placeringsalternativet är 3% samtidigt som riskpremien är 6%. Givet dessa förutsättningar, vad är fondend förväntade avkastning?","options":["0.045","0.06","0.075","0.09"],"correct":[1],"multiSelect":false,"explanation":"Enligt CAPM: E(r) = rf + β × riskpremie = 3% + 0.5 × 6% = 6%. Betavärdet multipliceras med marknadens riskpremie och läggs till den riskfria räntan."},{"question":"När ingår riskpremien som en komponent i finansiell ekonomi?","options":["Vid bedömning av likviditetsrisker i banksystemet","Vid beräkning av avkastningskrav enligt CAPM","Vid optionsvärdering enligt Black-Scholes modellen","Vid beräkning av duration för en obligationsportfölj"],"correct":[1],"multiSelect":false,"explanation":"Riskpremien är en central komponent i CAPM (Capital Asset Pricing Model). Den representerar den extra avkastning investerare kräver för att ta marknadsrisk utöver den riskfria räntan."},{"question":"Vilken av följande finansiella produkter har vanligtvis störst inslag av risk?","options":["En hedgefond med inriktning på aktier","En indexfond med inriktning på Asien","En braschfond med inriktning på läkemedel","En blandfond med inriktning på den Amerikanske marknaden"],"correct":[0],"multiSelect":false,"explanation":"Hedgefonder med aktieinriktning har störst riskinslag. De kan använda hävstång, blankning och koncentrerade positioner. Indexfonder, branschfonder och blandfonder har mer diversifierad risk."},{"question":"Du har precis räknat den årliga avkastningen för en kunds fondportfölj. Avkastningen under de tre senaste åren uppgick till -5%, 12% och 0%. Vilken genomsnittlig geometrisk avkastning har placeringen gett?","options":["0.07","0.064","0.0233","0.0209"],"correct":[3],"multiSelect":false,"explanation":"Geometriskt medelvärde: (0.95 × 1.12 × 1.00)^(1/3) - 1 = (1.064)^(1/3) - 1 ≈ 2.09%. Det geometriska medelvärdet tar hänsyn till ränta-på-ränta-effekten."},{"question":"Vad kännetecknar en faktorrisk?","options":["Den går att diversifiera bort","Den går inte att diversifiera bort","Den ger ett positivt alfa","Den ger ett negativt alfa"],"correct":[1],"multiSelect":false,"explanation":"En faktorrisk (systematisk risk) går inte att diversifiera bort genom att lägga till fler tillgångar i portföljen. Den är kopplad till marknadsövergripande faktorer som påverkar alla tillgångar."},{"question":"Vilken av fäljande händelser kan utgöra att problem I VaR-sammanhang?","options":["Att korrelationerna i olika tillgångars avkastingar oväntat stiger","Att korrelationerna i olika tillgångars avkastingar oväntat sjunker","Att den diversifierbara risken på marknaden oväntat ökar","Att den diversifierbara risken på marknaden oväntat minskar"],"correct":[0],"multiSelect":false,"explanation":"Om korrelationerna oväntat stiger innebär det att tillgångar som tidigare var diversifierande plötsligt rör sig i samma riktning. VaR-modellen underskattar då risken eftersom den baseras på historiska korrelationer."},{"question":"Vad är en skillnad mellan ett aritmetiskt medelvärde och ett geometrisk medelvärde?","options":["Det aritmetiska medelvärdet är alltid lika med eller större än det geometriska medelvärdet","Det geometriska medelvärdet är alltid lika med eller större än det aritmetiska medelvärdet","Det aritmetiska medelvärdet är alltid positivt medan det geometriska medelvärdet kan vara både positivt och negativt","Det geometriska medelvärdet är alltid positivt medan det aritmetiska medelvärdet kan vara både positivt och negativt"],"correct":[0],"multiSelect":false,"explanation":"Det aritmetiska medelvärdet är alltid lika med eller större än det geometriska medelvärdet (AM-GM-olikheten). Skillnaden ökar med volatiliteten i avkastningarna."},{"question":"Du analyserar placeringsmöjlighet P och förväntar dig två tänkbara utfall. Sannolikheterna och avkastningarna för utfallen beskrivs i en tabell.\n\nVad är standardavvikelsen i P?","options":["Cirka 5%","Cirka 10%","Cirka 15%","Cirka 20%"],"correct":[2],"multiSelect":false,"explanation":"Med de givna utfallsdata beräknas standardavvikelsen till cirka 15%. Standardavvikelsen mäter spridningen kring det förväntade värdet."},{"question":"Du jämför två placeringsalternativ A och B. Båda placeringars avkastningar är normalfördelade. Givet att de har samma förhållande mellan förväntad avkastning och standardavvikelse (samma avstånd till noll i antal standardavvikelser).\n\nVad kan du säga om risken för förlust?","options":["A har en större risk för förlust än B","B har en större risk för förlust än A","A och B har lika stor risk för förlust","Varken A eller B har en risk för förlust"],"correct":[2],"multiSelect":false,"explanation":"Om båda placeringarna har normalfördelade avkastningar och de specifika värdena på E(r) och σ ger samma avstånd till noll i antal standardavvikelser, har A och B lika stor risk för förlust."},{"question":"Du har gjort en regressionsanalys av sambandet mellan avkastningen på en obligationsfond och förändringar i styrräntan. Vilket mått från regressionsnalysen visar hur starkt sambandet mellan fondavkastingen och ränteändringen är?","options":["Interceptet","Lutningskoefficienten","Förklaringsvärdet","Standardavvikelsen"],"correct":[2],"multiSelect":false,"explanation":"Förklaringsvärdet (R²) visar hur starkt sambandet är mellan fondavkastningen och ränteändringen. Ett högt R² betyder att en stor del av fondavkastningen förklaras av ränteförändringar."},{"question":"I VaR-beräkningar brukar man beräkna 1-dags VaR för att sedan konvertera den till 10-dagars VaR genom att multiplicera med en skalfaktor lika med roten av 10. Vilka antagande måste vara uppfyllda för att den konverteringsmetiden ska vara giltig?","options":["Att dagsavkastningarna är positivt korrelerade över tiden","Att dagsavkastningarna är okorrelerade över tiden","Att dagsavkastningarna är mean-reverting","Att dagsavkastningarna är normalfördelade"],"correct":[1],"multiSelect":false,"explanation":"Konverteringen från 1-dags VaR till 10-dags VaR via √10-regeln förutsätter att dagsavkastningarna är okorrelerade (oberoende) över tiden. Om de vore korrelerade skulle formeln inte stämma."},{"question":"Du har beräknat 1-dags 99% VaR till SEK 100m, baserat på historisk analys av dagsavkastningarna. Vad är i så fall 10-dagars 99% VaR?","options":["Cirka SEK 175m","Cirka SEK 350m","Cirka SEK 725m","Cirka SEK 1,000m"],"correct":[1],"multiSelect":false,"explanation":"10-dagars VaR = 1-dags VaR × √10 = 100m × 3.162 ≈ 316m. Närmaste alternativet är cirka SEK 350m (beroende på exakt beräkningsmetod)."},{"question":"Varför är standardavvikelsen ett mått på risk?","options":["För att den kan användas för att beräkna sannolikheter för olika utfall","För att den är baserad på verklig historisk data","För att den är symmetrisk kring den färväntade avkastningen","För att den är uttryckt i procent precis som avkastningarna"],"correct":[0],"multiSelect":false,"explanation":"Standardavvikelsen är ett riskmått eftersom den kan användas för att beräkna sannolikheter för olika utfall (givet en fördelning). Ju högre standardavvikelse, desto bredare utfallsfördelning."},{"question":"Varför har en finansiell tillgång med hög standardavvikelse en hög risk?","options":["Därför att den faktiska avtaskningen kan bli mycket låg","Därför att den faktiska avkastningen i så fall inte kan vara normalfördelad","Därför att den förväntade avkastningen därmed är lägre än marknadens","Därför att betavärdet då är högre än 1.00"],"correct":[0],"multiSelect":false,"explanation":"Hög standardavvikelse innebär stor spridning i möjliga utfall, vilket innebär att den faktiska avkastningen kan bli mycket låg (eller hög). Det är osäkerheten om utfallet som utgör risken."},{"question":"Nedanstående ekvation visar en enfaktormodell för en aktie A mot en faktor F:\n\nRA = a + b × F + e\n\nVilken eller vilka av komponenterna ingår i beräkningen av den unika risken?","options":["Både b och e","Endast e","Endast b","Både a och e"],"correct":[1],"multiSelect":false,"explanation":"I enfaktormodellen RA = a + b×F + e representerar e den unika (företagsspecifika) risken. Komponenten b×F fångar den systematiska risken, och a är interceptet (alfa)."},{"question":"Vilken av följande fyra alternativ utgör ett exempel på begreppet finansiell risk enligt finansiell teori?","options":["Att den förväntade avkastningen är lägre idag än för ett år sedan","Att den förväntade avkastningen varierar slumpmässigt över tiden","Att den realiserade avkastningen kan bli högre än den förväntade avkastningen ","Att den realiserade avkastningen inte kan överstiga den förväntade avkastningen "],"correct":[2],"multiSelect":false,"explanation":"Finansiell risk innebär osäkerhet om utfallet — att den realiserade avkastningen kan avvika från den förväntade, både uppåt och nedåt. Risk innebär inte bara förlust utan osäkerhet generellt."},{"question":"Antag att CAPM gäller, att den riskfria räntan är 4% och att den förväntade avkastningen på marknadsportföljen är 10%. Fyra portföljer presenteras med sina betavärden och förväntade avkastningar.\n\nVilken portfölj är korrekt värderad (dvs. ligger på värdepappersmarknadslinjen)?","options":["Portfölj 1","Portfölj 2","Portfölj 3","Portfölj 4"],"correct":[0],"multiSelect":false,"explanation":"Enligt CAPM: E(r) = 4% + β × (10% - 4%). En korrekt värderad portfölj ligger på värdepappersmarknadslinjen (SML). Portfölj 1 uppfyller denna relation."},{"question":"Vilken av följande aktiefonder har normalt sett lägst risk?","options":["En svensk indexfond","En valutasäkrad europeisk indexfond","En valutasäkrad global indexfond","En valutasäkrad nordamerikansk indexfond"],"correct":[2],"multiSelect":false,"explanation":"En valutasäkrad global indexfond har normalt lägst risk genom maximal geografisk diversifiering. Valutasäkringen eliminerar valutarisken, och den globala spridningen ger bred riskspridning."},{"question":"Vilket av följande begrepp hänförs i regel till portföljteorin?","options":["Effektiv front","Effektiv avkastning","Effektiv ränta","Effektiv placeringshorisont"],"correct":[0],"multiSelect":false,"explanation":"Den effektiva fronten är ett centralt begrepp i Markowitz portföljteori. Den visar de portföljer som ger högst förväntad avkastning för varje given risknivå."},{"question":"Vad är innebörden av ett negativt alfa för en aktie om CAPM gäller?","options":["Aktien är övervärderad och priset förväntas falla","Aktien är undervärderadoch priset förväntas stiga","Aktien är undervärderad och priset förväntas stiga","Aktien är undervärderad och priset förväntas falla"],"correct":[0],"m
