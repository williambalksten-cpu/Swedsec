ultiSelect":false,"explanation":"Ett negativt alfa innebär att aktien ger lägre avkastning än vad CAPM predicerar givet dess risk. Den är alltså övervärderad — marknaden förväntas korrigera priset nedåt."},{"question":"Vilket av följande påståenden om kovarians är korrekt?","options":["Kovariansen mellan finansiella tillgångar är i allmänhet negativ","Kovariansen mellan finansiella tillgångar kan vara såväl positiv som negativ","Kovariansen mellan väldiversifierade portföljer är alltid normalt sett noll","Kovariansen mellan finansiella tillgångar ligger alltid mellan -1 och +1"],"correct":[1],"multiSelect":false,"explanation":"Kovariansen mellan finansiella tillgångar kan vara positiv (rör sig i samma riktning), negativ (rör sig i motsatt riktning) eller noll. Den har ingen övre eller undre gräns (det har korrelation)."},{"question":"Anta att en portfölj av tillgångar har en standardavvikelse på noll procent. Vad är i så fall den förväntade avkastningen på denna portfölj närmast lika med, enligt CAPM?","options":["En penningmarknadsfond","En blandfond","En indexfond","En hedgefond"],"correct":[0],"multiSelect":false,"explanation":"En portfölj med noll standardavvikelse har ingen risk och ska ge den riskfria räntan enligt CAPM. Detta motsvarar närmast avkastningen på en penningmarknadsfond."},{"question":"Vad krävs av marknadsportföljen i CAPM modellen?","options":["Den ska ha högst förväntad avkastning","Den ska ha lägst standardavvikelse","Den ska ha lägst samvariation med samtliga tillgångar","Den ska utgöras av samtliga tillgångar som kan prissättas"],"correct":[3],"multiSelect":false,"explanation":"Marknadsportföljen i CAPM ska utgöras av samtliga tillgångar som kan prissättas, viktade efter marknadsvärde. Det är en teoretisk portfölj som inkluderar alla investeringsbara tillgångar."},{"question":"Fyra figurer visar olika samband mellan avkastningen på tillgång A och B.\n\nVilken figur visar perfekt positiv korrelation mellan A och B?","options":["Figur 1","Figur 2","Figur 3","Figur 4"],"correct":[2],"multiSelect":false,"explanation":"Perfekt positiv korrelation (+1) innebär att tillgångarna rör sig exakt i samma riktning proportionellt. Det ger en rak linje uppåt i ett avkastningsdiagram."},{"question":"Vad menas med en effektiv portfölj?","options":["En portfölj som ger maximal effektivavkastning","En posrtfölj som handlas på en effektiv marknad","En portfölj som ligger på den effektiva fronten","En portfölj som ger positiv diversifieringseffekt"],"correct":[2],"multiSelect":false,"explanation":"En effektiv portfölj ligger på den effektiva fronten — den ger maximal förväntad avkastning för en given risknivå, eller minimal risk för en given avkastningsnivå."},{"question":"Vilket av följande alternativ är en korrekt beskrivning av diversifieringseffekten i en värdeppapersportfölj?","options":["På lång sikt tar kursuppgångar och kursnedgångar ut varandra","Ju fler tillgångar portföljen har, ju lägre blir den totala risken","Ju större andel räntepapper en portfölj har, ju mer diversifierad är den","På lång sikt är en aktieportföljen bättre placering än en obligationsportfölj"],"correct":[1],"multiSelect":false,"explanation":"Diversifieringseffekten innebär att ju fler tillgångar med ofullständig korrelation portföljen innehåller, desto lägre blir den totala risken. Den företagsspecifika risken diversifieras bort."},{"question":"Vilken av följande fomuleringar är CAPM?","options":["Förväntad avkastning = Ränta + Aktieavkastning","Förväntad avkastning = Tidspremie + Riskpremie","Förväntad avkastning = Ränta + Tidspremie","Förväntad avkastning = Riskpremie + Avkastning"],"correct":[1],"multiSelect":false,"explanation":"CAPM: Förväntad avkastning = Riskfri ränta + β × Riskpremie. Detta kan omformuleras som Tidspremie (riskfri ränta) + Riskpremie (β × marknadens riskpremie)."},{"question":"Utvärderingsmåttet Jensens Alpha anger en skillnad mellan två faktorer. Vilka?\nVälj TVÅ svarsalternativ","options":["Fondens risk","Marknadens risk","Fondens förväntade avkastning","Den riskfria avkastningen","Fondens faktiska avkastning","Avkastningen på marknaden"],"correct":[2,4],"multiSelect":true,"explanation":"Jensens Alpha = Fondens faktiska avkastning - Fondens förväntade avkastning (enligt CAPM). Det mäter alltså överavkastningen jämfört med vad modellen förutspår."},{"question":"Vilken typ av risk tar man hänsyn till när man beräknar Sharpekvoten?","options":["Total risk","Marknadsrisk","Residualrisk","Value at Risk"],"correct":[0],"multiSelect":false,"explanation":"Sharpekvoten = (Portföljens avkastning - Riskfri ränta) / Standardavvikelse. Standardavvikelsen mäter total risk, så Sharpekvoten tar hänsyn till den totala risken."},{"question":"Vad är tracking error ett mått på?","options":["Total risk","Systematisk risk","Aktiv risk","Indexrisk"],"correct":[2],"multiSelect":false,"explanation":"Tracking error mäter aktiv risk — standardavvikelsen av skillnaden mellan portföljens avkastning och jämförelseindexets avkastning. Det visar hur mycket förvaltaren avviker från index."},{"question":"Vilket avkastningsmått ingår i informationskvoten?","options":["Totalavkastning ","Avkastning över riskfri ränta","Avkastning över jämförelseindex","Jensens alfa"],"correct":[2],"multiSelect":false,"explanation":"Informationskvoten = Avkastning över jämförelseindex / Tracking error. Den mäter hur effektivt förvaltaren genererar överavkastning i förhållande till den aktiva risken."},{"question":"Vad kan man utläsa från en avkastningskurva?","options":["Förhållandet mellan obligationsränta och löptid","Obligationens avkastning under det senaste året","Relationen mellan likvärdiga räntefonders avkastning","Obligationers risk i förhållande till avkastning"],"correct":[0],"multiSelect":false,"explanation":"En avkastningskurva (yield curve) visar förhållandet mellan obligationsränta och löptid vid en given tidpunkt. Den ger information om marknadens ränteförväntningar."},{"question":"Vilken av följande obligationer har den längsta durationen?","options":["Löptid 8 år, kupongränta 6%","Löptid 8 år, kupongränta 11%","Löptid 15 år, kupongränta 6%","Löptid 15 år, kupongränta 11%"],"correct":[2],"multiSelect":false,"explanation":"Längre löptid och lägre kupongränta ger längre duration. Obligationen med 15 års löptid och 6% kupong har längst duration — den har längst löptid av alternativen och lägst kupong vid den löptiden."},{"question":"Antag att en obligation med en kupongärnta på 3% har en löptid på 10 år och att obligationens nominella värde är 1,000 kronor. Marknadsräntan för 10-åriga obligationer är 3%. Vilket pris bär obligationen ha?","options":["Lägre än 1,000 kronor","Cirka 1,000 kronor","Högre än 1,000 kronor men lägre än 2,000 kronor","Högre än 2,000 kronor"],"correct":[1],"multiSelect":false,"explanation":"När kupongräntan är lika med marknadsräntan handlas obligationen till pari (nominellt värde). Kupongränta 3% = marknadsränta 3% → pris ≈ 1,000 kronor."},{"question":"Riksbanken bedriver åtstramande penningpolitik. Marknaden förväntar sig att de korta räntorna kommer att sänkas betydligt när åtstramningen ger önskad effekt.\n\nVilken av de fyra avkastningskurvorna är mest sannolik i denna situation?","options":["Figur 1","Figur 2","Figur 3","Figur 4"],"correct":[1],"multiSelect":false,"explanation":"Vid åtstramande penningpolitik med förväntade räntesänkningar framöver får avkastningskurvan en inverterad form — korta räntor högre än långa. Figur 2 visar denna typ av kurva."},{"question":"Du jämför två obligationer G och H med olika kuponger och yields enligt en tabell. Obligation G har kupongränta lika med sin yield, medan H har kupongränta som understiger sin yield.\n\nVilket är priset på de två obligationerna?","options":["Priset på G är 100 medan priset på H är under 100","Priset på H är 100 medan priset på G är under 100","Priset på både G och H är under 100","Priset på både G och H är 100"],"correct":[0],"multiSelect":false,"explanation":"Om obligation G har kupongränta lika med yield handlas den till 100. Om H har kupongränta under yield handlas den under 100 (diskonterat pris)."},{"question":"Två obligationer A och B har båda en löptid på 5 år och en kupongränta på 3%. A har en yield på 3% och B har en yield på 6%. Vad innebär det för de två obligationernas durationer?","options":["Durationen på A är 5 medan durationen på B är under 5","Durationen på B är 5 medan durationen på A är under 5","Durationen på både A och B är under 5","Durationen på både A och B är 5"],"correct":[2],"multiSelect":false,"explanation":"Bägge obligationerna har kupongränta 3% men olika yields. Durationen påverkas av yield: högre yield → lägre duration. Eftersom yield (3% resp 6%) skiljer sig åt men ingen har yield = 0, är båda durationerna under 5."},{"question":"Antag att den ettåriga nollkupongsräntan är 3% och en tvååriga nollkupongsräntan är 3.5%. Vad innebär det för den ettåriga terminsräntan (med start i början av år 2)?","options":["Den är lägre än 3.0%","Den är 3.0%","Den är 3.5%","Den är högre än 3.5%"],"correct":[3],"multiSelect":false,"explanation":"Om tvåårsräntan (3.5%) är högre än ettårsräntan (3.0%) måste terminsräntan för år 2 vara högre än 3.5% för att ge genomsnittet 3.5%. Beräkning: (1.035)²/(1.03) - 1 ≈ 4.0%."},{"question":"En köpoption har ett lösenpris på 100kr. Antag att priset på den underliggande är 103 kronor. Antag också att lösentidspunkten är idag. Vad bör priset på optionen vara?","options":["Optionens värde bör vara 0 kr","Optionens värde bör vara 3 kr","Optionens värde bör vara 100 kr","Optionens värde bör vara 103 kr"],"correct":[1],"multiSelect":false,"explanation":"Vid lösen idag med lösenpris 100 kr och underliggande pris 103 kr har köpoptionen ett realvärde på 103 - 100 = 3 kr. Tidsvärdet är noll vid förfall."},{"question":"Med terminskontrakt av forwardtyp kan man i teorin helt eliminera risken i en lång position i den underliggande tillgången . Hur är detta möjligt? Därför att terminspriset i kontraktet: ","options":["Är perfekt positivt korrelerat med priset på den underliggande tillgången","Är perfekt negativt korrelerat med priset på den underliggande tillgången","Bestäms vid kontraktets tecknande","Bestäms vid kontraktets förfall"],"correct":[2],"multiSelect":false,"explanation":"Ett terminskontrakt låser priset vid tecknandet. Oavsett hur priset på underliggande utvecklas efteråt, gäller det avtalade priset. Därför elimineras prisrisken helt."},{"question":"Ett svenskt exportföretag har sålt produkter för USD 100m och kommer få betalt i USD om en månad. De är oroliga för att SEK/USD-kursen kan utvecklas åt fel håll innan betalning och vill därför kurssäkra sin betalning. Vad är en lämplig strategi?","options":["Köp USD 100m på termin med leveranstid om en månad","Köp USD 100m på spotmarknaden","Sälj USD 100m på termin med leveranstid om en månad","Sälj USD 100m på spotmarknaden"],"correct":[2],"multiSelect":false,"explanation":"Exportföretaget ska få USD om en månad och vill skydda sig mot kronförstärkning. De bör sälja USD 100m på termin — då låser de växelkursen och eliminerar valutarisken."},{"question":"Du äger en portfölj av tillgångar som följer ett underliggande marknadsindex. Det handlas både terminskontrakt och optionskontrakt på detta index. Du vill skydda din portfölj mot nedgång.\n\nVilket av följande påståenden är sant?","options":["En utställd köpoption eliminerar förlustrisken utan att begränsa uppsidan","En kort terminsposition eliminerar förlistrisken men begränsar uppsidan","En köpt köpoption ger samma resultat som en såld säljoption","En köpt söljoption ger samma resultat om en kort terminsposition"],"correct":[1],"multiSelect":false,"explanation":"En kort terminsposition (sälja termin) eliminerar förlustriksken men begränsar också uppsidan. Portföljens värdeförändringar kompenseras exakt av terminens motverkande rörelse."},{"question":"En aktie betingar ett pris på 20 kronor. Den förväntade utdelningen beräknas bli 1 krona per aktie. Utdelningen förväntas öka med 10% per år för all framtid.\n\nVilket avkastningskrav har aktien?","options":["Marknadens avkastningskrav är 5%","Marknadens avkastningskrav är 10%","Marknadens avkastningskrav är 15%","Marknadens avkastningskrav är 20%"],"correct":[2],"multiSelect":false,"explanation":"Gordons formel: k = D/P + g = 1/20 + 10% = 5% + 10% = 15%. Avkastningskravet är utdelningen dividerat med priset plus utdelningstillväxten."},{"question":"Du prognostiserar att nästa års utdelning i ett företag kommer att vara 10 kronor per aktie och du räknar med att utdelningen kommer att växa med 20% per år för evigt. Avkastningskravet på eget kapital beräknar du till 10%.\n\nVad är värdet på företagets aktie enligt dina prognoser?","options":["Minus 100 kr","50 kronor","100 kronor","Oändligt högt"],"correct":[3],"multiSelect":false,"explanation":"Med g > k (20% > 10%) ger Gordons formel ett negativt nämnar, vilket ger ett oändligt/negativt värde. Modellen fungerar inte när tillväxttakten överstiger avkastningskravet — värdet blir teoretiskt oändligt."},{"question":"Du har värderat ett företag med en kassaflödesmodell:\n• Nuvärdet av kassaflödena år 1-10 är SEK 100m\n• Nuvärdet av horisontvärdet är SEK 900m\n• Den räntebärande skulden är värderad till SEK 500m\n• Företaget har en kassa på SEK 200m (varav 100m nödvändigt för verksamheten)\n\nVad är det uppskattade marknadsvärdet på företagets eget kapital?","options":["SEK 300m","SEK 500m","SEK 600m","SEK 700m"],"correct":[2],"multiSelect":false,"explanation":"EV = NV kassaflöden + NV horisontvärde = 100 + 900 = 1,000m. Eget kapital = EV - Skuld + Överflödig kassa = 1,000 - 500 + (200-100) = 600m."},{"question":"Anta att ett börsnoterat bolag förändrar sin kapitalstruktur genom att ta upp ett mycket stort räntebärande lån och använda pengarna för att återköpa aktier. Vad kommer att hända med bolagets vägda kapitalkostnad (WACC)?","options":["WACC kommer att stiga kraftigt","WACC kommer att stiga en aning","WACC kommer att sjunka en aning","WACC kommer att sjunka kraftigt"],"correct":[2],"multiSelect":false,"explanation":"Enligt Miller-Modigliani med skatt ger ökad skuldsättning en skattesköld som sänker WACC något. Vid kraftigt ökad skuldsättning ökar dock risken för finansiell stress, men nettoeffekten är en liten sänkning."},{"question":"Vikterna i den vägda kapitalkostnaden (WACC) baseras på någon form av värden på eget kapital och nettoskuld. Vilken kombination av värden är rätt?","options":["Bokfört värde på eget kapital och nettoskuld","Bokfört värde på eget kapital och marknadsvärde på nettoskuld","Marknadsvärde på eget kapital och bokfört värde på nettoskuld","Marknadsvärde på eget kapital och nettoskuld"],"correct":[3],"multiSelect":false,"explanation":"WACC beräknas med marknadsvärden på både eget kapital och nettoskuld. Marknadsvärden speglar de aktuella avkastningskrav som marknaden ställer."},{"question":"Vilka delar ingår i måttet sysselsatt kapital?","options":["Eget kapital plus totala skulder","Eget kapital plus rörelseskulder","Totalt kapital minus likvida medel","Anläggningstillgångar + rörelsekapital"],"correct":[3],"multiSelect":false,"explanation":"Sysselsatt kapital = Anläggningstillgångar + Rörelsekapital. Det motsvarar det kapital som faktiskt används i verksamheten, exklusive likvida medel och rörelseskulder."},{"question":"Vilken typ av fyra vinstbegrepp finns högst upp I resultaträkningen?","options":["EBIT","EBT","EBITDA","EBITA"],"correct":[2],"multiSelect":false,"explanation":"EBITDA (Earnings Before Interest, Tax, Depreciation & Amortization) är det vinstbegrepp som finns högst upp i resultaträkningen, närmast omsättningen."},{"question":"Hur påverkas kapitalkostnaden för eget kapital om ett företag har negativ nettoskuld , det vill säga nettokassa?","options":["Den blir högre än WACC","Den blir lika med WACC","Den blir lägre än WACC men positiv","Den blir lägre än WACC men negativ"],"correct":[2],"multiSelect":false,"explanation":"Om företaget har nettokassa (negativ nettoskuld) innebär det att de är 'överkkapitaliserade'. WACC inkluderar effekten av skuld, men med nettokassa blir eget kapital-kravet lägre än WACC."},{"question":"Vilken åtgärd bör leda till högst ökning av det fria kassaflödet, förutsatt att alla andra förhållanden är oförändrade?","options":["En ökning av anläggningsinvesteringarna med SEK 100m","En minskning av rörelsekapitalet med SEK 100m ","En sänkning av aktieutdelningen med SEK 100m","En ökning av kortfristiga lån med SEK 100m"],"correct":[1],"multiSelect":false,"explanation":"En minskning av rörelsekapitalet frigör kapital direkt och ökar det fria kassaflödet. Ökade investeringar minskar kassaflödet, utdelning påverkar inte fritt kassaflöde, och lån är en finansieringspost."},{"question":"Vad händer enligt finansiell teori med avkastningskraven om ett företag minskar sin skuldsättningsgrad genom en nyemission av aktier´?","options":["Alla avkastningskrav sjunker","Avkastningskravet för eget kapital sjunker","Det vägda avkastningskravet sjunkr","Inget avkastningskrav sjunker"],"correct":[1],"multiSelect":false,"explanation":"Vid minskad skuldsättning (nyemission) sjunker den finansiella risken för aktieägarna, vilket leder till att avkastningskravet på eget kapital sjunker. WACC förblir i princip oförändrad (MM)."},{"question":"Ett lågt skuldsatt bolag meddelar att de inom kort kommer att öka skuldsättningsgraden genom aktieåterköp finansierat med nyupplåning. Vad bör teoretisk sett hända med marknadsvärdena?","options":["Värdet på både lånat och eget kapital blir oförändrat","Värdet på lånat kapital sjunker och värdet på eget kapital ökar","Värdet på lånat kapital blir oförändrat och värdet på eget kapital ökar","Värdet på både lånat och eget kapital ökar"],"correct":[2],"multiSelect":false,"explanation":"Vid ökad skuldsättning genom aktieåterköp ökar skulden men skatteskölden höjer det totala företagsvärdet. Värdet av lånat kapital är oförändrat (till marknadsvärde) medan värdet av eget kapital ökar tack vare skatteskölden."}],"Modul 3":[{"question":"Vilket påstående om reglering av etiska normer är korrekt?","options":["Varje etisk norm återfinns alltid uttryckligen i lagar, myndighetsföreskrifter eller som en intern instruktion","En etisk norm återfinns aldrig i regler, lagar eller interns instruktioner eftersom varje fall där etiska frågor uppkommer är unikt","En etisk norm är ofta uttryckt i en formellt beslutad regel, exempelvis i en lag eller i en intern instruktion vid ett institut men behöver inte alltid vara det","Etiska normer är möjliga att reglera via lagar eller föreskrifter men det görs aldrig eftersom tolkningsgraden blir för hög och orättvisa domar kan fällas. ","Efter medgivande från din arbetsgivare sitter du nu i styrelsen för din bostadsrättsförening där du bor. Eftersom alla i fastigheten vet att du arbetar på bank ber de dig försöka ordna förmånliga villkor när föreningens lpn ska omförhandlas."],"correct":[2],"multiSelect":false,"explanation":"Etiska normer uttrycks ofta i formellt beslutade regler (lagar, föreskrifter, interna instruktioner) men behöver inte alltid vara det. Etik kan också vara oskrivna principer som vägleder beteende utöver lagstadgade krav."},{"question":"Du sitter i styrelsen för din bostadsrättsförening (efter medgivande från din arbetsgivare). Alla vet att du arbetar på bank. De ber dig ordna förmånliga villkor för föreningens lån.\n\nVilket handlingsalternativ är lämpligast?","options":["Du kontaktar bankens kredithandläggare och ber denne ordna samma lånevillkor om för personallån","Du meddelar styrelsen för bostadsrättsföreningen att du kan förmedla kontakt med rätt person inom banken som får handlägga frågan på ett vanligt sätt","Du tar upp ett personallån med fördelaktiga villkor som du utlånar vidare till föreningen men med något dyrare villkor"],"correct":[1],"multiSelect":false,"explanation":"Det korrekta är att förmedla kontakt med rätt person inom banken som handlägger frågan på vanligt sätt. Man ska inte utnyttja sin position för personliga fördelar eller blanda ihop roller."},{"question":"Ann-Britt är placeringsrådgivare på ett värdepappersinstitut. Hon har erbjudits en styrelseplats i ett bolag som är värdepapperskund hos institutet. Chefen har överlåtit åt henne att bestämma själv. Institutets etiska riktlinjer behandlar inte frågan.\n\nHur bör Ann-Britt agera?","options":["Hon kan tacka ja men bör i fortsättningen inte behandla bolagets affärer","Hon bör tacka nej till styrelseuppdraget, eftersom ett uppdrag skulle medföra intressekonflikt för värdepappersinstitutet","Hon kan tacka ja, eftersom att det är bra om kunden knyts fastare till värdepappersinstitutet genom styrelseuppdraget","Hon bör tacka nej till styrelseuppdraget, men akn vara informell rådgivare till bolaget genom att då och då äta lunch med bolagets VD"],"correct":[0],"multiSelect":false,"explanation":"Ann-Britt kan acceptera styrelseuppdraget men bör inte längre behandla bolagets affärer hos institutet. Genom att hantera intressekonflikten på detta sätt kan uppdraget accepteras."},{"question":"Vad utmärker ett system för så kallad whistleblowing?","options":["Att anmälarens identititet kan skyddas","Att anmälningarna måste granskas av complianceavdelningen","Att Finansinspektionen ska informeras om samtliga allvarliga misstankar","Att full transparens ska gälla rörande identiteten på de personer som anmälningarna avser"],"correct":[0],"multiSelect":false,"explanation":"Ett whistleblowing-system utmärks framför allt av att anmälarens identitet kan skyddas. Detta uppmuntrar anställda att rapportera missförhållanden utan rädsla för repressalier."},{"question":"På värdepappermarknaden förekommer självreglering. Vilken beskrivning förklarar bäst vad självreglering är?","options":["Självreglering är det avvecklingsförfogande som använda mellan mäklare som är market makers","Självreglering är den normbildning som Finansinspektionen bedriver","Självreglering är en normbildning som bygger på regler beslutade av intresse- och branscorganisationer","Självreglering kallas det när ett värdepapperinstitut själv köper eller säljer aktier till/från en kund"],"correct":[2],"multiSelect":false,"explanation":"Självreglering innebär normbildning genom regler beslutade av bransch- och intresseorganisationer, t.ex. Svenska Fondhandlarföreningen. Det kompletterar lagstiftningen med branschens egna standarder."},{"question":"Vilken av följande organisationer eller institutioner får utfärda föreskrifter som är bindande för samtliga svenska värdepappersinstitut som agerar på den svenska värdepappersmarknaden?","options":["Svenska Fondhandlarföreningen","Allmäna reklatamationsnämnden","Ekobrottsmyndigheten","Finansinspektionen","Innehavaren av en SwedSec-licens ska i sin verksamhet bland annat följa Finansinspektionens föreskrifter. Anta att Finansinspektionen beslutar om nya föreskrifter som berör licenshavarens verksamhet."],"correct":[3],"multiSelect":false,"explanation":"Finansinspektionen (FI) har rätt att utfärda bindande föreskrifter (regler) som gäller för samtliga svenska värdepappersinstitut. Andra organisationer kan ge rekommendationer men inte bindande föreskrifter."},{"question":"Innehavaren av en SwedSec-licens ska följa Finansinspektionens föreskrifter. Anta att FI beslutar om nya föreskrifter som berör licenshavarens verksamhet.\n\nFrån vilken tidpunkt ska licenshavaren följa dessa?","options":["Från den dag då licenshavaren får kännedom om föreskrifterna","Från den dag då SwedSec beslutar att reglerna ska ingå i regelverket","Från den dag då Finansinspektionen beslutar att reglerna ska gälla","Från den dag då licenshavarens arbetsgivare beslutat om att föreskrifterna ska gälla inom företaget"],"correct":[2],"multiSelect":false,"explanation":"Licenshavaren ska följa FI:s nya föreskrifter från den dag Finansinspektionen beslutar att reglerna ska gälla. SwedSecs eller arbetsgivarens beslut är inte avgörande — det är FI:s ikraftträdandedatum som gäller."},{"question":"Får ett värdepappersbolag producera analyser av företag och aktier för att sedan distribuera analyserna till sina kunder?","options":["Ja, med tillsånd för investeringsrådgivning","Ja, med tillstånd för analysverksamhet","Nej, endast banker får ägna sig åt analysverksamhet","Nej, sådan verksamhet måste bedrivas av ett separat dotterbolag"],"correct":[1],"multiSelect":false,"explanation":"Ja, med tillstånd för analysverksamhet. Att producera och distribuera investeringsrekommendationer kräver specifikt tillstånd för denna typ av verksamhet."},{"question":"Du blir uppringd av en kund som vill sälja en större aktiepost på grund av att aktiekursen sjunkit. Kunden har inte läst de positiva nyheter och analyser som förekommit. Ditt institut har en klar köprekommendation och många kunder vill köpa.\n\nVad gör du?","options":["Du genomför direkt ordern på börsen","Du upplyser kunden om de positiva omdömena om bolaget och invntar kundens direktiv","Du genomför affären så att institutet köper aktierna i eget lager","Du genomför affären utanför börsen med någon eller några av dina andra kunder som motpart"],"correct":[1],"multiSelect":false,"explanation":"Du bör upplysa kunden om de positiva nyheterna och analyserna och sedan invänta kundens beslut. Kunden ska fatta ett informerat beslut — du ska varken genomföra direkt eller handla för eget lager."},{"question":"Varför håller ett institut sin egen handel åtskild från handel som sker för kunders räkning?","options":["För att intressekonflikter inte ska uppstå mellan institutets och kundernas intressen","För att det inte ska bli svårare lr institutet att bedöma om en transaktion är lämplig eller passande för kunderna","För att kunden inte ska få en sämre ställning, för det fall institutet skulle gå i konkurs","För att intressekonflikter ska uppstå mellan institutets kunder"],"correct":[0],"multiSelect":false,"explanation":"Institutets egen handel hålls åtskild från kundhandel för att undvika intressekonflikter. Om institutet handlar för egen räkning och samtidigt för kunder kan motstridiga intressen uppstå."},{"question":"När är ett institut skyldigt att informera sina kunder om eventuella intressekonflikter?","options":["Institutet ska informera kunderna om alla intressekonflikter som förhindrar att kundernas intressen kan komma att påverkas negativt av en intressekonflikt","Bara när ett institut inte har lyckats vidta åtgärder som förhindrar att kundernas intressen kan komma att påverkas negativt av en intressekonflikt","institutet ska informera kunderna om alla intressekonflikter som institutet har identifierat men bara på uttrycklig begäran från kunderna","Institutet behöver bara informera om intressekonflikter som kan medföra en icke-obetydlig risk för att kunderna drabbas av en förlust överstigande EUR 10,000"],"correct":[1],"multiSelect":false,"explanation":"Institutet ska informera kunderna om intressekonflikter när det inte har lyckats vidta åtgärder som förhindrar att kundernas intressen påverkas negativt. Informationsplikten är sekundär till hanteringen."},{"question":"Banker eller värdepappersbolag som producerar analyser och investeringsrekommendationer riktade till allmänheten ska redovisa egna intressen i det analyserade bolaget.\n\nVilka uppgifter måste bland annat finnas med?","options":["Att banken/värdepappetsbolaget inte tar det ekonomiska ansvaretför de rekommendationer som lämnas","Namnen på de andra bolag som banken/värdepappersbolaget producerar analyser om","Om det analyserade bolaget har ett icke offentliggjort lån hos banken/värdepappersbolaget","Om banken/värdepappersbolaget det senate året hatf ett offentliggjort corporate finance uppdrag för det analyserade bolaget","Av flera regler som rör handel på värdepappersmarknaden framgår att intressekonflikter ska hanteras på ett visst sätt."],"correct":[3],"multiSelect":false,"explanation":"Banken/värdepappersbolaget måste redovisa om de det senaste året haft ett offentliggjort corporate finance-uppdrag för det analyserade bolaget. Detta är en potentiell intressekonflikt som ska vara transparent."},{"question":"I vilken av följande sitiationer föreligger alltid en intressekonflikt?","options":["Handel på börsen för eget lager","Försäljning av aktier till kund från eget lager","Köp av fondandelar på uppdrag av kund","Färsäljning av aktier för kunds räkning på börsen"],"correct":[1],"multiSelect":false,"explanation":"Försäljning av aktier till kund från eget lager innebär alltid en intressekonflikt — institutet är både säljare och kundens rådgivare/förmedlare. Institutets intresse (sälja till högt pris) står mot kundens."},{"question":"Flera värdepappersinstitut lämnar eller sprider investeringsrekommendationer som är riktade till allmänheten. Vad är utmärkande för en investeringsrekommendation?","options":["Det måste framgå i vilken utsträckning den bygger på en oberoende analys","Det måste framgå att den innehåller råd baserade på den/de aktuella kundernas individuella förutsättningar","Den måste innehålla information om flera jämförbara värdepapper","Den måste inehålla rekommendationer om fördelning mellan olika tillgångsslag"],"correct":[0],"multiSelect":false,"explanation":"En investeringsrekommendation riktad till allmänheten måste ange i vilken utsträckning den bygger på en oberoende analys. Den är inte individuellt anpassad utan generell."},{"question":"Svenska Fondhandlarföreningen har regler om anställdas egna värdepappersaffärer. En anställd i ett institut:","options":["Får aldrig göra egna värdepappersaffärer genom att utnyttja någon form av kurspåverkande information som ännu inte offentliggjorts","Får bara föra egna långsiktiga värdepappersaffärer genom att utnytja kurspåverkande information som ännu inte offentligjorts","För berätta för en närstående om ännu inte offentliggjord kurspåverkande information om denne gör en långsiktig affär","Får göra egna värdepappersaffärer med utnyttjande av ännu inte offentligjord kurspåverkande information om informationen har producerats inom det institut där han är anställd"],"correct":[0],"multiSelect":false,"explanation":"En anställd får aldrig göra egna värdepappersaffärer genom att utnyttja kurspåverkande information som inte har offentliggjorts. Detta gäller oavsett tidshorisont och oavsett om informationen kommer inifrån eller utifrån."},{"question":"Värdepappersinstitutets branschorganisation har regler om rätten för anställda att göra egna värdepappersaffärer. Vilket syfte har reglerna?\n\nReglerna syftar till att:","options":["Förhindra att anställda gör ofördelaktiga affärer","Minska möjligheterna att göra värdepappersaffärer på arbetstid","Förhindra att anställda gör affärer på ett sätt som kan skada förtroendet för värdepappersmarknaden","Kontrollera att de anställdas affärer överensstämmer med de råd som ges till kunderna"],"correct":[2],"multiSelect":false,"explanation":"Reglerna syftar till att förhindra att anställda gör affärer på ett sätt som skadar förtroendet för värdepappersmarknaden. Det handlar om marknadens integritet och allmänhetens förtroende."},{"question":"Ett värdepappersbolag som inte ger rådgivning på oberoende grund vidarebefordrar kundernas order till en bank. Banken återbetalar 20% av courtaget till bolaget varje halvår.\n\nVad behöver bolaget göra för att leva upp till lagens bestämmelser om tredjepartsersättningar?","options":["Eftersom bolaget inte bedriver rådgivning på oberoende grund gäller inte lagens bestömmelser om tredjepartersättningar","Bolaget måste löpande, åtminstone varje halvår, göra information tillgänglig för sina kunder om grunderna för hur ersättningen från banken beräknas","Eftersom ersättningen från banken till bolaget inte betalas ut i samband med kundernas transaktioner omfattas ersättningen inte av lagens bestämmelser","Bolaget måste informera kunderna om ersättingen och vidta kvalitetsjöhande åtgärder som kommer kunderna till del och motsvarar värdet av ersättningen"],"correct":[3],"multiSelect":false,"explanation":"Bolaget ger inte oberoende rådgivning, så tredjepartsersättning är tillåten — men de måste informera kunderna och vidta kvalitetshöjande åtgärder som motsvarar ersättningens värde."},{"question":"Ett värdepappersbolag tillhandahåller rådgivning på oberoende grund. Bolaget får en distributionsersättning (halva förvaltningsarvodet) för fonder de rekommenderat.\n\nHur ska bolaget hantera ersättningen?","options":["Den måste stoppas. En oberoende rådgivare får inte ta emot ersättningar från någon annan än kunden. ","Bolaget måste vidta kvalitetshöjande årgärder som kommer kunderna till del och motsvarar värder av distributionsersättningen","Bolaget måste skicka ersättningen vidare till kunderna","men genom att ordna att du blir invald i en kostnadsfri privat klubb"],"correct":[2],"multiSelect":false,"explanation":"En oberoende rådgivare får inte behålla ersättningar från tredje part. Ersättningen måste skickas vidare till kunderna. Oberoende rådgivning innebär att man enbart tar betalt av kunden."},{"question":"Du förhandlar med en konsult om ett viktigt uppdrag. Konsulten vill premiera din insats, inte med ekonomisk ersättning, utan genom att ordna att du blir invald i en kostnadsfri privat klubb.\n\nKan ett accepterande av detta erbjudande betraktas som en muta?","options":["Ja, även om erbjudandet saknar ekonomiskt värde kan det vara en muta om det påverkar ditt beslut eller beteende i föhandlingen","Ja, även om erbjudandet saknar ekonomiskt värde är det alltid en muta att accepter ett erbjudande oavsett om erbjudandet påverkar ditt beslut eller beteende i förhandlingen eller inte","Nej, att acceptera ett erjudande som helt och hållet saknar ekonomiskt värde kan för dig aldrig vara en muta","Nej, att acceptera ett erbjudande som saknar ekonomiskt värde för dig kan bara vara en muta om givaren anser att erbjudandet är en förmån för dig","Inför julen vill en av dina kunder tacka dig med en julgåva för afförskontakterna under året som gått. "],"correct":[0],"multiSelect":false,"explanation":"Ja, ett erbjudande kan vara en muta även om det saknar direkt ekonomiskt värde, om det kan påverka ditt beslut eller beteende. Mutbegreppet handlar om påverkansförsök, inte bara pengar."},{"question":"Inför julen vill en av dina kunder tacka dig med en julgåva för affärskontakterna under året.\n\nVad kan du ta emot?","options":["Ett presentkort på 400kr i en livsmedelsbutik","En gratis semestervecka i kundens sommarstuga","Rabattkort på 10% på alla inköp i kundens byggvaruhus","En affärsmiddag på gourmetrestaurang tillsammans med kundernas övriga affärskontakter"],"correct":[3],"multiSelect":false,"explanation":"En affärsmiddag med kundens övriga kontakter kan accepteras som en rimlig representation. Presentkort, semesterveckor och rabattkort överstiger vad som anses lämpligt eller skapar beroendeställning."},{"question":"Du är mäklare och en av dina kunder är en stiftelse. Stiftelsens förvaltares make har en depå hos institutet med en godkänd favörränta (30% bättre än ordinarie).\n\nÄr det lämpligt att ge favörränta i denna situation?","options":["Nej, eftersom att det kan innebära bestickning","Ja, eftersom institutets kreditkommité har gokänt räntenivån","Nej, eftersom favörräntan inte överstiger den ordinarie räntan med mer än 30%","Ja, eftersom att maken inte har något med stiftelsen att göra"],"correct":[0],"multiSelect":false,"explanation":"Favörräntan kan uppfattas som en otillbörlig förmån kopplad till stiftelsens affärsrelation, dvs. bestickning. Att maken har koppling till en stiftelsekund gör det olämpligt oavsett kreditkommitténs godkännande."},{"question":"Varför har lagen om åtgärder mot penningtvätt och finansiering av terrorism tillkommit?","options":["För att skettepliktiga inkomster inte ska ungdå beskattning","För att Riksbanken ska kunna utföra statistik om penningmängden","För att den finansiella sektorn inte ska användas för penningtvätt","För att samordna bekämpningen mot pennningtvätt mellan bankerna och Finansinspektionen"],"correct":[2],"multiSelect":false,"explanation":"Lagen mot penningtvätt syftar till att förhindra att den finansiella sektorn utnyttjas för penningtvätt och finansiering av terrorism. Det handlar om att skydda det finansiella systemets integritet."},{"question":"Vilka åtgärder ska ett finansiellt företag vidta om man misstänker att en transaktion som en kund vill genomföra kan utgöra penningtvätt?","options":["Företaget ska inte utföra transaktionen och händelsen ska rapporteras till Finanspolisen","Företaget ska utföra transaktionen men rapportera vad som hänt till Finansinspektionen","Företaget ska utföra transaktionen men lämna ärednet vidare till Finanspolisen för utredning","Företaget ska inte utföra transaktionen och händelsen ska rapporteras till Finansinspektionen"],"correct":[0],"multiSelect":false,"explanation":"Vid misstanke om penningtvätt ska transaktionen inte genomföras och händelsen ska rapporteras till Finanspolisen (inte FI). Finanspolisen utreder penningtvättsbrott."},{"question":"I vilket av följande fall kan det vara straffbart att utnyttja information om en icke offentliggjord omständighet avseende ett bolag för att handla med bolagets aktier?","options":["Om informationen sannolikt skulle ha en väsentlig inverkan på aktiekusern","Om informationen omfattas av banksekretessen","Om informationen skulle påverka aktiekusern, oavsett hur stor eller liten påverkan är","Om informationen ska offentliggöras i bolagets kvartalsrapport"],"correct":[0],"multiSelect":false,"explanation":"Det är straffbart att utnyttja insiderinformation om den sannolikt skulle ha väsentlig inverkan på aktiekursen. Informationen måste alltså vara kurspåverkande — det är det centrala kriteriet."},{"question":"Förutom styrelseledamöter och verkställande direktörer kan andra ledande befattningsinnehavare vara i ledande ställning i ett börsbolag. Hur ska de veta att de är personer i ledande ställning?","options":["Bolaget ska underrätta dem","Finansinspektionen ska underrätta dem","Bolagsverket ska underrätta dem","Det måste de hålla reda på själva"],"correct":[0],"multiSelect":false,"explanation":"Bolaget är skyldigt att underrätta ledande befattningshavare om att de är personer i ledande ställning. Det är alltså bolagets ansvar, inte individens, att identifiera och meddela detta."},{"question":"Ett noterat bolag är skyldigt att föra en förteckning över anställda som har tillgång till insiderinformation om bolaget. Vilka kan få insyn i loggboken?","options":["Bolagsverket","Den reglerade marknaden där bolagets aktier är noterade","Allmänheten ska ha fri tillgång till uppgifterna i loggboken","Finansinspektionen"],"correct":[3],"multiSelect":false,"explanation":"Finansinspektionen kan få insyn i insiderloggen (förteckningen). Allmänheten, Bolagsverket och marknadsplatsen har inte rätt till dessa uppgifter."},{"question":"Värdepappersinstitut är skyldiga att rapportera om det kan antas att en transktion utgör eller har samband med insiderbrott eller marknadsmanipulation. Till vem ska en sån rapportering ske?","options":["Ekobrottsmyndigheten","Finanspolisen","Finansinspektionen","Nasdaq Stockholm"],"correct":[2],"multiSelect":false,"explanation":"Misstankar om insiderbrott eller marknadsmanipulation ska rapporteras till Finansinspektionen. FI har ansvaret för marknadsövervakning och kan vidarebefordra till Ekobrottsmyndigheten vid behov."},{"question":"Ett noterat bolag är skyldigt att föra en förteckning (insiderlogg) över anställda med tillgång till insiderinformation.\n\nHur länge ska bolaget behålla loggboken?","options":["6 månader","12 månader","3 år","5 år"],"correct":[3],"multiSelect":false,"explanation":"Insiderloggen ska behållas i 5 år. Detta ger myndigheter tillräcklig tid för att utreda eventuellt marknadsmissbruk."},{"question":"Ett värdepappersinstitut har automatiserat orderflödet via en Smart Order Router (SOR). SOR:en bestämmer enbart vilken marknadsplats kundens order ska skickas till baserat på bästa pris och likviditet. Ingen fysisk person hanterar flödet.\n\nHur förhåller sig detta till reglerna om algoritmisk handel?","options":["En sådan lösning är inte tillåten. Någonstans mellan det att kunde lagt en order och den skickas till marknadsplatsen måste en fysisk person besluta om ordern ska gå vidare eller inte","Detta utgör inte någon algoritmisk handel i lagens mening eftersom ett SOR:en enbart väljer marknadsplats. Någon myndighetsanmälan behöver inte ske, beroende på marknadsplatsens regler kan dock anmälan behöva att ske till marknadsoperatören","Eftersom ingen fysisk person intervenerar i orderflödet är detta algoritmisk handel i lagens mening och Finansinspektionen ska underrättas","Eftersom ingen fysisk person intervenerar i orderflödet och SOR:en bearbetar information från marknadsplatsen är detta algoritmisk handel i lagens mening och samtliga order och transaktioner ska rapporteras till Finansinspektionen"],"correct":[1],"multiSelect":false,"explanation":"En SOR som enbart väljer marknadsplats utan att modifiera ordervillkor utgör inte algoritmisk handel i lagens mening. Dock kan marknadsplatsens regler kräva anmälan till marknadsoperatören."},{"question":"Vad kännetecknar en så kallad specialfond?","options":["Den avviker från reglerna i det så kallade UCIT-direktivet","Den placerar endast i andra fonder eller så kallade hedgefonder","Den omfattas inte av några placeringsregler","Den får fritt säljas och marknadsföras i alla länder"],"correct":[0],"multiSelect":false,"explanation":"En specialfond avviker från de regler som gäller för UCITS-fonder (värdepappersfonder). Den har mer flexibla placeringsregler men får bara säljas i Sverige och kräver FI:s tillstånd."},{"question":"Ett svenskt aktiebolag ska enligt bolagsordningen bedriva handel med och förvaltning av finansiella instrument. När behöver bolaget tillstånd enligt lagen om värdepappersmarknaden?","options":["Om förvaltningen avser finansiella instrument till ett värde som överstiger EUR 730k","Om kapitalförvaltning ska tillhandahållas till allmänheten","Om handel med finansiella instrument ska ske för bolagets egen räkning","Om bolagets aktiekapital överstiger EUR 730k"],"correct":[1],"multiSelect":false,"explanation":"Tillstånd krävs när kapitalförvaltning ska tillhandahållas till allmänheten. Handel för egen räkning och förvaltning under visst belopp kan vara undantagna."},{"question":"Får värdepappersinstitut bedriva en marknadsplats där andra värdepappersinstitut är medlemmar och handlar aktier med varandra?","options":["Nej - sådan marknadsplatsverksamhet får bara bedrivas av börser","Nej - värdepappersinstitut får bara bedriva marknadsplatsverksamhet om inte andra värdepappersinstitut handlar där","Ja - sådan marknadsplatsverksamhet får bedrivas av alla värdepappersföretag oavsett tillstånd","Ja - sådan marknadsplatsverksamhet får bedrivas av värdepappersföretag med tillstånd att bedriva en MTF-handelsplattform"],"correct":[3],"multiSelect":false,"explanation":"Ja, med tillstånd att bedriva MTF-handelsplattform. Värdepappersinstitut kan driva en handelsplattform om de har specifikt tillstånd för detta."},{"question":"Vilket alternativ sammanfattar korrekt förhållandet mellan fondbolag, värdepappersfond, och förvaringsinstitut?","options":["Värdepappersfonden förvaltar andelsägarnas tillgångar, fondbolaget beräknar andelsvärdet, och förvaringsinstitutet förvarar andelarna","Fondbolaget företräder andelsägarna i frågor som rör värdepappersfonden och förvaltar fonden, förvaringsinstitutet förvarar egendomen som ingår i fonden","Värdepappersfonden handlar för egen räkning med de finansiella instrument som ingår i fonden, fondbolaget är motpart vid dessa affärer och förvaringsinstitutet förvaltar inköpta finansiella instrument","Förvaringsinstitutet förvarar andelsägarnas andelar och fondbolaget förvarar den egendom som ingår i fonden"],"correct":[1],"multiSelect":false,"explanation":"Fondbolaget företräder andelsägarna och förvaltar fonden. Förvaringsinstitutet (förvarar fondens egendom) är separerat från förvaltaren för att skydda andelsägarna."},{"question":"För vilken av följande verjsamheter krävs tillstånd enligt lagen om värdepappersmarknaden, förutsatt att verksamheten ska bedrivas yrkesmässigt av ett svenskt aktiebolag?","options":["Diskretionär portföljförvaltning","Kreditgivning för placeringar i finansiella instrument","Emissioner av finansiella instrument","Förvaring av finansiella instrument"],"correct":[0],"multiSelect":false,"explanation":"Diskretionär portföljförvaltning kräver tillstånd. Det innebär att förvaltaren självständigt fattar investeringsbeslut för kundens räkning, vilket kräver särskild reglering."},{"question":"Vad händer med en fond som ett fondbolag förvaltar om fondbolaget försätts i konkurs?","options":["Kronofogden utmäter fondbolagets skulder ur fondförmögenheten","Finansinspektionen övertar ansvaret för fonden och utser en ny förvaltare","Fondbolagets skulder mäts ut ur fonden och resterande belopp delas lika mellan andelsägarna","Förvaringsinstitutet träder in och övertar förvaltningen av fonden","Enligt lagen om värdepappersfonder ska det finnas ett förvaringsinstitut för varje fond."],"correct":[3],"multiSelect":false,"explanation":"Om fondbolaget går i konkurs berörs inte fonden — fondens tillgångar ägs av andelsägarna, inte fondbolaget. Förvaringsinstitutet övertar förvaltningen tills en ny förvaltare utses."},{"question":"Förvaringsinstitutet har enligt lagen uppgift bland annat att ta emot och förvara den egendom som ingår i fonden samt även:","options":["Att kontrollera att medlen i fonden används enligt lag och fondbestämmelser","Att utföra identitetskontroll av andelsägarna","Att garantera fondens förpliktelser gentemot andelsägarna","Att godkänna de avtal fonbolaget ingår i för fondens räkning"],"correct":[0],"multiSelect":false,"explanation":"Förvaringsinstitutet ska kontrollera att fondmedlen används enligt lag och fondbestämmelser. Det fungerar som en kontrollinstans gentemot fondbolaget."},{"question":"Vilken rätt i färhållande till kunden har en kapitalförvaltare enligt avtal om diskretionär förvaltning?","options":["Utföra transaktioner för kundens räkning efter det att kunden lämnat order om varje transaktion","Utföra transaktioner för kundens räkning efter det att kunden lämnat order om varje transaktion, dock endat under förutsättningen att transaktionen stämmer överrens med av vad kunden ursprungligen angiven placeringsinriktning","Självständigt förslå placeringsåtgärder och efter kundens godkännande av varje transaktion, genomföra dem","Inom givna ramar självständigt bestämma vilka placeringsåtgärder som ska göras för kundens räkning"],"correct":[3],"multiSelect":false,"explanation":"Vid diskretionär förvaltning har kapitalförvaltaren rätt att inom givna ramar självständigt bestämma vilka placeringsåtgärder som ska göras. Kunden behöver inte godkänna varje transaktion."},{"question":"Vem eller vilka ska fastsälla målgrupper för produkterna?","options":["Värdepappersbolaget","Fondbolaget och värdepappersbolaget","Banken och värdepappersbolaget","Banken och fondbolaget"],"correct":[2],"multiSelect":false,"explanation":"Banken (produkttillverkaren) och värdepappersbolaget (distributören) ska tillsammans fastställa målgrupper. Fondbolaget är inte direkt involverat i detta för de strukturerade produkterna."},{"question":"Ett fondbolag förvaltar fonder som distribueras till kunder genom ett värdepappersbolag. Bör något eller båda av bolagen fastställa målgrupper för fonderna och i så fall vilket eller vilka?","options":["Ja, värdepappersbolaget eftersom att de distribuerar fonderna","Ja både fondbolaget och värdepappersbolaget, eftersom at fondbolaget tar fram fonderna och värdepappersbolaget distribuerar dem","Ja, fondbolaget eftersom att de tar fram fonderna","Nej, inget av dem eftersom fonder inte är instrment utgivna av ett värdepappersinstitut"],"correct":[1],"multiSelect":false,"explanation":"Ja, både fondbolaget (som produkttillverkare) och värdepappersbolaget (som distributör) ska fastställa målgrupper enligt produktstyrningsreglerna i MiFID II."},{"question":"Helen har sålt sitt fåmansaktiebolag. Hon var ensam ägare och utförde allt arbete själv. Skattemyndigheten vill tillämpa 3:12-reglerna för kvalificerade andelar.\n\nVad innebär en sådan beskattning för Helen?","options":["Hela vinsten i inkomstslaget tjänst","Max 100 inkomstbasbelopp i inkomstslaget tjänst och för resterande del i inkomstslaget kapital","Max 100 inkomstbasbelopp i inkomstslaget näringsverksamhet och för resterande del i inkomstslaget kapital","Hela vinsten i inkomstslaget näringsverksamhet"],"correct":[1],"multiSelect":false,"explanation":"Enligt 3:12-reglerna beskattas kvalificerade andelar i fåmansbolag delvis i inkomstslaget tjänst. Max 100 inkomstbasbelopp beskattas som tjänst, och resterande del i kapital."},{"question":"Hur ofta ska en notering aveesnde avslut ske för att det ska vara fråga om kontinuerlig prissättning?","options":["Minst 1 gång per vecka","Var 10:e dag","Var 14:e dag","Minst 1 gång per månad"],"correct":[1],"multiSelect":false,"explanation":"Kontinuerlig prissättning kräver notering var 10:e dag enligt skattereglerna för att en onoterad aktie ska anses som marknadsnoterad."},{"question":"När inträder skatteplikt vid en aktieaffär?","options":["När de föreligger ett bindande avtal om överlåtelse","När betalningen för aktierna erläggs","När registreringen av avyttringen/köpert görs på vp-kontot","Vid beskattingsårets slut"],"correct":[0],"multiSelect":false,"explanation":"Skatteplikt vid aktieaffär inträder vid bindande avtal om överlåtelse (avslutsdagen). Det är tidpunkten då parterna ingår ett rättsligt bindande avtal."},{"question":"Ett aktiebolag som bedriver handel med värdepapper har realiserat en förlust på en aktieplacering. Bolaget har överskott i övriga verksamheten.\n\nHur får förlusten kvittas?","options":["Förlusten får kvittas mot överskottet i övriga näringsverksamheten till 100%","Förlusten får kvittas mot överskottet i övriga näringsverksamheten till 70%","Förlusten kan sparas och kvittas mot aktievinster i framtiden till 100%","Förlusten kan sparas och kvittas mot aktievinster i framtiden till 70%"],"correct":[0],"multiSelect":false,"explanation":"När bolaget bedriver värdepappershandel (lagerverksamhet) behandlas aktierna som lagertillgångar. Förluster på lagertillgångar får kvittas fullt ut mot övriga intäkter i näringsverksamheten."},{"question":"Minskar din skatt och i så fall med hur mycket om du har ett underskott på 200,000 kronor i kapital?","options":["Ja, med 60,000 kr","Ja, med 51,000 kr","Ja, med 42,000 kr","Nej, den minskar inget alls"],"correct":[1],"multiSelect":false,"explanation":"Underskott av kapital på 100,000 kr ger skattereduktion med 30% (30,000 kr). För belopp däröver (100,000 kr) ger det 21% (21,000 kr). Totalt: 30,000 + 21,000 = 51,000 kr."},{"question":"Ska kapitalvinster på aktier som utgör kapitaltillgångar i inkomtslaget näringsverksamhet och ägs av en juridisk person kvoteras innan de tas upp i deklarationen och i så fall till vilken andel?","options":["Nej, de ska inte kvoteras","Ja, till 70%","Ja, till 2/3","Ja, till 5/6"],"correct":[0],"multiSelect":false,"explanation":"Kapitalvinster på aktier som utgör kapitaltillgångar i näringsverksamhet hos juridiska personer kvoteras inte — de beskattas fullt ut. Kvoterade vinster gäller andra situationer."},{"question":"En enskild näringsidkare som bedriver jordbruk tecknar valutaterminer för att säkra gårdsstöd i EUR mot valutarisken.\n\nHur ska dessa valutaterminer redovisas?","options":["Eventuella kapitalvinster eller kapitalförluster på dessa redovisas i inkomstslaget näringsverksamhet","Eventuella kapitalvinster eller kapitalförluster på dessa redovisas i inkomstslaget kapital","De redovisas som lagertillgångar i verksamheten i inkomtslaget näringsverksamhet","De redovisas som näringstillgångar i verksamheten i inkomtslaget näringsverksamhet"],"correct":[1],"multiSelect":false,"explanation":"Valutaterminer som tecknas av en enskild näringsidkare för att säkra valutarisk i verksamheten redovisas i inkomstslaget kapital, inte näringsverksamhet. Derivat beskattas som kapital för fysiska personer."},{"question":"Får kapitalförluster på delägarrätter som inte utgör lager och som avyttras av juridiska personer dras av vid deklarationen?","options":["Ja, men de måste dras av samma år som de redovisas","Ja, de får sparas maximalt sju år om de inte kan dras av samma år som de realiseras","Ja, de får sparas tills de kan utnyttjas genom kvittering mot kapitalvinster","Nej, de får inte dras av","i ett helt fristående värdepappersbolag. Kunden kommer in till dig och ber om råd om vilka värdepapper hon ska placera i. "],"correct":[2],"multiSelect":false,"explanation":"Kapitalförluster på delägarrätter som inte är lager och som avyttras av juridiska personer får sparas och kvittas mot framtida kapitalvinster på delägarrätter utan tidsbegränsning."},{"question":"En kund har en utländsk kapitalförsäkring och kan själv bestämma placeringarna. Du arbetar i ett fristående värdepappersbolag. Kunden ber dig om råd om vilka värdepapper hon ska placera i.\n\nVilken typ av uppgift behöver du inhämta?","options":["Du behöver inte inhämta några uppgifter eftersom det är en försäkring","Du behöver bara inhämta uppgifter om kundens erfarenheter och kunskaper","Du behöver bara inhämta uppgifter om kundens ekonomiska situation och placeringsmål","Du behöver inhämta uppgifter om kundens erfarenheter och kunskaper, ekonomiska situation och placeringsmål"],"correct":[3],"multiSelect":false,"explanation":"Vid rådgivning om placeringar i en kapitalförsäkring behövs alla uppgifter: erfarenheter/kunskaper, ekonomisk situation och placeringsmål. Att det är en försäkring ändrar inte kravet på full lämplighetsbedömning."},{"question":"En kund med ett aktiebolag (omsättning ca SEK 2m, eget kapital ca SEK 1m) vill ha råd om placering av överskottslikviditet.\n\nHur bör du lämpligast agera?","options":["Eftersom att kunden är näringsidkare behöver uppgifter om erfarenheter och kunskaper, ekonomisk situation och placeringsmål inte inhämtas","Eftersom att kunden är näringsidkare behöver uppgifter om placeringsmål inhämtas, men man kan utgå från att kunden har de erfarenheter och kunskaper som krävs","Eftersom att kunden är s.k. icke-professionell kund behöver uppgifter om erfarenheter och kunskaper, ekonomisk situation och placeringsmål inhämtas","Eftersom att kunden är s.k. icke-professionell kund behöver uppgifter om erfarenheter och kunskaper samt ekonomisk situation inhämtas, kunden får själv avgöra om ett råd stämmer överrens med kundens placeringsmål","tillgängliga för köp av värdepapper."],"correct":[2],"multiSelect":false,"explanation":"Ett litet aktiebolag med begränsad omsättning och kapital är en icke-professionell kund. Alla uppgifter om erfarenheter, ekonomisk situation och placeringsmål måste inhämtas."},{"question":"En bank kontaktas av ett företag som vill börja handla värdepapper. Ekonomichefen har lång erfarenhet i finanssektorn, men företaget har aldrig handlat med finansiella instrument. De har ca SEK 2m tillgängligt.\n\nI vilken kundkategori bör företaget hamna?","options":["Icke-professionel kund","Professionell kund","Jämbördig motpart","Näringsidkare"],"correct":[0],"multiSelect":false,"explanation":"Ett företag som aldrig handlat med finansiella instrument och har begränsade medel kategoriseras som icke-professionell kund, oavsett att ekonomichefen personligen har erfarenhet."},{"question":"En erfaren kund som länge investerat i aktier, aktieobligationer och fonder vill att du genomför en warrantorder. Hon vill inte ha rådgivning.\n\nVad ska du göra innan du genomför hennes order?","options":["Enbart kontrollera om hon har fått information om riskerna med derivatinstrument","Enbart kontrollera om hon har en depå eller VP-konto","Kontollera hennes kunskap och erfarenhet för att bedöma om warranter passar henne","Kontollera hennes kunskap och erfarenhet, ekonomiska ställning, samt hennes syfte med placeringarna för att bedöma lämpligheten att köpa warranter"],"correct":[2],"multiSelect":false,"explanation":"Innan en warrantorder genomförs för en kund utan rådgivning ska en passandebedömning göras — dvs. kontroll av kundens kunskap och erfarenhet avseende det aktuella instrumentet."},{"question":"En ny kund vill köpa en aktie noterad på en MTF-plattform i Danmark. Aktien handlas inte på någon annan marknadsplats. Handeln är likvid med elektroniskt system. Bolagen följer samma informationsregler som på reglerad marknad.\n\nFår institutet genomföra kundens order utan passandebedömning?","options":["Nej, möjligheten att förbigå passandebedömning gäller endast aktier som tagits upp till handel på reglerad marknad eller motsvarande marknad utanför EES","Nej, möjligheten att förbigå passandebedömning gäller endast fondandelar och skuldförbindelser utan derivatinslag","Ja, alla värdepapper som handlas på en marknadsplats under tillsyn av någon nationell tillsynsmyndighet i EES får handlas utan passandebedömning","Ja, eftersom det finns tillräcklig information om aktien samt goda möjligheter att sälja aktien"],"correct":[3],"multiSelect":false,"explanation":"Ja, aktier på en MTF under tillsyn i EES med tillräcklig information och goda möjligheter att sälja kan handlas utan passandebedömning (execution only), liknande aktier på en reglerad marknad."},{"question":"En bank har kategoriserat ett företag som icke-professionell kund. Företaget begär omkategorisering till professionell kund. Vad är relevant vid bedömningen?\nVälj TRE svarsalternativ","options":["Företagets historik av genomförda affärer under det senaste året","Värdet av företagets potfölj av finansiella instrument","Företagets framtida affärer under det kommande året","Om företaget arbetar eller har arbetat inom finanssektorn i en befattning  som kräver relevant kunskap","Företagets riskbenägenhet"],"correct":[0,1,3],"multiSelect":true,"explanation":"Vid omkategorisering till professionell kund bedöms: genomförda affärer (frekvens/storlek), portföljvärde (finansiella instrument inkl. kontanter >500,000 EUR), och relevant arbetslivserfarenhet i finanssektorn."},{"question":"Vilka av följande tillgångar får en värdepappersfond enligt lag placera sina tillgångar i?\nVälj TRE svarsalternativ","options":["Derivatinstrument","Bankkonto","Fast egendom","Aktier som är noterade endast på handelsplattform","Imateriella tillgångar","För värdepappersfonder gäller vissa restriktioner beträffande de typer av tillgångar som fonderna får investera i. "],"correct":[0,1,3],"multiSelect":true,"explanation":"En värdepappersfond får placera i derivatinstrument, på bankkonto och i aktier noterade på handelsplattform. Fast egendom och immateriella tillgångar är inte tillåtna tillgångsslag."},{"question":"Vilkej av följande placeringsrestriktioner gäller enligt lag?","options":["Att fonderna endast får placera 50% i derivatinstrument","Att vissa typer av fonder av etiska skäl  inte får investera i finansiella instrument inom vissa sektorer","Att fonderna inte får investera i finansiella instrument vars risk överstiger en viss nivå","Att fonderna endast får placera en viss andel av sina tilgångar i finansiella instrument från en och samma emittent"],"correct":[3],"multiSelect":false,"explanation":"Enligt lag gäller placeringsrestriktioner som begränsar andelen tillgångar från en och samma emittent (5/10/40-regeln). Detta säkerställer diversifiering och begränsar koncentrationsrisken."},{"question":"Ett värdepappersbolag informerar sina kunder om att bolaget regelbundet kommer att bedöma lämpligheten avseende de finansiella instrument som har rekommenderats.\n\nVad innebär det för bolaget?","options":["Bolaget måste skicka ut depåsammanställningar med uppdaterade lämplighetsförklaringar varje månad till kunderna","Bolaget kan tillhandahålla sådana bedömningar enbart till profesionella kunder","Bolaget måste ingå i skriftliga avtal med kunderna","Bolaget får i sin rådgivning inte lämna råd om finansiella instrument utgivna av bolaget själva"],"correct":[2],"multiSelect":false,"explanation":"Om bolaget regelbundet bedömer lämpligheten måste det ingå skriftliga avtal med kunderna som reglerar denna löpande tjänst. Det är en formell skyldighet vid periodisk lämplighetsbedömning."},{"question":"Ett värdepappersbolag lämnar enbart råd om investeringar i fonder som förvaltas i samma koncern samt i egna strukturerade produkter.\n\nBolaget ska lämna information om att de:","options":["tillhandahåller rådgivning på oberoende grund och att rådgivningen är baserad på allmän analys av olika finansiella instrument","tillhandahåller rådgivning på oberoende grund och att rådgivningen är baserad på allmän analys av finansiella instrument tillhandahållna av bolaget själva och närstående bolag","inte tillhandahåller rådgivning på oberoende grund och att rådgivningen är baserad på en begränsad analys av finansiella instrument tillhandahållna av bolaget själva och närstående bolag","inte tillhandahåller rådgivning på oberoende grund men att rådgivningen är baserad på en allmän analys av olika finansiella instrument "],"correct":[2],"multiSelect":false,"explanation":"Bolaget ska informera att de inte tillhandahåller rådgivning på oberoende grund och att rådgivningen baseras på en begränsad analys av finansiella instrument från bolaget och närstående bolag."},{"question":"Vilket av följande måste finnas med i en lämplighetsförklaring till en icke-profesionell kund?","options":["Att kunden har samtyckt till transaktionern","Marknadspriset på instrumentet i fråga vid orderläggningstillfället","Hur rådet motsvarar kundens önskemål","Namnet på rådgivaren"],"correct":[2],"multiSelect":false,"explanation":"En lämplighetsförklaring till en icke-professionell kund måste innehålla hur rådet motsvarar kundens önskemål, preferenser och övriga egenskaper. Det kopplar rådet till kundens profil."},{"question":"Är det tillåtet för ett värdepappersinstitut att, utan kundens medgivande, lämna ut all information om en kund till någon annan än kunden?","options":["Nej, aldrig","Ja, när institutet behöver försvara sig mot kund som framfört kritik mot institutet i media","Ja, när värdepappersinstitutet lämnar information till en myndighet som behöver uppgifterna för att utföra sitt arbete","Ja, när en make i ett gift par behöver ifnormation om värdet på den andres depå","vad han har fått veta från Bengt i sifte att ge Carola tillfälle att göra en mycket fördelaktig affärsuppgörelse med Bengt."],"correct":[2],"multiSelect":false,"explanation":"Ett värdepappersinstitut får lämna ut kundinformation till en myndighet som behöver uppgifterna för att utföra sitt arbete (t.ex. FI, Skatteverket). Tystnadsplikten bryts av lagstadgad uppgiftsskyldighet."},{"question":"Hur kan sekretessbestämmelserna i lagen om värdepappersmarknaden tillämpas på Axels beteende?","options":["Axel kan dömas till straff för brott mot tystnadsplikten","Axel kan inte dömas till något straff eftersom sejretessbestämmelserna endast gäller för anställda, och inte styrelseledamöter, i värdepappersbolag","Axel kan dömas till straff endast om det visas att hans agerande orsakat Bengt skada","Enligt reglerna om rådgivning har en rådgivare vissa skyldigheter gentemot kunden"],"correct":[0],"multiSelect":false,"explanation":"Axel kan dömas till straff för brott mot tystnadsplikten. Sekretessbestämmelserna gäller inte bara anställda utan även styrelseledamöter i värdepappersbolag."},{"question":"Vad kan bli konsekvensen om en rådgivare vid en bank, genom oaktsamhet i sin rådgivning, orsakar kunden ekonomisk skada?","options":["Banken kan tvingas betala vite till finansinspektionen","Banken kan bli tvugna att betala skadestånd till kunden","Rådgivaren kan personligen bli tvungen att ersätta kundens förlust","Rådgivaren kan dömas till böter av allmän domstol","Ett värdepappersinstitut har träffat ett avtal omplaceringsrådgivning mot kund. ","Rådgivaren köper ändå för kundens räkning aktier i bolaget. Det blir emellertid inte någon kursupgång i bolagets aktier. I stället går kursen ner och kursen uppvisar dessutom en sjunkande trend för det närmaste kvartalet.","Kunden reklamerar köpet i tid, säljer aktierna och kräver ersättning av värdepappersinstitutet för kursförlusten. "],"correct":[1],"multiSelect":false,"explanation":"Banken (institutet) kan bli skyldigt att betala skadestånd till kunden vid oaktsam rådgivning. Det är institutet, inte den enskilde rådgivaren, som bär det civilrättsliga ansvaret."},{"question":"Kan värdepappersinstitutet bli skyldig att ge ut skadestånd till kunden?","options":["Ja, eftersom att rådgivaren köpt aktier utan kundens godkännande ","Ja, eftersom att kursen i aktien har fallit","Nej, eftersom att kunden sålt aktierna utan att först meddela institutet","Nej, eftersom att aktien allmänt rekommenderats till institutets kunder"],"correct":[0],"multiSelect":false,"explanation":"Ja, institutet kan bli skadeståndsskyldigt eftersom rådgivaren köpte aktier utan kundens godkännande. Obehörig disposition av kundens medel utgör avtalsbrott oavsett kursutfallet."},{"question":"Vem fattar beslut om nyemission i ett aktiebolag?","options":["Endast bolagsstämma","Endast styrelse","Styrelse eller VD efter särskild bemyndigande eller godkännande","Bolagsstämma eller styrelse, efter särskilt bemyndigande eller godkännande"],"correct":[3],"multiSelect":false,"explanation":"Beslut om nyemission fattas av bolagsstämma eller av styrelsen efter särskilt bemyndigande från bolagsstämman. Båda organen kan alltså vara behöriga beroende på bemyndigande."},{"question":"Om det finns flera aktieslag i ett bolag gäller följande:","options":["Olika aktieslag måste ha samma röstantal men får ges olika rätt till bolagets vinst","Om olika aktieslag har olika röstantal så ger de olika aktieslagen även olika rätt till bolagets vinst","Varje aktie av samma slag måste ha samma röstantal","Om olika aktieslag har olika rätt till bolagets vinst så ger de olika aktieslagen även olika röstantal"],"correct":[2],"multiSelect":false,"explanation":"Varje aktie av samma slag (t.ex. alla A-aktier) måste ha samma röstantal. Olika aktieslag kan dock ha olika röstantal och/eller olika rätt till utdelning."},{"question":"Vad innebär myndighetsbelastningen i en situation som denna. ","options":["Kunden får inte sälja sina värdepapper eftersom en myndighet eller konkursförvaltare har registrerats som ombud med rätt att ensam disponera över vp-kontot. ","Kunden får sälja sina värdepapper men Euroclear Sweden kommer att meddella den myndighet eller konkursförvaltare som registrerats som ombud på kontot. ","Kunden får sälja sina värdepapper under förutsättning att de anskaffats innan registrering om myndighetsbelastning gjordes på kontot.","Kunden får sälja sina värdepapper under förutsättning att de anskaffats efter registrering om myndighetsbelastning gjordes på kontot."],"correct":[0],"multiSelect":false,"explanation":"Myndighetsbelastning innebär att en myndighet eller konkursförvaltare har registrerats som ombud med ensamrätt att disponera över VP-kontot. Kunden kan då inte själv sälja värdepappren."},{"question":"Vilken uppgift har Emissionsinstitutet under en nyemission?","options":["Att sköta handeln i teckningsrätterna","Att tilhandahålla uppgifter till skattemyndigheten","Att registrera teckningarna","Att registrera aktiekapitalshöjningen"],"correct":[2],"multiSelect":false,"explanation":"Emissionsinstitutet ansvarar för att registrera teckningarna vid en nyemission. Det administrerar den praktiska hanteringen av emissionsprocessen."},{"question":"Ett aktiekapitals storlek och antalet aktier ska framgå av registret hos: ","options":["Euroclear Sweden","Bolagsverket","Nasdaq Stockholm","Länsstyrelsen"],"correct":[1],"multiSelect":false,"explanation":"Aktiekapitalets storlek och antalet aktier registreras hos Bolagsverket, som är den myndighet som för registret över svenska aktiebolag."},{"question":"Vilket av följande alternativ beskriver på ett korrekt sätt skyldigheterna att köpa eller sälja aktier enligt reglerna om tvångsinlösen?","options":["Minoritetsaktieägarna är tvugna att köpa aktier i det bolag som är majoritetsaktieägare","Minoritetsaktieägarna är tvugna att sälja sina aktier till majoritetsaktieägaren om denne begär det","Minoritetsaktieägarna är tvugna att köpa majoritetsaktieägarens aktier, oavsett om denne begär det eller ej","Majoritetsägaren är tvungen att köpa, och minoritetsaktieägarna ör tvugna att sälja sina aktier"],"correct":[1],"multiSelect":false,"explanation":"Vid tvångsinlösen är minoritetsaktieägarna skyldiga att sälja sina aktier om majoritetsägaren (med minst 90% av aktierna) begär det. Majoritetsägaren har rätt att lösa in resterande aktier."},{"question":"Vid en fondemission ökar bolaget sitt aktiekapital. På vilket sätt kan detta ske?","options":["Aktiekapitalet tillförs belopp som hämtas från andra poster under rubriken Eget Kapital i balansräkningen","Aktieägarna tillför bolaget nytt kapital","Aktiekapitalet skrivs upp genom att annan egendom än pengar tillförs till bolaget","Aktiekapitalet skrivs upp genom kvittning mot fordran"],"correct":[0],"multiSelect":false,"explanation":"Vid en fondemission ökar aktiekapitalet genom att belopp överförs från andra poster under Eget Kapital (t.ex. överkursfond eller balanserade vinstmedel). Inga nya pengar tillförs utifrån."},{"question":"En kund begär uppgifter från sin hustrus vp-konto eftersom han befarar att uppgifterna blivit felaktiga. I vilken situation får du lämna ut uppgifter till maken?","options":["Till make kan man aldrig lämna ut uppgifter","I det fall banken är KI för vp-kontot och du känner kunden väl","I det fall banken är KI för vp-kontot eller om banken har insynsfullmakt för vp-kontot","I det fall hustrun har lämnat en fullmakt till maken om detta uppdrag"],"correct":[3],"multiSelect":false,"explanation":"Uppgifter om en kunds VP-konto får lämnas till annan person endast om kunden (kontohavaren) har lämnat fullmakt. Make har ingen automatisk rätt till uppgifterna."},{"question":"Vilket av följande beskriver korrekt innebörden av behörighet inom fullmaktsläran?","options":["Det som fullmäktigen kan göra med bindande verkan för fullmaktsgivaren","Det som fullmäktigen får göra enligt den interna överenskommelsen med fullmaktsgivaren","Det som fullmaktsgivaren får göra enligt den interna överenskommelsen med fullmäktigen","Det som fullmaktsgivaren kan företa med bindande verkan gentemot fullmäktigen","att brodern enligt fullmakten hade rätt att göra uttag på kundens konto. "],"correct":[0],"multiSelect":false,"explanation":"Behörighet inom fullmaktsläran avser det som fullmäktigen kan göra med bindande verkan för fullmaktsgivaren. Det är den yttre ramen som tredje man kan se och lita på."},{"question":"En kund är förargad på banken. Kundens bror har med stöd av en giltig fullmakt gjort ett större uttag från kundens konto. Du konstaterar att brodern enligt fullmakten hade rätt att göra uttag.\n\nVad svarar du lämpligast?","options":["Banken är inte skyldig att kompensera denne eftersom kunden är bunden av broderns handling","Banken kommer att kompensera kunden genom att  göra ett uttag från broderns konto i banken","Banken måste kompensera eftersom man inte kontollerat broderns befogenhet","Banken är inte skyldig att kompensera denne men att kunden kan få kompensation via insättningsgarantin","För aktier är huvudregeln att alla aktier i ett aktiebolag ska medföra samma rättigheter. Det finns dock undantag från denna regel. "],"correct":[0],"multiSelect":false,"explanation":"Banken behöver inte kompensera kunden eftersom brodern handlade inom fullmaktens behörighet. Kunden är bunden av broderns handlingar som utfördes inom fullmaktens ramar."},{"question":"Vilket av följande påståenden är korrekt?","options":["En ägare av preferensaktier behöver inte ta hänsyn till hembudsklausulen","En A-aktie kan ge upp till 10 röster på bolagsstämman, medan en B-aktie inte ger någon rösträtt","En stamaktie medför sämre rätt till utdelning än en preferensaktie","Ett bolag har följande verksamhet inskriven i sin solagsordning:","\"Exploatering av fjällfastigheter och handel med finansiella instrument\""],"correct":[2],"multiSelect":false,"explanation":"En stamaktie medför normalt sämre rätt till utdelning än en preferensaktie. Preferensaktier har företrädesrätt till utdelning men begränsad uppsida, medan stamaktier har full uppsida."},{"question":"Vem eller vilka kan för bolagets räkning ingå ett avtal om handel med finansiella instrument genom ett värdepappersinstitut?","options":["Huvudägaren","VD eller styrelse","Endast styrelsen","Revisorn eller huvudägaren tillsammans"],"correct":[1],"multiSelect":false,"explanation":"VD eller styrelse kan ingå avtal om värdepappershandel för bolagets räkning, enligt bolagsordningens verksamhetsbeskrivning. Båda har firmateckningsrätt."},{"question":"Brukar ett svenskt noterat aktiebolag vidta en åtgärd efter ett så kallat återköp och i så fall vilken åtgärd?","options":["Nej, ingen särskild åtgärd förutom att behålla återköpta aktier som en tillgång","Ja, öka antalet aktier genom en riktad nyemission","Ja, minska antalet aktier genom att makulera dessa","Ja, förbereda en avnotering från marknadsplatsen"],"correct":[2],"multiSelect":false,"explanation":"Efter ett återköp av egna aktier brukar bolaget makulera (dra in) aktierna genom att minska aktiekapitalet. Detta ökar vinsten per aktie för kvarvarande aktieägare."},{"question":"När blir en aktieägare i ett svenskt bolag skyldig att lägga ett offentligt bud (budplikt)?\n\nNär aktieägarens innehav uppgår till:","options":["10% av aktierna eller rösterna","20% av aktierna","30% av rösterna","50% av aktierna eller rösterna"],"correct":[2],"multiSelect":false,"explanation":"Budplikt inträder när ett innehav uppgår till 30% av rösterna i bolaget. Innehavaren måste då lägga ett offentligt uppköpserbjudande på samtliga kvarvarande aktier."},{"question":"Ett aktiebolag har redovisade tillgångar om SEK 100m, skulder om SEK 30m, och ett aktiekapital om SEK 20m. Hur stort är det egna kapitalet","options":["SEK 50m","SEK 70m","SEK 80m","SEK 90m"],"correct":[1],"multiSelect":false,"explanation":"Eget kapital = Tillgångar - Skulder = 100m - 30m = 70m. Aktiekapitalet (20m) är en del av eget kapital, inte separat."},{"question":"Ett aktiebolags eget kapital understiger halva aktiekapitalet. Enligt aktiebolagslagen ska bolaget likvideras om inte kapitalet återställs.\n\nVad är syftet med denna regel?","options":["Att ett bolag som är i kris ska ställa in sin verksamhet medan det fortfarande finns förmögenhet kvar i bolaget","Att ett bolag ska ha så mycket pengar kvar så att aktieägarna kan få tillbaka en del av deras ursprungliga insats","Att förbättra förutsättingarna för uppköp och företagsrekonstruktion med ansträngd finansiell situation","Att förhindra att styrelsen eller större ägare gynnar sig själva på bekostnad av bolagets borgenärer"],"correct":[0],"multiSelect":false,"explanation":"Regeln syftar till att bolaget ska upphöra eller åtgärda sin situation medan det fortfarande finns förmögenhet kvar. Det skyddar borgenärer genom att tvinga bolaget att agera i tid."},{"question":"Ett bolag noterat på en handelsplattform (MTF) vill förvärva aktier i det egna bolaget genom handel på handelsplattformen.\n\nÄr det tillåtet?","options":["Ja, eftersom att bolaget är ett aktiemarknadsbolag","Ja, eftersom att handelsplattformen står under tillsyn","Nej, eftersom att bolaget inte är noterat på en reglerad marknad","Nej, eftersom att bolaget inte är ett publikt bolag"],"correct":[2],"multiSelect":false,"explanation":"Återköp av egna aktier via handelsplattformen kräver att bolaget är noterat på en reglerad marknad. Ett bolag noterat på en MTF (handelsplattform) uppfyller inte detta krav."},{"question":"Hur ska ett beslut om nyemmision i ett börsbolag hanteras?","options":["Det ska godkännas av Aktiemarknadsnömnden","Det ska anmälas till Finansinspektionen","Det ska kungöras i Post- och Inrikes tidningar","Det ska registreras hos Bolagsverket"],"correct":[3],"multiSelect":false,"explanation":"Beslut om nyemission ska registreras hos Bolagsverket. Registreringen är nödvändig för att aktiekapitalshöjningen ska bli giltig."},{"question":"Hur och i vilken ordning beslutas och verkställs beslut om aktieutdelning?","options":["1. Beslut av bolagsstämma, 2. Godkännande av styrelse och revisor, 3. Aktieutdelning, 4. Likviddag","1. Beslut av bolagsstämma, 2. Avstämningsdag, 3. Registrering hos Bolagsverket, 4. Aktieutdelning","1. Förslag från styrelsen, 2. Beslut av bolagsstämma, 3. Avstämningsdag, 4. Aktieutdelning","1. Förslag från bolagsstämma, 2. Beslut av Bolagsverket, 3. Avstämningsdag, 4. Aktieutdelning"],"correct":[2],"multiSelect":false,"explanation":"Ordningen är: 1) Styrelsen föreslår utdelning, 2) Bolagsstämman beslutar, 3) Avstämningsdag fastställs, 4) Utdelningen betalas ut."},{"question":"Enligt det branschgemensamma depåavtalet, vilka skyldigheter har ett värdepappersinstitut gällande teckningsoptioner?\nVälj TRE svarsalternativ","options":["Institutet ska i avsaknad av kundens order senast tre bankdagar före sista dag för handel sälja teckningsoptionerna","Institutet ska underrätta kunden om sista dag för aktieteckning","Institutet ska senast tio bankdagar före sista dag för handel sälja teckningsoptionerna","Institutet ska verkställa nyteckning av kundens hela innehav av teckningsoptioner, om inte kunden lämnat en annan instruktion","Institutet ska på kundens order verkställa kompletteringsköp eller nyteckning av aktier"],"correct":[0,1,4],"multiSelect":true,"explanation":"Institutet ska sälja teckningsoptioner senast 3 bankdagar före sista handelsdag (om kunden inte lämnat annan instruktion), underrätta kunden om sista teckningsdag, och på kundens order verkställa kompletteringsköp eller nyteckning."},{"question":"En kund har utfärdat optioner och ställt säkerheter. Kundens positioner utvecklas så att säkerhetsbrist uppstår. Värdepappersbolaget får inte kontakt med kunden.\n\nHur bör värdepappersbolaget agera?","options":["Inte vidta någon åtgärd förrän kontakt erhållits med kunden","Avveckla kundens position,  trots att de inte erhållit någon kontakt med kunden","Anmäla kundes position till Nasdaq Stockholm, som ska besluta om lämpliga åtgärder","Stänga kundens position först när kunden tillställts skritflig underrättelse om säkerhetsbristen"],"correct":[1],"multiSelect":false,"explanation":"Vid säkerhetsbrist och utebliven kontakt med kunden bör institutet avveckla (stänga) kundens position för att begränsa förlusterna. Institutet har rätt att agera för att skydda sig."},{"question":"Enligt allmänna bestämmelser för depå/kontoavtal pantförskriver kunden samtliga värdepapper och medel på kontot.\n\nAnge vilket påstående som är korrekt.","options":["Banken får lämna ut av kunden annan pantsatta värdepapper  utan kundens medgivande","Banken får inte utan föregående underrättelse till kunden göra sig betald genom att ta ut förfallet belopp från kontot","Banken får inte utan kundens medgivande bestämma i vilken ordning ställda säkerheter ska tas i anspråk","Banken får utan kundens medgivande bestämma i vilken ordning ställda säkerheter ska tas i anspråk"],"correct":[3],"multiSelect":false,"explanation":"Enligt allmänna bestämmelser får banken utan kundens medgivande bestämma i vilken ordning ställda säkerheter ska tas i anspråk. Banken har denna dispositionsrätt genom pantsättningsavtalet."},{"question":"Villka frågor behandlas i standardvillkoren Allmäna villkor för handel med finansiella instrument?","options":["Frågor om vilka reglerade marknader och MTF:er banken utför kundens order på","Frågor om när pengar och värdepapper ska göras tillgängliga för kunden respektive banken","Frågor om kundens pantsättning av finansiella instrument till säkerhet för depåkredit
